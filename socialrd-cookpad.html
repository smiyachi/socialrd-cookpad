<script type="text/babel">
const {useState,useMemo} = React;

const ALL_PATTERNS = [{"id":1,"layer":"proc","stage":1,"sub":null,"name":"綻びの利用","en":"Exploiting the Cracks","src":"#1,2,3","context":"経済危機や災害、あるいは既存のサービスが明らかに機能不全に陥り、限界を迎えている状況。","problem":"古いシステムを根本から変えたいが、平時では既得権益や「前例踏襲」の壁が厚く、変革のための予算もエネルギーも集まらない。","solution":"危機や機能不全を「単なる修復すべき災難」として扱うのではなく、人々の痛みが共有されているその瞬間を、システム全体を再編するための「強制的な起爆剤」として利用する。","examples":["ハリケーン・カトリーナ後のニューオーリンズの制度再編","病院の予算削減を機にした予防医療への転換"],"alliance":"地域の「空き店舗の増加」を嘆くのではなく、家賃暴落と大家の諦めを逆手にとって、若手クリエイターの実験特区やアトリエ群へと一気に作り変える。","notes":""},{"id":2,"layer":"proc","stage":1,"sub":null,"name":"都市の鍼治療","en":"Urban Acupuncture","src":"#6","context":"地域が停滞しており、問題が巨大すぎてどこから手をつけていいかわからない状況。","problem":"街全体を変えたいが、大規模な計画は時間と莫大なコストがかかり実行前に人々の期待が萎む。","solution":"小さくても「象徴的」で人々の想像力を刺激するプロジェクトを特定の場所に打ち込む。","examples":["クリチバ市の歩行者天国化","ソウルの清渓川再生"],"alliance":"巨大なシャッター商店街全体を再生する計画を練る前に、まずは一つの空き家の前に「黄色いベンチ」を置き、ただコーヒーを振る舞うだけの拠点を作る。","notes":""},{"id":3,"layer":"proc","stage":1,"sub":null,"name":"技術と事実の翻訳","en":"Translating Tech & Evidence","src":"#4,5","context":"新しいテクノロジーや科学的根拠が登場した状況。","problem":"新技術や新事実を活用して社会を良くしたいが、そのまま現場に持ち込んでもニーズと噛み合わず、分断や非効率を生んでしまう。","solution":"技術や事実をそのまま押し付けるのではなく、実験を通じて「社会のリアルなニーズに最も合う形」にチューニングし、課題解決の手段へと翻訳する。","examples":["離婚交渉でのAI活用","「2人で1台」のPC共有で高まる学習効果"],"alliance":"難しい防災ハザードマップを配るのではなく、地域の「高低差」を楽しむまち歩きゲームに翻訳して、結果的に避難ルートを体感させる。","notes":""},{"id":4,"layer":"proc","stage":1,"sub":null,"name":"余白と水脈のマッピング","en":"Mapping Margins & Flows","src":"#7,8,9,10,11","context":"課題が潜在化しており、どこにどんな支援や使える資源があるか把握しきれていない状況。","problem":"リソースをつなぎたいが、マクロな統計データでは「平均値」しか見えず、現場のリアルな「痛み」や「使える空間」が日常の風景に埋もれている。","solution":"空間的な位置、人やモノの流れ、空きスペースなどを視覚的にマッピングし、未使用の資産や隠れたニーズを「誰もが指差して関われる地図」として可視化する。","examples":["英Empty Homes Agencyの空き家マップ","ケーララ州の人民計画"],"alliance":"地域の「空き車両」と「運転できるお年寄りの空き時間」をマッピングし、相乗り交通としてつなぎ合わせ、新しい回遊性の水脈を作る。","notes":""},{"id":5,"layer":"proc","stage":1,"sub":null,"name":"当事者の目への憑依","en":"Possessing the User's Eyes","src":"#12,13,14,15,29","context":"データや報告書だけでは本当の課題が見えてこない状況。","problem":"ユーザーの真のニーズを理解したいが、アンケートやヒアリングでは「建前」しか出てこず、当事者すら無自覚な文脈や痛みが抜け落ちる。","solution":"調査対象者の日常に自らの身体を没入させる、あるいは当事者自身に調査の全プロセスを主導させることで、言葉にならない文脈を身体で受け取る。","examples":["インド農村を歩くShodh Yatra","対象者の家庭に1日密着するエスノグラフィー"],"alliance":"高齢者の孤独をアンケートで聞くのではなく、自分自身が毎朝のラジオ体操の輪に1ヶ月間入り込み、その後の雑談から「本当に困っている小さなこと」を掴む。","notes":""},{"id":6,"layer":"proc","stage":1,"sub":null,"name":"還流する悲鳴","en":"Circulating Screams","src":"#17,20,31","context":"現場の不満や苦情が「ノイズ」や「クレーマー」として処理されている状況。","problem":"クレームを社会改善のエネルギーに変えたいが、個別の文句のままでは現場の担当者を疲弊させるだけで、権力者や周囲の共感も得られない。","solution":"個別の不満をユーモアの力やITシステムを用いて束ね、可視化し、組織の上層部や社会全体へ「無視できない創造的な提案」として還流させる。","examples":["不満の合唱団","Fix My Street"],"alliance":"「公園でボール遊びができない」という親の愚痴を、「公園の理不尽ルール・コンテスト」としてユーモアたっぷりに可視化し、町への提案に変える。","notes":""},{"id":7,"layer":"proc","stage":1,"sub":null,"name":"市民の手にデータを取り戻す","en":"Data Back to Citizens","src":"#18,19","context":"個人データが大企業や行政に独占されている状況。","problem":"自分の生活を自律的に改善したいが、データが独占されており主体的に行動計画を立てる術がない。","solution":"ユーザーを中心にデータを統合し、コントロール権を市民の手に取り戻させ、市民自身が自分の状態を監視して改善の主導権を持てるようにする。","examples":["シアトルGroup Healthの患者主導の健康記録","Mydex"],"alliance":"行政の奥底に眠る「地域の古い写真アーカイブ」をオープンデータ化し、若者が「タイムスリップ写真展」の遊び道具として解放する。","notes":""},{"id":8,"layer":"proc","stage":1,"sub":null,"name":"行動のスクリプト書き換え","en":"Rewriting the Script","src":"#22,23","context":"既存のサービス提供方法が非効率になり、利用者の行動の前提を根本から変える必要がある状況。","problem":"サービスの効率を劇的に上げたいが、提供者側の工夫だけでは限界があり、かといって利用者に強制しても反発される。","solution":"行動パターン（スクリプト＝台本）そのものを新しく書き換え、利用者が「強制されずとも自然に新しい役割を担う」枠組みを定着させる。","examples":["ファストフードのセルフサービスモデル","自己管理型ヘルスケア"],"alliance":"「コミュニティスペースに来てください」をやめ、「おばちゃん、漬物の作り方を教えてください」とこちらから飛び込む。受益者を「先生」に位置づけ直すことで、関係性がひっくり返る。","notes":""},{"id":9,"layer":"proc","stage":1,"sub":null,"name":"異物の意図的な混入","en":"Deliberate Contamination","src":"#24,25,26,27","context":"組織が官僚的・ルーチン的になり、内部から画期的な解決策が出ない状況。","problem":"外部の新しい視点を入れたいが、単発のコンサルティングでは現場に根付かず、内部の人間だけでは常識を疑えない。","solution":"アーティスト、思想家、若手チームなどを組織の「内部」に一定期間滞在させ、日常業務の真っ只中にあえて異質な視点を混入させ続ける。","examples":["NY市衛生局の清掃員全員と握手するアーティスト","南オーストラリアのA-team"],"alliance":"閉鎖的な自治会の役員会議に、あえて「地域の高校生」や「よそ者のアーティスト」を毎回オブザーバーとして呼び、暗黙の空気をかき回してもらう。","notes":""},{"id":10,"layer":"proc","stage":1,"sub":null,"name":"スポットライトと拡声器","en":"Spotlights & Megaphones","src":"#30,32,33","context":"深刻な社会問題が存在しているが、一般大衆に認識されず、政治や企業が動かない状況。","problem":"社会の変化を強いたいが、個人の声や地道なロビー活動だけでは無視されてしまい、現状維持の権力者を動かせない。","solution":"メディア、映画、直接行動などで問題に強烈なスポットライトを当て、大衆の不満を「新しい解決策を探せ」という巨大な要求に変換して突きつける。","examples":["「不都合な真実」","Plane Stupid"],"alliance":"放置竹林を「厄介なゴミ」として行政に文句を言うのではなく、「竹林を切り開いて流しそうめん世界記録挑戦！」というメディア・イベントに変え、人を集める力にする。","notes":""},{"id":11,"layer":"proc","stage":2,"sub":null,"name":"ユーザーという名の共同設計者","en":"Co-design Studio with Users","src":"#37,38,39,40","context":"当事者の生活に直結するサービスを開発する状況。","problem":"ユーザーの真のニーズを満たしたいが、専門家だけで作ると的外れになり、当事者の要望を全部聞くだけでは実現不可能で持続しないデザインになる。","solution":"ユーザーや「元ユーザー」を設計プロセスの共同設計者として巻き込み、専門家は彼らの知恵を実現可能な形にするファシリテーターに徹する。","examples":["メイヨークリニックのSPARCセンター","元受刑者による出所プログラム設計"],"alliance":"廃校の活用プランをコンサルタントに描かせるのではなく、小学生やお年寄りと一緒に「段ボールで原寸大の家具」を作って理想の空間を共同設計する。","notes":""},{"id":12,"layer":"proc","stage":2,"sub":null,"name":"演じるプロトタイプ","en":"Acting Out the Prototype","src":"#41,42,69","context":"複雑な人間関係や抑圧の構造があり、言葉だけの議論では本音が引き出せない状況。","problem":"根本的な解決策を探りたいが、会議室での議論では「建前」しか出ず、当事者は「自分たちが変えられる」という実感を持てない。","solution":"抑圧の状況を演劇にし、観客が代役となり「こう動けば変わる」という解決策を身体を使って演じ直すことで予行演習する。","examples":["被抑圧者の演劇","立法シアター"],"alliance":"「町内会の役員押し付け合い」を寸劇にし、「こう切り返せば丸く収まる」を参加者が代役となって演じ、笑いの中で解決策を探る。","notes":""},{"id":13,"layer":"proc","stage":2,"sub":null,"name":"現場からの絶え間ない改善","en":"Relentless Frontline Improvement","src":"#43,44","context":"組織全体でサービスの質を向上させたいが、現場が受け身になっている状況。","problem":"品質を向上させたいが、トップダウンの指示や事後検査では現場の反発を招き、自発的な当事者意識が育たない。","solution":"「現場の最前線のスタッフこそがイノベーションの知識を持っている」という前提に立ち、ボトムアップで改善を続ける仕組みと権限を与える。","examples":["トヨタの品質サークル","デミングの生産管理手法"],"alliance":"コミュニティスペースのルールをガチガチに決めず、日替わり店長たちが気づいた「これ不便だね」をその日のうちにDIYで改善する壁面ボードを作る。","notes":""},{"id":14,"layer":"proc","stage":2,"sub":null,"name":"眠れる知見と素材の転用","en":"Redirecting Sleeping Knowledge","src":"#45","context":"既存の行政やNGOのリソースだけでは解決できない状況。","problem":"高度な解決策を展開したいが、企業には技術があるが社会課題へ投資する動機がなく、社会的セクターには技術も資本もない。","solution":"民間企業の知識やテクノロジー、あるいは地域に眠る見過ごされた素材を、本来の目的とは全く異なる用途に大胆に転用する。","examples":["グラミン銀行×ダノンの栄養強化ヨーグルト"],"alliance":"「ゴミ」の規格外農作物や森の落ち葉を、高級料亭の飾りなど全く別の市場の素材として再定義し、新たな産業を生む。","notes":""},{"id":15,"layer":"proc","stage":2,"sub":null,"name":"内なる成功者の発見","en":"Positive Deviance","src":"#48","context":"外部からのリソースが限られ、コミュニティが慢性的な課題を抱えている状況。","problem":"外部の「正しい方法」は現場の文化に合わず定着せず、住民自身も「自分たちには無理だ」と諦めている。","solution":"同じ厳しい環境で、なぜか他の人よりうまくやっている「ポジティブな逸脱者」をコミュニティ内部から見つけ出し、その戦略を広める。","examples":["ベトナムの栄養改善（田んぼのカニやエビを混ぜる母親）","院内感染を防ぐ看護師の行動観察"],"alliance":"みんなが「何もない」と嘆く中、ひとり裏山で秘密基地を作って楽しんでるおじいちゃんを発見し、「大人の野遊び講座」として広める。","notes":""},{"id":16,"layer":"proc","stage":2,"sub":null,"name":"極限からの逆輸入","en":"Importing from the Extremes","src":"#49","context":"メインストリーム向けのサービスが行き詰まり、ブレイクスルーが欲しい状況。","problem":"「平均的なユーザー」を対象に調査していると、無難な改善案しか出てこない。","solution":"遠隔地や極端な条件向けに開発されたソリューションから、本質的な洞察を一般向けに逆輸入する。","examples":["障害者向けから生まれたユニバーサルデザイン"],"alliance":"キャンプの道具や知恵を、空き家改修中の「まだ電気・ガスが通っていない期間」を豊かに楽しむツールとして逆輸入する。","notes":""},{"id":17,"layer":"proc","stage":2,"sub":null,"name":"廃墟の再定義","en":"Rethinking Space","src":"#51","context":"廃棄された建物や空き地が地域の重荷になっている状況。","problem":"新しい活動の場が欲しいが資金がない。放置された空間は「負の遺産」として誰も手を出さない。","solution":"廃墟や隙間空間を「不要物」ではなく、制約があるからこそ自由な「創造の余白・資源」として捉え直し、解放して再利用する。","examples":["NYのHigh Line","アムステルダムのWestergasfabriek"],"alliance":"高架下の薄暗い空間を「雨の日でもスケボーやDIYが思い切りできる、騒音ウェルカムな聖地」として意味を裏返す。","notes":""},{"id":18,"layer":"proc","stage":2,"sub":null,"name":"アイデアの公開市場","en":"Open Idea Market","src":"#52,53,54,55,56,58","context":"現場のスタッフや市民が突飛なアイデアを持っているが実現に至らない状況。","problem":"通常の稟議では突飛なアイデアは潰され、「目安箱」ではアイデアが実行されずに終わる。","solution":"公開の市場でアイデアを競わせると同時に、優れた提案に行政や投資家が「即座に応答・実行・支援」するパイプを作る。","examples":["NESTAのBig Green Challenge","ソウル市のアイデアバンク"],"alliance":"飲み会の「こんなことやりたい」を商店街の空き壁面に「妄想ポスター」として貼り出し、通りすがりが「手伝う」シールを貼れるようにする。","notes":""},{"id":19,"layer":"proc","stage":2,"sub":null,"name":"デジタル武装した対話","en":"Digitally Armed Deliberation","src":"#59,60,61,63,66","context":"市民の知恵を広く集めたい状況。","problem":"数千人規模の集会では声の大きい人に支配され、オンライン投票だけでは熟議ができない。","solution":"小グループ対話とリアルタイム集計の電子端末、Wiki共同編集など、デジタル技術とファシリテーションを掛け合わせて「大規模な熟議」を実現する。","examples":["AmericaSpeaksの21世紀型タウンミーティング","NZ警察法Wiki草案"],"alliance":"地域の将来を話し合う場にスマホの匿名投票ツールを導入し、無口な若者の「実はやりたいこと」をスクリーンに可視化する。","notes":""},{"id":20,"layer":"proc","stage":2,"sub":null,"name":"市民の声を編む仕組み","en":"Weaving Citizens' Voices","src":"#65,67,68","context":"賛否の分かれるルールについて判断を下す状況。","problem":"公聴会には特定の利害関係者しか集まらず、一般市民の声が実行まで辿り着く公式ルートがない。","solution":"くじ引きによる「市民パネル」や市民アイデアをルール化する「特別委員会」など、声をすくい上げる制度的構造を組み込む。","examples":["韓国のTribunus Plebis","英国のくじ引き市民陪審員"],"alliance":"お祭りの企画を役員で決めるのではなく、全世帯からくじ引きで選ばれた「10人の実行委員」に予算ごと託す。","notes":""},{"id":21,"layer":"proc","stage":2,"sub":null,"name":"出会いと余白の祭典","en":"Festival of Encounters","src":"#70,71,72,73,74,75","context":"イノベーターが孤立して活動し、知見が共有されていない状況。","problem":"形式張ったカンファレンスでは参加者が「観客」になり、化学反応や自発的な共有が起きない。","solution":"アンカンファレンスや合宿など、非公式なネットワーキング（無目的で安全な余白）を最大化した出会いの場を設計する。","examples":["BarCamp","Dialogue Café"],"alliance":"「地域課題解決会議」をやめ、「持ち寄りBBQ＆焚き火」の場を用意する。火を囲む余白の中でこそ突発的な企みが生まれる。","notes":""},{"id":22,"layer":"proc","stage":2,"sub":null,"name":"まぜこぜの座席配置","en":"Dismantling Power by Seating","src":"#64,76,77","context":"多様な立場が混在する会議やワークショップの状況。","problem":"全員のフラットな知恵を引き出したいが、机の配置がヒエラルキーを強化し、立場の弱い者が萎縮する。","solution":"模型を囲む、円座にする、地べたに座るなど、物理的な座席配置を崩すことで権力関係を強制的に解体する。","examples":["Planning for Real","途上国支援での地べたマッピング"],"alliance":"上座の長机を撤去し、こたつやクッションで車座にして、市長も小学生も「一人の人間」としてフラットに話せるようにする。","notes":""},{"id":23,"layer":"proc","stage":3,"sub":null,"name":"走りながら直す","en":"Fast Prototyping","src":"#81,82,84,85","context":"アイデアの方向性は見えたが、現実に機能するか確信が持てない状況。","problem":"完璧な計画を立てようとすると時間がかかりすぎ、現場に出たときにはニーズが変わっており、大きな失敗コストを払う。","solution":"完璧を目指さず「機能する最小単位」を素早く現場に投入し、フィードバックで絶え間なく軌道修正していく。","examples":["アジャイル開発の社会サービスへの応用","Dialogue Caféの初期プロトタイプ"],"alliance":"完璧なカフェの前に、まず魔法瓶と折りたたみ机だけで「軒先コーヒー」を週末だけ始め、反応を見ながら決めていく。","notes":""},{"id":24,"layer":"proc","stage":3,"sub":null,"name":"凍結された公開実験","en":"Frozen Public Experiments","src":"#87,88,89","context":"新しい政策を全国展開する前に、科学的に効果を証明したい状況。","problem":"モデルを常に進化させると何が効果を生んだかわからず、個別テストではシステム全体が評価できない。","solution":"あえてモデルを一定期間「凍結」し、対照群を設けた比較試験を行う。","examples":["福祉→就労政策のRCT","英国の保健・ケアのシステム全体実証"],"alliance":"「歩行者天国」で揉めている場合、「この1ヶ月だけは変えずに実験する」と決め、交通量や売上のビフォーアフターで白黒つける。","notes":""},{"id":25,"layer":"proc","stage":3,"sub":null,"name":"失敗も共有する公開テスト","en":"Open Testing","src":"#90","context":"未成熟なサービスを社会に実装・普及させようとする状況。","problem":"密室でデータを抱え込むと社会全体の学習が進まず、未完成のままリリースすれば批判を浴びる。","solution":"テストのプロセスと結果（失敗も含む）をリアルタイムに公開し、市民を「実験の共同参加者」にする。","examples":["Googleのプラグインハイブリッド車の排出ガスデータ公開"],"alliance":"空き家DIYリノベで配管を間違えた失敗をSNSで実況中継し、「放っておけない！」と助っ人を呼び込む。","notes":""},{"id":26,"layer":"proc","stage":3,"sub":null,"name":"段階式の応援","en":"Staged Funding","src":"#91,92,93,94","context":"革新的なアイデアを支援したいが成功の保証がなく、リスクが高い状況。","problem":"「確実な成果」を求めすぎると革新的アイデアが選外になり、野放図な支援は浪費になる。","solution":"「スモールスタート」から段階的に支援し、各段階で学びを検証するステージ・ゲートでリスクを分かち合う。","examples":["英UnLtdのステップアップ式助成金","NESTAのBig Green Challenge"],"alliance":"まず「週末イベント費5万円」を渡し、うまくいったら「備品購入10万円」と、小さな挑戦と成功体験に紐づけて資金を出す。","notes":""},{"id":27,"layer":"proc","stage":3,"sub":null,"name":"伴走するインキュベーション","en":"Accompanied Incubation","src":"#96,99,101","context":"優れたアイデアを持つ実践者がいるが、スケールの経験がない状況。","problem":"資金だけ渡してもビジネスプランやノウハウがなく頓挫してしまう。","solution":"資金に加えビジネスサポートを行う仲介組織を伴走させ、知見を組み合わせて事業を育てる。","examples":["英ESRCの研究開発バウチャー"],"alliance":"お金だけ渡して放置せず、先輩実践者が一緒に怒られ一緒に汗を流す「伴走者（兄貴・姉御分）」としてくっつく。","notes":""},{"id":28,"layer":"proc","stage":3,"sub":null,"name":"時間を買い取る","en":"Buying Time","src":"#97,98","context":"最前線のスタッフが有望なアイデアを持っているが日々の業務に殺されている状況。","problem":"現場のスタッフこそがアイデアを持っているが、練る時間が一切なく、異動させると現場感覚が失われる。","solution":"革新的なスタッフの「時間」に対価を支払い、日常業務から切り離してクリエイティブな休暇を与える。","examples":["サバティカル（有給研究休暇）","インハウス・ベンチャー制度"],"alliance":"疲弊している若者に対し、地域の財団が「週1日分の給料」を補填し、プロジェクトに専念できる余白をプレゼントする。","notes":""},{"id":29,"layer":"proc","stage":3,"sub":null,"name":"知識共有を条件とした資金","en":"Funding Conditioned on Sharing","src":"#95","context":"複数組織に資金提供し、それぞれ独立して実験に取り組んでいる状況。","problem":"各組織が孤立すると「同じ失敗」を繰り返し、知恵が社会全体へ波及しない。","solution":"資金の受け取り条件として「実験で得た知識やイノベーション（失敗も含む）の共有」を義務付ける。","examples":["欧州のEQUALプログラム","ヘルス・コラボレーティブ"],"alliance":"支援金の条件を「成功させること」ではなく「失敗した理由を、これから始める人のためにオープンな飲み会で赤裸々に語ること」にする。","notes":""},{"id":30,"layer":"proc","stage":3,"sub":null,"name":"結果への入札による市場創出","en":"Market Creation by Bidding for Results","src":"#102,103,104","context":"行政が解決策を求めているが手法が確立されていない状況。","problem":"従来の入札では既存業者の想定内の提案しか出ず、新技術の初期需要も生まれない。","solution":"手法ではなく「達成すべき結果」を条件に競争的入札を行い、公的機関が最初の顧客となって新市場を創出する。","examples":["EUの競争的対話","DARPA"],"alliance":"「防犯カメラ○台設置」ではなく「通学路の犯罪遭遇率ゼロ」に予算をつけ、「見守り散歩コミュニティ」などの想定外のアイデアにお金が回るようにする。","notes":""},{"id":31,"name":"データを統合して一人の人間を見る","en":"Integrated User-Centred Data","src":"#18","stage":1,"layer":"proc","context":"複数の機関・部門がそれぞれ同じ人についてのデータを持っているが、縦割りで連携していない状況。","problem":"一人の人の状況を総合的に把握してサービスを届けたいが、データが組織ごとに分断されており「部分」しか見えない。同じ家族に対して医療・福祉・教育がバラバラに動いている。","solution":"個人を中心にデータを統合し、クラウド・グリッド等で横断的にパターンを発見できる仕組みを作る。「組織の都合」ではなく「その人の状況」が見える単位にデータ構造を変える。","examples":["英国の電子患者記録（EPR）によるパターン発見","ニューヨーク311サービスの横断データ分析"],"alliance":"「福祉・医療・教育がバラバラに同じ家族を見ている。その家族のことを全部知っている人が誰もいない。」","sub":null},{"id":32,"name":"知識を組織の壁越しに流す","en":"Tools for Handling Knowledge Across a System","src":"#21","stage":1,"layer":"proc","context":"組織内・組織間で重要な知識や情報が分断されている状況。","problem":"知識を共有すれば全体がよくなるとわかっているが、知識は「権力」であり「競争優位」でもあるため、組織は自然に抱え込む方向に向かう。共有を義務にすると抵抗が生まれる。","solution":"ウィキ・情報プラットフォームなど、知識共有を「義務」ではなく「自然な行動」にする仕組みを設計する。知識を出した人にも返ってくる互恵の構造を組み込む。","examples":["米国諜報コミュニティのIntelligedia（機密情報をウィキで共有）","医療機関の横断カルテ"],"alliance":"「隣の自治体でうまくいった手法が3年後にしか届かない。壁を壊さなくても、流れる構造を作ればいい。」","sub":null},{"id":33,"name":"症状の下にある原因を診断する","en":"Diagnosing Root Causes","src":"#34, #35, #36","stage":1,"layer":"proc","context":"同じ問題が繰り返し起きているが、対症療法を繰り返している状況。","problem":"問題を解決したいが、見えている「症状」に対処し続けるだけでは根本が変わらない。原因を探ろうとすると「時間がかかる」「答えが出ない」という圧力に押しつぶされる。","solution":"医療の診断プロセス・システム思考モデルなど、「症状→原因」を体系的に掘り下げる手法を使う。フィードバックループ・複数原因の相互関係を可視化することで、介入すべき急所を見つける。「誰が診断するか」のプロセスに当事者を含めることで、合意と実装が同時に生まれる。","examples":["システム思考による貧困の悪循環の図解","医師の視点で行政課題を診断したケース","地域の健康データを住民と一緒に解釈したカレリアのプロジェクト"],"alliance":"「若者が来ないのは広報が悪いからではなく、来ても居場所がないからだ、と気づくまでに3年かかった。」","sub":null},{"id":34,"name":"思考の癖を意図的に壊す","en":"Creative Thinking Methods","src":"#41","stage":2,"layer":"proc","context":"チームや組織が「いつもの考え方」から抜け出せず、似たようなアイデアしか出ない状況。","problem":"新しい発想を引き出したいが、人は自分の経験と思考パターンの枠の中でしか考えられない。会議を開けば開くほど「常識」が強化される。","solution":"六つの帽子・ラテラルシンキングなど、意図的に思考の枠を壊す方法を持ち込む。「正しい答えを出す」モードから「ありえないことを考える」モードに切り替える装置を使う。","examples":["De Bonoの「六つの帽子」ワークショップ","What If?コンサルタンシーの手法"],"alliance":"「同じメンバーで同じ問いを立てれば同じ答えが出る。問いの立て方を変えるだけで景色が変わる。」","sub":null},{"id":35,"name":"現場に足を運んで見る","en":"Visiting","src":"#50","stage":2,"layer":"proc","context":"他の場所でうまくいっている実践から学びたい、または自分たちの取り組みに自信が持てない状況。","problem":"レポートや報告書を読んでも「本当にそれが機能するのか」が伝わらない。文字になった情報では実践の文脈・温度・失敗が見えない。","solution":"実際に現場を訪問し、実践者と話し、空気を感じる。農業でのモデルファーム視察のように「見て・触れて・感じる」ことが確信と行動への橋渡しになる。","examples":["農業普及でのモデルファーム視察の慣行","ソーシャルイノベーションの実践地への視察ツアー"],"alliance":"「資料を100枚読んでも動けなかった人が、一度現場を見たら翌週から動き始めた。」","sub":null},{"id":36,"name":"考えることと動くことを一体化する場","en":"Think Tanks, Do Tanks and Design Labs","src":"#78, #79, #80","stage":2,"layer":"proc","context":"社会課題の解決策を考えているが、考えることと実践することが分離している状況。","problem":"シンクタンクは提言を出すが実行されない。実践者は動いているが体系的に考える時間がない。理論と実践が別々の組織に分断され、互いに学びを生かせない。","solution":"「考えながら動く」「動きながら考える」を一体化した場（Do tank・Design lab）を設計する。提言より実証、論文より実装を優先する組織文化を作る。デザイン思考・プロトタイピング・ビジュアル思考を政策・社会課題の解決に適用する。","examples":["フィンランドSITRAのHelsinki Design Lab","デンマークMindLabの市民中心設計","Young FoundationのLaunchpad"],"alliance":"「提言書を書く前に、まず一つ動かす。動かした結果が一番説得力のある提言になる。」","sub":null},{"id":37,"name":"新しい能力が育つまで待つ試作","en":"Slow Prototyping","src":"#83","stage":3,"layer":"proc","context":"新しい仕組みを試作しようとしているが、担い手や文化がまだ育っていない状況。","problem":"早く動きたいが、必要な能力・関係・文化がない状態で速く動いても失敗する。かといって「準備が整うまで待つ」では永遠に始まらない。","solution":"能力形成・関係構築・文化醸成を試作の一部として組み込み、時間をかけて育てながら進める。「早く動く」と「確実に根付く」のどちらを優先すべき状況かを見分ける。","examples":["コミュニティ主導の再生プロジェクトで住民の自治能力を育てながら進めた事例"],"alliance":"「このプロジェクトを動かすには、まず人が変わる必要がある。それには1年かかる。それも設計に入れる。」","sub":null},{"id":38,"name":"仲間を集めながら実験する","en":"Partnership Pilots","src":"#86","stage":3,"layer":"proc","context":"実験したいアイデアがあるが、単独では資源・権限・信頼性が足りない状況。","problem":"実験を始めるには複数セクター（行政・NPO・企業）の協力が必要だが、各組織の論理・スピード・利害が違いすぎて、協力関係の形成自体がコストになる。","solution":"パイロットを「実験の場」と同時に「協力関係を育てる場」として設計する。共通の実験に参加することで、組織間の信頼と協働の文化が育ち、本格展開への土台ができる。","examples":["Atlantic PhilanthropiesとアイルランドのNGO・行政による老人ケア官民協働パイロット"],"alliance":"「実験するために仲間を作るのではなく、実験しながら仲間を作る。プロジェクトが関係を生む。」","sub":null},{"id":39,"name":"選ぶ力を当事者に渡す","en":"Vouchers","src":"#99","stage":3,"layer":"proc","context":"支援を必要としている人や組織に資源を届けたいが、提供者側が何が必要かを決めている状況。","problem":"支援したいが、提供者が「何がよいか」を決める構造では受け手のニーズと合わないサービスが押し付けられる。かといって完全自由化では質の保証ができない。","solution":"バウチャー・購買力・個人予算などで「選ぶ力」を直接当事者に渡す。何を買うかを当事者が決めることで、ニーズとサービスが合致し、提供者側も選ばれるために質を上げる。","examples":["ESRCのバウチャー制度（NGOが大学の研究を購入）","英国障害者の個人予算制度"],"alliance":"「何が必要かを決める権力を支援される側に渡す。それだけで関係が変わる。」","sub":null},{"id":40,"name":"集合知で何を育てるかを決める","en":"Collective Voice and Credits","src":"#100","stage":3,"layer":"proc","context":"組織内でどのアイデアや取り組みに資源を投入するかを決める段階。","problem":"上が決めると現場の感覚が反映されない。民主的に決めようとすると人気投票になり、地味だが重要なアイデアが落ちる。","solution":"スタッフが投票・クレジット配分などで「どのアイデアが組織として育てる価値があるか」を集合的に決める仕組みを作る。意思決定への参加が当事者意識も生む。","examples":["組織内イノベーション投票制度","スタッフによるクレジット配分型アイデアポートフォリオ"],"alliance":"「採択されなかったアイデアの人も『プロセスは公平だった』と言えるようになった。それだけで組織の空気が変わった。」","sub":null},{"id":41,"name":"使命とビジネスモデルを一緒に育てる","en":"Innovative Business Models","src":"#105","stage":4,"layer":"proc","context":"社会的アイデアが実証段階を超え、持続的な運営に移行しようとしている。","problem":"社会的使命を守り続けたいが、資金モデルなしには続かない。かといって収益優先にすると使命が形骸化する。","solution":"社会的アイデアとビジネスモデルを最初から一緒に育てる。収益モデルそのものをイノベーションの対象として設計し、ミッションを守る仕組みを組み込む。","examples":["グラミン銀行のマイクロファイナンスモデル","フェアトレード認証の収益設計"],"alliance":"「いいことをしながらお金にもなる、を後付けでなく最初から設計する。」","sub":null},{"id":42,"name":"セクターの地図を読んで陣地を取る","en":"Business Strategies","src":"#106","stage":4,"layer":"proc","context":"社会的ベンチャーが市場・制度の中でどう立ち位置を取るか考える段階。","problem":"良いアイデアがあるのに、どこで勝負するかを決めずに動いて既存プレイヤーに押しつぶされる。","solution":"セクターの「急所（流通・知識管理・重要人材など）」をマッピングし、そこにポジションを取る。戦略的に選ばれた急所を押さえることで、セクター全体の動き方を変えられる。","examples":["フェアトレード認証が小売棚という急所を押さえた事例"],"alliance":"「全部やろうとするな。一点を押さえれば川の流れが変わる場所がある。」","sub":null},{"id":43,"name":"資産を分解して収入源を増やす","en":"Incomes and Outcomes","src":"#107","stage":4,"layer":"proc","context":"社会的ベンチャーが資金源を多様化しようとしている。","problem":"単一の収益モデルに依存していて、その収入が途絶えると組織が止まる。新しい収益を生もうとすると本来の活動から離れるジレンマがある。","solution":"活動の副産物・知識・関係・場所など、見落とされがちな資産を複数の収益源に変換する。本業が生む副産物で収益を取る発想を持つ。","examples":["オープンソースソフトウェアの企業向けサポート収益","コミュニティスペースの時間貸し"],"alliance":"「本業でお金を取れないなら、本業が生む副産物で取る。」","sub":null},{"id":44,"name":"計画は地図ではなく羅針盤として使う","en":"Business Plans","src":"#108","stage":4,"layer":"proc","context":"社会的ベンチャーが資金調達や組織づくりのために事業計画を作る段階。","problem":"完璧な計画を作ろうとすると時間がかかりすぎ、現実と合わなくなる。かといって計画なしでは資金調達も仲間集めもできない。","solution":"事業計画を「未来の設計図」ではなく「活動の羅針盤」として扱う。マイルストーン・優先順位・役割分担を整理するツールとして使い、現実に合わせて更新し続ける。","examples":["アジャイル開発の「動くソフト＞包括的なドキュメント」の社会事業版"],"alliance":"「計画は使い倒すものであって、守るものではない。」","sub":null},{"id":45,"name":"組織の弱いリンクを可視化する","en":"Business Plan Assessment Methods","src":"#109","stage":4,"layer":"proc","context":"社会的ベンチャーが自分たちの弱点を把握し補強したい段階。","problem":"情熱はあるが、何が欠けているかわからないまま動いていて、最も弱いリンクが原因で崩れる。","solution":"複数の軸（技術・市場・資金・チーム・ガバナンス・ネットワーク等）で現在地を可視化し、最も弱いリンクを先に強化する。社会的ベンチャーには「使命・コミュニティ・関係資本」の軸が特に重要。","examples":["Bell-Mason診断の社会版応用","12軸スパイダーチャートによる自己診断"],"alliance":"「熱量はある。でも会計システムがない。それが見えれば直せる。」","sub":null},{"id":46,"name":"法人格を持たない強さ","en":"Informal Structures","src":"#110","stage":4,"layer":"proc","context":"コミュニティ活動が広がり、正式な組織にするか判断を迫られている。","problem":"活動を守るために法人化したいが、法人格を持つと官僚化・義務・コストが生じ、自発性が死ぬ。","solution":"あえて法人格を持たずゆるいネットワーク形態を維持することで、参加者全員がオーナーになり機動的に動ける。法人化は「必要な機能が生まれてから」でいい。","examples":["Un Techo para Chile（20年間無法人で4万棟建設）","AA（アルコホーリクス・アノニマス）"],"alliance":"「法人にしたとたん役員が固定されてつまらなくなった、という声は珍しくない。」","sub":null},{"id":47,"name":"株式会社という器に使命の鍵をかける","en":"Private Companies and Adaptations","src":"#111, #112","stage":4,"layer":"proc","context":"社会的ベンチャーが設立初期の組織形態を選ぶ、または外部資本を受け入れる段階。","problem":"資金調達のために株式会社形態が必要だが、外部資本が入ると使命が守れなくなるリスクがある。標準的な株式会社では投資家の利益優先が強まり使命が後退する。","solution":"配当制限・退出条件の縛り・種類株設計・株主カテゴリの分割・ゴールデンシェアなど、「出資者が財務的利益より使命を優先する」よう最初から設計する。","examples":["L3C（低利益有限会社、米国）","社会的目的条項付き株式会社","拒否権付き黄金株を持つ財団モデル（スカンジナビア型）"],"alliance":"「お金を受け取る前に、何が最優先かを株主間で合意しておく。」","sub":null},{"id":48,"name":"柔軟な共同所有の器","en":"Limited Liability Partnerships","src":"#113","stage":4,"layer":"proc","context":"複数組織が共同で社会的事業を行う際の法的枠組みを選ぶ段階。","problem":"共同責任を明確にしつつ、内部の意思決定は柔軟に保ちたい。","solution":"有限責任パートナーシップ（LLP）など、「有限責任の保護と内部の柔軟性」を両立する法的形態を選ぶ。","examples":["住宅協会と地方自治体のLLPによる低コスト住宅開発","Riversimple（電気自動車プロトタイプ）"],"alliance":"「誰が何に責任を持つか明確にしながら、やり方は自分たちで決める。」","sub":null},{"id":49,"name":"仲間のために動く組合の力","en":"Co-ops and Associations","src":"#114","stage":4,"layer":"proc","context":"地域やコミュニティが共同で事業や活動を営む段階。","problem":"会員のための組織を作りたいが、株式会社では外部論理に引きずられ、任意団体では法的保護も資金調達力もない。","solution":"協同組合・任意団体形態を選ぶ。柔軟性よりレジリエンス（回復力）を重視するとき、特に有効。","examples":["日本の生協","モンドラゴン協同組合（スペイン）"],"alliance":"「メンバーの利益のために動く組織は、危機に強い。」","sub":null},{"id":50,"name":"みんなのものにする相互組合","en":"Mutuals","src":"#115","stage":4,"layer":"proc","context":"サービスや施設を民主的に所有・運営したい段階。","problem":"行政に委ねると官僚化し、民間に委ねると利益優先になる。使命を守りながら大規模に運営できる形が見当たらない。","solution":"相互組合形態で「利用者・働き手・地域」が共同所有する。スポーツクラブ・医療・公共サービスなど幅広く応用できる。","examples":["ウェールズウォーター（公益企業の相互組合化）","英国NHS財団トラスト"],"alliance":"「使う人が持てば、使う人のために動く。」","sub":null},{"id":51,"name":"合意を形にする覚書","en":"Partnerships","src":"#116","stage":4,"layer":"proc","context":"複数の組織が協力関係を築きたいが、正式な法的契約まで至らない段階。","problem":"正式契約は重くてスピードが落ちる。かといって口約束では信頼が担保できない。","solution":"覚書（MOU）で合意の意図を文書化し、関係者の意思を可視化する。法的拘束力より「共通の約束」として機能させる。","examples":["地域連携協定","大学と自治体のMOU"],"alliance":"「契約書を作るほどじゃないけど、言葉にして残しておく。それだけで動く。」","sub":null},{"id":52,"name":"使命を法的に守る器を選ぶ","en":"Charities and Community Interest Companies","src":"#117, #118","stage":4,"layer":"proc","context":"社会的使命を最優先に組織を設計したい、または外部投資を受けながら使命を守りたい段階。","problem":"使命を最優先にしたいが、収益法人では利益配分の圧力がかかる。CICやチャリティ形態ではそれぞれ事業の自由度や資本調達に制約がある。","solution":"公益法人・認定NPO・CIC（コミュニティ利益会社）など、「使命の実現が法的義務または強力な制度的保護」になる形態を選ぶ。CICの「資産ロック＋配当上限」で投資を受けながら使命を守る。","examples":["英国CIC法人格（3261社以上）","Working Rite（若者就業支援CIC）","認定NPO法人制度（日本）"],"alliance":"「使命は言葉ではなく、法的な仕組みで守る。」","sub":null},{"id":53,"name":"理事会を使命と革新の回路にする","en":"Boards for Mission and Innovation","src":"#119, #120","stage":4,"layer":"proc","context":"組織が成長し、正式な理事会が機能し始めている段階。","problem":"理事会は使命を守るためのはずが、現場から遊離した「ブレーキ役」になりがちで、革新的なアイデアが上層部に届かない。","solution":"当事者を理事に入れる・革新担当役割を明示的に設ける・フロントラインから提案が上がる回路を設計する。理事会を「守る」から「つなぐ・推進する」へ転換する。","examples":["ユーザー代表を理事会に入れた英国医療法人の改革","革新チャンピオン役を持つ理事会"],"alliance":"「理事会に当事者の声を入れたら、プログラムが180度変わった。」","sub":null},{"id":54,"name":"総会を使命の更新装置にする","en":"Membership Involvement","src":"#121","stage":4,"layer":"proc","context":"会員制組織が年次総会・会員集会の運営を考える段階。","problem":"総会が形式的な承認の場になり、会員の関与が薄れ、組織の魂が失われていく。","solution":"総会・会員集会を「使命へのコミットメントを更新する儀式」として設計し直す。投票だけでなく対話・表彰・事例共有の場として使う。","examples":["社会運動型NPOの年次総会の対話設計"],"alliance":"「年に一度みんなで集まって、なんでやってるんだっけを確認する。それが組織の体力になる。」","sub":null},{"id":55,"name":"ステークホルダーを構造に組み込む","en":"Stakeholder Governance","src":"#122","stage":4,"layer":"proc","context":"多様な利害関係者がいる組織のガバナンスを設計する段階。","problem":"ステークホルダーの声を活かしたいが、全員の利害を調整しようとすると意思決定が遅くなる。","solution":"定款・株主間契約・パートナーシップ条件などに、各ステークホルダーの権利と責任を構造として組み込む。","examples":["多ステークホルダー型協同組合（働き手・利用者・地域が共同所有）"],"alliance":"「話し合いで解決しようとするな。構造に書いておけ。」","sub":null},{"id":56,"name":"ガバナンスの選び方を可視化する","en":"Open Guides","src":"#123","stage":4,"layer":"proc","context":"組織形態やガバナンスモデルを選ぼうとしているが選択肢がわからない段階。","problem":"専門家に聞かないと選べない。情報が専門家に閉じていて、実践者が自分で判断できない。","solution":"組織形態・ガバナンスモデルの選択肢を比較できるガイド・ウェブツールを整備する。","examples":["One Click Organisations（英国）","非営利法人設立ガイドの整備"],"alliance":"「NPO作りたいけど何から始めていいかわからない人のための地図を作る。」","sub":null},{"id":57,"name":"支援者に株を持ってもらう","en":"Consumer Shareholding","src":"#124","stage":4,"layer":"proc","context":"顧客・支援者をより深く組織に巻き込みたい段階。","problem":"支援者は応援したいが、寄付や購買だけでは「外側の人」のまま。関与度が低く、離脱しやすい。","solution":"小口株主として支援者を迎え入れ、組織の「仲間」にする。財務的リターンより「共同オーナーである感覚」が動機になる。","examples":["Cafédirect（小口株主制度で消費者が共同所有）","Ebbsfleet United（ファンが所有）"],"alliance":"「株を持ってもらったら、友達を連れて来るようになった。」","sub":null},{"id":58,"name":"使命を守るゴールデンシェア","en":"Gold Standards and Golden Shares","src":"#125","stage":4,"layer":"proc","context":"組織が外部資本や制度的圧力にさらされながら使命を守りたい段階。","problem":"時間とともに組織が「普通の会社」に同化していく。初期の社会的性格を維持する仕組みがない。","solution":"ゴールドスタンダード（詳細な使命基準）を定款に組み込み、それを監視する独立機関を設ける。黄金株で特定投資家が過度の影響力を持つのを防ぐ。","examples":["Cafédirectのゴールドスタンダード＋ガーディアンズ制度"],"alliance":"「使命は言葉ではなく、法的な仕組みで守る。」","sub":null},{"id":59,"name":"ヒエラルキーには生き残る理由がある","en":"Hierarchical Organisations","src":"#126","stage":4,"layer":"proc","context":"社会的組織が運営モデルを検討する段階。","problem":"階層型組織は「古い・権威的」と批判されるが、フラットな代替案が必ずしも機能するわけではない。","solution":"ヒエラルキー構造を維持しながら、使命への明示的なコミットを組織文化・評価制度・採用基準に埋め込む。構造の選択より、その構造に何を入れるかが重要。","examples":["使命中心のチャリティ組織のトップダウン文化設計"],"alliance":"「縦割りでも、一番上が使命を本気で語ればチームは動く。」","sub":null},{"id":60,"name":"現場チームに権限を渡す","en":"User Orientation and Autonomous Work Groups","src":"#127","stage":4,"layer":"proc","context":"大規模組織がサービスの質を高め革新を続けようとする段階。","problem":"トップダウンの管理では現場の変化に対応できず、サービスの質が下がる。","solution":"現場の自律チームが利用者の要求に直接応える構造を作る。管理職は「差異の分析と統合」に専念し、現場の判断権を大幅に委ねる。","examples":["VISAのカオーディック組織","トヨタのジャスト・イン・タイム生産"],"alliance":"「現場が決められれば、利用者への返答が10倍速くなる。」","sub":null},{"id":61,"name":"細胞分裂で広がる組織","en":"Distributed Organisations","src":"#128","stage":4,"layer":"proc","context":"社会的ベンチャーが規模を拡大しながら文化を守ろうとする段階。","problem":"大きくなると官僚化・文化の希薄化が起きる。小さいままでは社会的インパクトに限界がある。","solution":"細胞分裂型・フランチャイズ型で、各ユニットが小さく自律しながらネットワークとして規模の経済を享受する。","examples":["Riverford Organic（47,000ボックス/週）のフランチャイズ農場ネットワーク"],"alliance":"「本店を大きくするな。小さい店が増えていく仕組みを作れ。」","sub":null},{"id":62,"name":"段階に合わせてリーダーシップを変える","en":"Dimensions of Management","src":"#129","stage":4,"layer":"proc","context":"社会的ベンチャーが創業期から成長期・安定期へ移行する段階。","problem":"創業期に機能したリーダーシップが成長期には逆効果になる。変えるタイミングがわからず創業者が組織の成長を止めてしまう。","solution":"組織の成長段階に応じて「開拓者→適応者→学習者→種まき者」とリーダーシップを意図的に進化させる。","examples":["スタートアップ創業者がCEOを交代するシリコンバレーの慣習の社会版"],"alliance":"「立ち上げた人が一番邪魔になることがある。それを知っているだけで準備できる。」","sub":null},{"id":63,"name":"革新と日常業務を構造的に分離する","en":"Managing Systems to Maintain Innovation","src":"#130","stage":4,"layer":"proc","context":"組織が安定運営と革新の継続を同時に求められる段階。","problem":"革新的アイデアを持つスタッフが日常業務に追われて革新できない。日常業務の重力が革新を押しつぶす。","solution":"スピンオフ・別チーム・サバティカルなど、「革新」と「運営」を構造的に分離する。革新担当者が運営から切り離される時間を制度的に作る。","examples":["大手NGOのイノベーションラボ設立","Googleの20%ルール"],"alliance":"「革新と運営は同じ人がやると、どちらも中途半端になる。」","sub":null},{"id":64,"name":"仕入れから販売まで使命を一本通す","en":"Socially-Oriented Supply and Demand Chains","src":"#131, #132","stage":4,"layer":"proc","context":"社会的ベンチャーが調達・供給・流通のネットワークを構築する段階。","problem":"最終製品の使命は正しいが、仕入れ先や流通先が使命と矛盾していると全体の信頼が崩れる。","solution":"サプライチェーン全体・流通チェーン全体に使命を埋め込み、透明性自体を価値にする。認証ラベルが「見えないものを見える化」するスイッチになる。","examples":["有機JAS認証のサプライチェーン","フェアトレードの調達基準","イタリア農業協同組合の垂直統合"],"alliance":"「農家の顔が見えるチェーンにした瞬間、値段が3倍でも売れた。」","sub":null},{"id":65,"name":"バックオフィスを複数組織で共有する","en":"Shared Backroom Economies","src":"#133","stage":4,"layer":"proc","context":"小規模な社会的ベンチャーが複数存在し、それぞれが経理・法務・ITを個別に抱えている状況。","problem":"単独では管理コストが高く、本来の活動に集中できない。合併すると独自性が失われる。","solution":"バックオフィスだけを共同化（コンソルティア）し、フロントの活動は独自に保つ。規模の経済を使命を失わずに得る。","examples":["イタリアCNA（職人連合のバックオフィス共同化）","NPO共同事務局"],"alliance":"「3つのNPOが同じ会計士に頼んでいる。だったら一緒にファンドしよう。」","sub":null},{"id":66,"name":"現場の制約に合わせて技術を再設計する","en":"Collaborative Technologies","src":"#134","stage":4,"layer":"proc","context":"社会的事業が現場の制約（農村・低所得地域・インフラ不足）の中で運営される段階。","problem":"先進国向けの技術をそのまま持ち込んでも、コスト・操作性・保守の面で現場に合わず続かない。","solution":"現場の制約を前提として「その場で動く最小の道具」を設計する。専門家が「無理だ」と言っても、現場のニーズに合わせて再設計する。","examples":["グラミン・ダノンの小型ヨーグルト工場（冷蔵不要・女性が運べるサイズ）"],"alliance":"「農村用に作った小型機械が、都市でも売れ始めた。制約が逆輸入を生む。」","sub":null},{"id":67,"name":"外に開き続けることを経営資源にする","en":"Keeping It Open","src":"#135","stage":4,"layer":"proc","context":"組織が成熟し、内向きになり始めている段階。","problem":"日常業務に追われると組織は内側に閉じていく。外部との接触が減ると革新が止まり、使命も形骸化する。","solution":"外部専門家の訪問・オープンな文化・外向きのアイデンティティ構築を「投資」として意識的に維持する。開放性は放置すると失われる資本。","examples":["SEKEMの外部専門家訪問制度（エジプト有機農業企業）"],"alliance":"「よそ者を定期的に招かないと、当たり前が当たり前じゃなくなる感覚を失う。」","sub":null},{"id":68,"name":"利用者の声を経営の背骨にする","en":"Systems for User Feedback","src":"#136","stage":4,"layer":"proc","context":"組織が安定運営期に入り、利用者との距離が広がり始めている段階。","problem":"供給側の論理が強くなり、利用者が本当に必要なものから外れていく。","solution":"ユーザーフィードバックシステムを財務・会計システムと同等の「運営の柱」として設計・維持する。","examples":["NHS Patient Opinion システム","サービスジャーニーマッピング"],"alliance":"「お金の流れを把握するように、利用者の声の流れを把握する。」","sub":null},{"id":69,"name":"ウェブを関係資本の窓にする","en":"Web Presence","src":"#137","stage":4,"layer":"proc","context":"社会的ベンチャーがデジタル上での存在感を構築する段階。","problem":"ウェブサイトを「作ったら終わり」にしがちで、情報が古くなり関係者との接点が失われる。","solution":"ウェブをWiki・フォーラム・ブログ・SNS連携も含めた「生きた窓」として設計し、常に更新・ホストする人材を確保する。","examples":["Ebbsfleet United（ファンと双方向コミュニケーションするウェブチーム）"],"alliance":"「ウェブは作るものじゃなく、育てるものだ。」","sub":null},{"id":70,"name":"ブランドを存在を知らせる炎にする","en":"Marketing and Branding","src":"#138","stage":4,"layer":"proc","context":"社会的ベンチャーが認知と使命伝達を同時に図ろうとしている段階。","problem":"「ブランドにお金をかける」ことへの後ろめたさがある一方、知られなければ使命も届かない。","solution":"ブランドを商業的宣伝ではなく「人を引き寄せる炎」として捉える。使命そのものが伝わるビジュアル・言葉・スタイルを設計する。","examples":["フェアトレードロゴが「正しい選択のシグナル」になった事例"],"alliance":"「ブランドは看板ではなく、人が集まる焚き火だ。」","sub":null},{"id":71,"name":"体験できる場が最も深く伝える","en":"Working Museum and Open Events","src":"#139, #140","stage":4,"layer":"proc","context":"組織が自分たちの文化・精神を外部に伝えたい段階。","problem":"パンフレットや報告書では伝わらない。言葉では文化が伝わらない。実際に見て・触れて・感じてもらわないと理解されない。","solution":"職場・活動現場自体を「動く美術館・ギャラリー」として設計し、訪問者が体験できるプログラムを作る。定期的なオープンイベントで文化を体験させる。","examples":["Vauban（ドイツ・低炭素団地）の見学プログラム","社会的企業のオープンデー"],"alliance":"「モデルルームより本物の現場を見せた方が10倍伝わる。」","sub":null},{"id":72,"name":"知識を手放して信頼を得る","en":"Open Intellectual Property","src":"#141","stage":4,"layer":"proc","context":"社会的ベンチャーが独自の知見・手法・技術を持っている段階。","problem":"知識を公開すれば真似されるかもしれない。囲い込むと普及しないし、仲間も集まらない。","solution":"オープンライセンス・オープンソース思想で知識を解放する。知識を手放すことで「この知識の発信源」としての信頼と関係資本が増し、間接的な収益が生まれる。","examples":["BioRegional（ゼロカーボン住宅設計図をウェブ公開）"],"alliance":"「レシピを公開したら、教えてほしいという依頼が10倍来た。」","sub":null},{"id":73,"name":"共に学ぶ文化を育てる研修を設計する","en":"Formation for Skills and Culture","src":"#142","stage":4,"layer":"proc","context":"組織がスタッフ・ボランティアの能力と文化を育てたい段階。","problem":"技術研修だけでは使命への共鳴が育たない。共鳴だけでは実務能力が足りない。","solution":"技術習得と価値観形成を一体で行う「形成（formation）」プログラムを設計する。","examples":["国家公務員学校（英国）","モンドラゴン大学の実践教育"],"alliance":"「研修で技術を教えるのは簡単だ。でもなぜやるかを伝えるには時間と場が要る。」","sub":null},{"id":74,"name":"給与と評価に使命を刻む","en":"Values-Based Policies for People","src":"#143","stage":4,"layer":"proc","context":"社会的ベンチャーがスタッフの採用・評価・報酬制度を設計する段階。","problem":"使命への共鳴でスタッフを集めても、報酬・評価制度が市場論理だと使命と行動が乖離する。","solution":"給与水準・評価基準・労働条件を組織の使命と整合させる。公平性を可視化し、矛盾を最小化する。","examples":["給与上限比率を設けた社会的企業（最高給与：最低給与＝4:1など）"],"alliance":"「口で使命を語るなら、給与明細にも使命を書け。」","sub":null},{"id":75,"name":"ボランティアに役割と意味を設計する","en":"Valuing the Voluntary","src":"#144","stage":4,"layer":"proc","context":"ボランティアが活動の重要な担い手になっている段階。","problem":"ボランティアに「やりがい搾取」と言われたくない。かといって賃金化すると持続コストが増し、自発性も失われる。","solution":"報酬の代わりに「役割・成長・使命への参加感」を意図的に設計する。ボランティアが「貢献している実感」を持てる仕組みを作る。","examples":["Habitat for Humanity（ボランティア主体組織の設計）"],"alliance":"「お金がないからボランティアを頼む、ではなく、参加すること自体が報酬になる場を設計する。」","sub":null},{"id":76,"name":"使命に共鳴する資金を組み合わせる","en":"Financing Social Ventures","src":"#145, #146, #147, #148, #149, #150, #151","stage":4,"layer":"proc","context":"社会的ベンチャーが持続的な資金調達をしようとしている段階。","problem":"使命を守りながら必要な資金を得たい。助成は使途が制限され、通常融資は条件が合わない。VCは財務リターン優先で使命を歪める。","solution":"グラント・融資・エクイティ・クラウドファンディング・SIBなど多様な資金形態を使命と収益モデルに合わせて組み合わせる。「使命に共鳴する投資家・助成者」を見つけることが鍵。","examples":["UnLtdの個人グラント","Charity Bankの低利融資","UK初のSIB（Peterborough刑務所）","My Football Club（クラウドファンディングで株取得）"],"alliance":"「使命を守りながら資金を取る組み合わせは、設計できる。最初から諦めなくていい。」","sub":null},{"id":77,"name":"政策・プログラムに乗って生き延びる","en":"Public Sustaining Strategies","src":"#152, #153, #154, #155","stage":4,"layer":"proc","context":"イノベーションを公的資金・制度で持続させたい段階。","problem":"プロジェクトが成功しても予算が切れれば終わる。持続的な資金と正当性を得るには制度化が必要だが、制度化すると柔軟性が失われる。","solution":"行政内部でビジネスケースを作る、国・自治体の政策に組み込む、公的プログラムの傘を借りる、規制をイノベーション普及のレバーにするなど、公的な土台を確保しながら独自性を守る交渉を行う。","examples":["英国「延長学校（Extended Schools）」政策への組み込み","SureStart公的プログラム化","都市開発に遊び場設置を義務付ける規制"],"alliance":"「行政の傘を借りて雨をしのぐ。ただし中身は自分たちで決める。」","sub":null},{"id":78,"name":"アイコンになって広がる","en":"Inspiration","src":"#156","stage":5,"layer":"proc","context":"実証済みのアイデアを広く普及させたい段階。","problem":"モデルを広めたいが、強制すると文化が死ぬ。かといってゆるい拡散では質が保てない。","solution":"プロジェクトを「新しいやり方の象徴（アイコン）」として磨き上げ、見学・訪問プログラム・資料を整備する。模倣ではなく「精神の伝染」を狙う。","examples":["レッジョ・エミリア幼児教育（視察プログラム）","BedZed低炭素住宅（見学対応）","San Patrignano（薬物依存回復施設、複数国展開）"],"alliance":"「真似してほしいのはやり方ではなく、精神だ。そのためにここを磨き続ける。」","sub":null},{"id":79,"name":"社会運動として広がる","en":"Distributed Diffusion Through Social Movement","src":"#157","stage":5,"layer":"proc","context":"小さなモデルを大規模に普及させたい段階。","problem":"組織を大きくせずに広めたいが、ゆるい拡散では質が保てない。","solution":"低コスト・資産ゼロのシンプルなモデルで社会運動的に広がる仕組みを作る。企業・コミュニティ・フィランソロピー支援を組み合わせる。","examples":["Pratham（インド）の21州展開──ユニセフ支援から始まりコミュニティ・企業・海外インド人ネットワークを動員"],"alliance":"「広めるのに組織を大きくする必要はない。モデルがシンプルで精神が明確なら、人が運んでくれる。」","sub":null},{"id":80,"name":"情報で需要を作る","en":"Information for Consumers","src":"#158","stage":5,"layer":"proc","context":"消費者・市民の行動を変えたい段階。","problem":"良いサービスがあっても知らなければ選ばれない。規制では反発が起きる。","solution":"無料・低コストの情報提供でユーザーが自ら選択できる状況を作る。知ることが行動変容の第一歩になる。","examples":["禁煙サービスの情報提供","食品ラベル表示","安価なエネルギー診断"],"alliance":"「強制しなくていい。知れば動く人は必ずいる。まず知らせることから始める。」","sub":null},{"id":81,"name":"ユーザーグループが需要を動かす","en":"User Groups and Their Campaigns","src":"#159","stage":5,"layer":"proc","context":"新しいサービスの需要を創り出したい段階。","problem":"良いサービスがあっても行政・企業が動かない。個人の声は無視される。","solution":"ユーザー・消費者・市民グループが情報共有・ロビー活動・悪事例の告発・代替案の展示を通じて需要を作り出し、公共・民間に圧力をかける。","examples":["患者グループによる新薬普及加速","障害者権利運動による建築・政策革新"],"alliance":"「当事者が声を合わせれば、行政は動かざるを得なくなる。」","sub":null},{"id":82,"name":"行動変容をマーケティングする","en":"Promotion and Marketing","src":"#160","stage":5,"layer":"proc","context":"革新的なサービス・行動変容を広く普及させたい段階。","problem":"良いサービスがあっても使われない。情報だけでは行動は変わらない。","solution":"市場調査・セグメンテーション・ターゲットキャンペーンなど、マーケティング手法を社会的目的に応用する。","examples":["英国「5 a day」野菜摂取キャンペーン","NHSの「Change4Life」健康促進キャンペーン"],"alliance":"「良いことをしてほしいなら、良いことをしたくなる仕掛けを作る。」","sub":null},{"id":83,"name":"ブランドとマークで質を保証する","en":"Brands and Marks","src":"#161","stage":5,"layer":"proc","context":"社会的価値のある商品・サービスの市場を拡大したい段階。","problem":"良いものを作っても消費者には違いが見えない。品質・社会的価値を可視化する仕組みがなければ価格プレミアムがつかない。","solution":"認証ブランド・マークを作り、社会的価値の質を保証する。","examples":["オーガニック認証","フェアトレードマーク"],"alliance":"「ラベルひとつで、農家の顔が見えるようになった。」","sub":null},{"id":84,"name":"インセンティブで行動を引き出す","en":"Financial or Other Inducements","src":"#162","stage":5,"layer":"proc","context":"望ましい行動（リサイクル、健康活動等）を促したい段階。","problem":"義務化では反発し、情報提供だけでは動かない。","solution":"賞品・抽選・ポイント・特典など、望ましい行動への直接的なインセンティブを設計する。","examples":["キャンベラのリサイクラー向け賞品抽選","バーミンガムの「Healthy Incentives」"],"alliance":"「スタンプカードひとつで、来なかった人が来るようになった。」","sub":null},{"id":85,"name":"社会目標を設定して革新を引き出す","en":"Social Targets","src":"#163","stage":5,"layer":"proc","context":"社会課題の解決に向けて革新を促したい段階。","problem":"革新を「やれ」と言っても動かない。具体的な目標がなければ向かう先が見えない。","solution":"野心的な社会目標を設定し、その達成方法を競わせる。目標が革新のベクターになる。","examples":["シカゴランド商工会議所の交通利用目標","10:10プロジェクト（英国炭素10%削減）"],"alliance":"「高い目標を立てれば、誰も思いつかなかった方法が出てくる。」","sub":null},{"id":86,"name":"政策と標準で一気に広げる","en":"Public Policy and Standards","src":"#164, #169","stage":5,"layer":"proc","context":"イノベーションを公共政策または市場標準として広めたい段階。","problem":"政策化されなければ点在したまま。標準化しなければ個別採用を待つしかない。どちらも「一気に変える」手段がない。","solution":"既存NGOと協力しながら政策枠組みを設計する、または建築基準・エネルギー効率規制などの標準を設定することで「新しいやり方が当然」の環境を作る。制度の力で市場全体を動かす。","examples":["ニュージーランドSKIPプログラム（子育て支援の政策展開）","炭素ニュートラル校舎基準の設定でグリーン建設市場が生まれた事例"],"alliance":"「規制をうまく使えば、市場全体が一気に変わる。」","sub":null},{"id":87,"name":"規制当局の承認で普及を加速する","en":"Endorsement by Regulators","src":"#165","stage":5,"layer":"proc","context":"医療・公共サービスでイノベーションを広めたい段階。","problem":"承認がなければ調達側が採用を躊躇する。","solution":"規制当局の承認・評価・基準化を通じて「安全・効果的」というシグナルを出す。承認が需要創出のスイッチになる。","examples":["英国NICEによる禁煙サービスの費用対効果認定","GSM・インターネット標準化"],"alliance":"「お墨付きをもらえば、慎重な人も動き始める。」","sub":null},{"id":88,"name":"専門職を通じて中間需要を作る","en":"Creating Intermediate Demand via Professions","src":"#166","stage":5,"layer":"proc","context":"革新的なサービスを専門職経由で広めたい段階。","problem":"最終ユーザーへの直接アプローチはコストが高い。しかし専門職が採用すれば、その先の多くの人に届く。","solution":"専門職が革新的な製品・サービスを選択・推薦する動機と能力を育てる。専門職を「需要の媒介者」として位置づける。","examples":["リサイクル・グリーン素材を建築家が採用する仕組み"],"alliance":"「医師が勧めれば患者は動く。専門職を動かすことが最大の普及戦略だ。」","sub":null},{"id":89,"name":"ベストプラクティスを賞で伝える","en":"Dissemination of Best Practice","src":"#167","stage":5,"layer":"proc","context":"優れた実践を組織間で共有したい段階。","problem":"優れた実践があっても広く知られない。報告書では伝わらず、現場には届かない。","solution":"表彰制度で優れた実践を公式に認め、受賞者が見学・学習の場を提供する仕組みを作る。","examples":["英国ビーコン賞（地方自治体の優れた取り組みを表彰し学習訪問を促進）"],"alliance":"「賞は名誉だけでなく、教える義務を付与する。それが知識を動かす。」","sub":null},{"id":90,"name":"グローバルに普及を促す","en":"Global Diffusion","src":"#168","stage":5,"layer":"proc","context":"実証済みモデルを国際規模で展開したい段階。","problem":"良いモデルが途上国に届かない。押し付けると現地文脈に合わない。","solution":"実証済みモデルの採用を奨励しながら援助と連動させる。グローバルなプログラムが知識の流通インフラになる。","examples":["世界銀行Global Programme on Output-Based Aid"],"alliance":"「良いものが世界中で再発明されている。一度つながれば伝わる。」","sub":null},{"id":91,"name":"委託を革新の入口にする","en":"Commissioning Innovative Services","src":"#170","stage":5,"layer":"proc","context":"公共機関が新しいサービスモデルを導入したい段階。","problem":"既存の発注プロセスでは「実績のある業者・方法」しか採用されない。","solution":"委託（コミッショニング）を革新の実験の場として設計する。社会的企業・NPOとの協働で新しい実践モデルを試す。","examples":["英国地方政府が社会的企業に委託して新サービスモデルを実験"],"alliance":"「発注書の書き方を変えれば、全く違う提案が来る。」","sub":null},{"id":92,"name":"成果で発注する","en":"Outcomes Based Commissioning","src":"#171","stage":5,"layer":"proc","context":"公共サービスの委託設計を変えたい段階。","problem":"手法指定発注では提供者が「言われたことをする」だけになり革新が生まれない。","solution":"「何を達成するか（成果）」だけを定義し、「どうやるか（手法）」は提供者に委ねる。","examples":["英国Local Area Agreements（地域ごとの成果目標設定と自由な実施）"],"alliance":"「方法は聞かない。この街の再犯率をゼロにしてくれ、と言う。」","sub":null},{"id":93,"name":"政府が最初の顧客になる","en":"Developing New Markets","src":"#172","stage":5,"layer":"proc","context":"革新的な技術・サービスの市場がまだない段階。","problem":"最初の顧客がいなければ市場は生まれない。鶏と卵の問題。","solution":"政府が「最初の顧客」として購入・フィードバックを行い、市場創出のスイッチになる。","examples":["DARPAのインターネット開発投資","政府によるグリーン技術の先行調達"],"alliance":"「行政が最初に買えば民間が続く。行政は最強のアーリーアダプターだ。」","sub":null},{"id":94,"name":"競争で革新の多様性を生む","en":"Contestability and Multiple Providers","src":"#173","stage":5,"layer":"proc","context":"公共サービスに革新を取り込みたい段階。","problem":"単一提供者が独占すると革新が止まる。","solution":"複数の提供者が競争できる市場構造を設計し、多様な革新が生まれる環境を作る。","examples":["NHS内での選択・競争導入","学校の成績公開と独立評価"],"alliance":"「一社独占では変わらない。複数が競えば最低限動く。」","sub":null},{"id":95,"name":"現場の専門職に委託権限を渡す","en":"Practice-based Commissioning","src":"#174","stage":5,"layer":"proc","context":"医療・福祉などで、現場の専門職が最もニーズを知っている状況。","problem":"調達の権限が中央に集中しているため、現場のニーズと委託されるサービスが合わない。","solution":"フロントラインの医師・専門職に「仮想予算」を与え、患者・利用者のために最適なサービスを選択・委託できる権限を与える。","examples":["英国NHSの実践基盤コミッショニング（GPに予算権限）"],"alliance":"「現場の人間が選べれば、全く違うサービスが選ばれる。」","sub":null},{"id":96,"name":"結果に対して固定料金を払う","en":"Payment by Results","src":"#175","stage":5,"layer":"proc","context":"医療・公共サービスの効率と質を同時に上げたい段階。","problem":"件数×固定費払いでは難しいケースを避けるインセンティブが生まれる。","solution":"サービス種別ごとに全国標準の固定料金を設定し、資金が患者・ニーズに従って動くようにする。","examples":["NHS「Payment by Results」タリフ制度"],"alliance":"「お金が人についていけば、サービスが人に寄ってくる。」","sub":null},{"id":97,"name":"発見のための探索的契約","en":"Exploratory Service Contracts","src":"#176","stage":5,"layer":"proc","context":"革新の初期段階で、まだ何が有効かわからない段階。","problem":"革新を支援したいが、成果が見えない段階では通常の調達・助成の仕組みが使えない。","solution":"「何が有効かを発見すること」を目的とした探索的契約・ブルースカイ研究プログラムを設ける。","examples":["英国ブルースカイ研究プログラム"],"alliance":"「答えが出るかわからない問いに投資する。それが一番大きなリターンを生むことがある。」","sub":null},{"id":98,"name":"調達の仕組み自体を革新する","en":"E-procurement, E-auctions and Framework Contracts","src":"#177, #178, #179","stage":5,"layer":"proc","context":"公共機関がより多様な提供者から、より効率よく調達したい段階。","problem":"調達プロセスが複雑・コスト高で小規模・革新的な提供者が参入できない。毎回一から入札すると双方にコストがかかる。通常入札では最適価格に収束しにくい。","solution":"電子調達・電子入札・フレームワーク契約を組み合わせて調達の参入障壁・コスト・非効率を同時に解消する。","examples":["英国公共調達ポータル「Buying Solutions」","複数自治体共同調達でのE-auctions活用（10%コスト削減）"],"alliance":"「入口を広げるだけで全く違う提案者が来る。」","sub":null},{"id":99,"name":"購入の約束が革新を引き出す","en":"Commitments from Commissioners","src":"#180","stage":5,"layer":"proc","context":"革新的な製品・サービスの開発投資を促したい段階。","problem":"「買ってもらえるかわからない」から革新的な提供者が投資できない。","solution":"「開発に成功したら買う」という事前購入コミットメントを公表することで、革新への投資リスクを下げる。","examples":["ワクチン開発の前払い市場コミットメント（AMC）"],"alliance":"「作ったら買う、と先に言うだけで、誰も作らなかったものが作られる。」","sub":null},{"id":100,"name":"複数機関が共同で委託する","en":"Joint Commissioning","src":"#181","stage":5,"layer":"proc","context":"複雑なニーズを持つ人々へのサービスを設計する段階。","problem":"複数の機関が関わる問題は単一機関では解決できない。各機関が別々に委託すると隙間が生まれ重複も起きる。","solution":"複数の委託機関が共同で委託責任を持ち、総合的なサービスを設計・調達する。","examples":["英国の薬物対策チーム","子ども・青少年精神保健サービスの共同委託"],"alliance":"「縦割りの予算を横につなぐだけで、全く違うサービスが設計できる。」","sub":null},{"id":101,"name":"節約分を革新者に還元する","en":"Share in Savings Contracts","src":"#182","stage":5,"layer":"proc","context":"公共機関の業務効率化で革新投資を促したい段階。","problem":"効率化の利益が委託者に全帰属すると、提供者に効率化のインセンティブがない。","solution":"提供者が初期投資し、生まれた節約分を委託者と分かち合う契約設計。","examples":["米国情報技術管理改革法（1996）のShare in Savings試験プログラム"],"alliance":"「効率化した分半分戻ってくる。それだけで誰もやらなかった工夫が生まれる。」","sub":null},{"id":102,"name":"予算を当事者に直接渡す","en":"Personalised Budgets","src":"#183","stage":5,"layer":"proc","context":"継続的なケアが必要な人へのサービスを設計する段階。","problem":"標準的なケアパッケージは個別ニーズに合わない。","solution":"利用者に予算を直接配分し、自分のニーズに合ったサービスを自ら購入・設計できるようにする。","examples":["英国「In Control」──70,000人が直接支払いを受ける","スウェーデン・オレゴン州の個人予算"],"alliance":"「お金を渡してしまえば、専門家が考えた以上のことを本人がやる。」","sub":null},{"id":103,"name":"組織から革新を切り出す","en":"Developing Organisational Capacity to Diffuse Innovation","src":"#184","stage":5,"layer":"proc","context":"大きな組織から革新を分離・独立させたい段階。","problem":"革新的なアイデアが大組織の中で生まれても慣性に飲み込まれる。","solution":"分社化のように一定規模になったら独立させ、親組織が支援しながら競合として育てる。","examples":["日本の分社経営（Bunsha）モデル"],"alliance":"「大きくなったら切り出す。切り出されたものが次の親になる。」","sub":null},{"id":104,"name":"人を育てて広げる","en":"Growth Through People","src":"#185","stage":5,"layer":"proc","context":"革新を人材育成を通じて広めたい段階。","problem":"アイデアは広まっても実行できる人がいなければ機能しない。","solution":"アカデミー・見習い・研修プログラムを通じて、革新を担える人材を増やす。人が革新を運ぶ媒体になる。","examples":["Everdale（カナダ）──有機農家の次世代を育てる農場"],"alliance":"「やり方より、やれる人を増やす。人が最大のスケール手段だ。」","sub":null},{"id":105,"name":"既存組織の力を使って広げる","en":"Mobilising Existing Organisational Capacity","src":"#186","stage":5,"layer":"proc","context":"革新を既存の組織ネットワークを通じて広めたい段階。","problem":"新しい組織を作ってスケールするにはコストがかかる。","solution":"既存の組織を共通の目標のもとで連携させ革新を広める。","examples":["RNIB（英国視覚障害者協会）が他組織をVision 2020 UKに結集"],"alliance":"「新しく作らなくていい。もうある力を束ねればはるかに大きな動きになる。」","sub":null},{"id":106,"name":"移転と適応の支援構造を作る","en":"Support Structures for Diffusion","src":"#187","stage":5,"layer":"proc","context":"革新を別の文脈に移転・適応させたい段階。","problem":"革新の移転はコピーでは機能しないが毎回ゼロから適応するのは非効率。","solution":"移転パッケージ・適応プロセス・学習支援の仕組みを整備する。「コピーではなく翻訳」のための辞書を用意する。","examples":["NHS「Adapt and Adopt」プログラム"],"alliance":"「コピーではなく翻訳。翻訳のための辞書を用意する。」","sub":null},{"id":107,"name":"供給チェーンを成長に合わせる","en":"Securing Adequate Supply Chains","src":"#188","stage":5,"layer":"proc","context":"革新的なモデルを大規模に展開しようとする段階。","problem":"アイデアは広がっても支える供給が追いつかない。","solution":"供給側の能力形成を先行投資として行い、供給の同期化を設計する。","examples":["フェアトレードラベル組織（FLO）による生産者側供給能力の向上支援"],"alliance":"「作れる人を増やさないと、需要が来ても応えられない。」","sub":null},{"id":108,"name":"モデルを削ぎ落としてコストを下げる","en":"Adapting Models to Reduce Costs","src":"#189","stage":5,"layer":"proc","context":"革新的なモデルを低コスト・大規模に展開したい段階。","problem":"革新的なモデルは複雑でコストが高くスケールに耐えられない。","solution":"本質を保ちながら手続き・資産・要件を最小化する。シンプルなモデルがより広く使われる。","examples":["ASA（バングラデシュ）がグラミン銀行モデルを簡素化し大規模展開"],"alliance":"「余計なものを削れば削るほど広がる。」","sub":null},{"id":109,"name":"オープンブランドで一緒に広げる","en":"Open Brands","src":"#190","stage":5,"layer":"proc","context":"ブランドを使って革新を広めたい段階。","problem":"クローズドブランドは品質管理できるが広がりが遅い。完全なオープンでは質がバラバラになる。","solution":"共通のコア価値を持ちながら他者が参加・発展できるオープンブランドを設計する。","examples":["フェアトレード運動のオープンブランド戦略"],"alliance":"「核心さえ守ればあとは自由にやっていい。そのほうが早く広がる。」","sub":null},{"id":110,"name":"プラットフォームで自己組織化を支援する","en":"Platforms","src":"#191","stage":5,"layer":"proc","context":"多くの人が革新を採用・拡散できるようにしたい段階。","problem":"中央が全部コーディネートするのはスケールしない。","solution":"人々が自律的に参加・協働できるプラットフォームを提供する。道具と資源を渡せば、人々が自ら組織化する。","examples":["netsquared.org（社会変革プロジェクトのプラットフォーム）"],"alliance":"「場と道具を用意すれば人が動く。全部指示しなくていい。」","sub":null},{"id":111,"name":"集まる場が普及と出会いを生む","en":"Events and Trade Fairs","src":"#192, #193","stage":5,"layer":"proc","context":"革新的なサービス・実践を広く知らせ、革新者同士をつなぎたい段階。","problem":"革新的なサービスがあっても必要な人に届かない。革新者が孤立しており互いに学ぶ機会も投資家と出会う機会もない。","solution":"無料イベント・映画上映・見本市・展示会を使って、サービスを直接届ける場と、革新者が出会う場を同時に設計する。","examples":["メキシコのCinepop──無料映画上映を活用したサービス宣伝","エコ建築見本市での社会革新普及"],"alliance":"「来てもらえる理由を作れば届けられる。同じ方向を向いた人が集まれば何かが始まる。」","sub":null},{"id":112,"name":"メディアを通じて拡散する","en":"Diffusion Through Media","src":"#194","stage":5,"layer":"proc","context":"革新的な実践を社会全体に広めたい段階。","problem":"メディア露出だけでは一過性で終わる。","solution":"メディアを広める起点として使いながら、プレゼンター育成・実践ネットワーク形成まで設計する。","examples":["「Jamie's School Dinners」→信託設立","アル・ゴアのスライドショー→2500人のプレゼンター養成"],"alliance":"「テレビで話題になって終わりではなく、テレビを入口にして動く人を作る。」","sub":null},{"id":113,"name":"専門家団体が知識を循環させる","en":"Associations and Professional Bodies","src":"#195","stage":5,"layer":"proc","context":"特定分野で革新的な実践を専門職間で広めたい段階。","problem":"革新的な実践者が孤立し専門職全体への浸透が遅い。","solution":"学会・専門家団体の会議・出版物・ネットワークで革新的実践を専門職コミュニティに循環させる。","examples":["各種学会の年次大会・機関誌による実践知の流通"],"alliance":"「専門職が集まる場で話せば一気に広がる。」","sub":null},{"id":114,"name":"知識を手放して橋渡しをする人","en":"Intermediaries and Barefoot Consultants","src":"#196, #199","stage":5,"layer":"proc","context":"革新的な実践をより広い文脈に広めたい段階。","problem":"革新者と採用したい組織の間に橋がなく知識とリソースが結びつかない。専門家は知識を囲い込むことで収益を得るインセンティブがある。","solution":"革新者と採用者をつなぐ仲介組織を育てる。知識を開放し教育者として振る舞う「裸足のコンサルタント」モデルで信頼・ネットワーク・間接的収益を得る。","examples":["英国IDeA（地方政府の革新仲介）","Barefoot College（ラジャスタン）──18か国の農村女性に太陽光エンジニアリングを無償で教授"],"alliance":"「全部教えても次の仕事は来る。むしろ教えるから次の仕事が来る。」","sub":null},{"id":115,"name":"ウェブとバイラルで拡散する","en":"Diffusion Through the Web","src":"#197","stage":5,"layer":"proc","context":"社会的アイデアをデジタルで急速に広めたい段階。","problem":"良いアイデアがあっても既存のネットワーク外に届かない。","solution":"バイラルマーケティングの原理を社会革新に応用し、既存の社会ネットワークを通じてアイデアを広める。","examples":["SwarmTribes（NESTA）──蟻・蜂・ガチョウ・イルカの群れ行動原理を応用したコミュニティ参加プラットフォーム"],"alliance":"「バイラルは設計できる。どこから始まれば広がるかを考える。」","sub":null},{"id":116,"name":"ハンドブックで知識を届ける","en":"Handbooks and How-to Guides","src":"#198","stage":5,"layer":"proc","context":"革新的な実践を多くの人が使えるようにしたい段階。","problem":"実践知が専門家の頭の中に留まり他の文脈で使われない。","solution":"ツールキット・口述記録・データベース・マニュアルで実践知を形式化し、誰でも参照できるようにする。","examples":["Open Business──オープンビジネスモデルのデータベース"],"alliance":"「書けば残る。残れば次の人が使える。」","sub":null},{"id":117,"name":"組織を大きくして広げる","en":"Organisational Growth","src":"#200","stage":5,"layer":"proc","context":"革新を組織成長によって広めようとする段階。","problem":"組織を大きくすることはスケールの最もシンプルな方法だが多くの社会的企業には難しい。","solution":"組織成長の可能性と限界を認識し、成長が本質を守れる場合にのみ選択する。","examples":["大きくなることで使命を失った社会的企業の反面教師"],"alliance":"「大きくなることは目的ではない。大きくなって本質が守れるかを先に問う。」","sub":null},{"id":118,"name":"協働で能力と影響力を増やす","en":"Growth Through Collaboration","src":"#201","stage":5,"layer":"proc","context":"単独では限界のある社会的課題に取り組む段階。","problem":"革新を広げたいが単独では資源・専門性・影響力が足りない。","solution":"明確な目的のもとで協働する。協働が個別の能力を超えた影響力・知識・規模を生む。","examples":["実践コミュニティを通じた協働による革新"],"alliance":"「一人では届かない。でも合わせれば届く。」","sub":null},{"id":119,"name":"大きなシステムの中に小さなユニットを置く","en":"Small Units in Large Systems","src":"#202","stage":5,"layer":"proc","context":"大規模な組織の中で革新の柔軟性を保ちたい段階。","problem":"大きな組織は効率的だが革新が生まれにくい。小さな組織は革新的だが孤立する。","solution":"大きなシステムの中に自律した小さなユニットを分散配置する。","examples":["社会的企業のフランチャイズ型分散ネットワーク"],"alliance":"「大きな傘の下に小さな自由な場を作る。」","sub":null},{"id":120,"name":"コンソルティアで中小が協働する","en":"The Consortium Model","src":"#203","stage":5,"layer":"proc","context":"小規模な組織がスケールメリットを得たい段階。","problem":"小規模であることの独自性を保ちながらスケールが必要な機能を確保したい。","solution":"コンソルティアを形成しメンバーが集合的に管理しながら共同サービスを受ける。","examples":["イタリア「第三のイタリア」の中小企業コンソルティア"],"alliance":"「合わせれば大きくなれる機能と一人でやるべき機能を分ける。」","sub":null},{"id":121,"name":"核心だけ共有して現地が自律する","en":"Federations and Social Franchising","src":"#204, #206","stage":5,"layer":"proc","context":"革新的なモデルを多くの地域・文脈で展開したい段階。","problem":"中央集権的展開では文化と柔軟性が失われる。完全分散では共通価値が保てない。品質を保ちながら展開したいが中央管理と現地柔軟性の間に緊張がある。","solution":"各地に熱心な実践者を見つけ、大きな自律性を与えながら共通の価値・ブランド・サポートでつなぐ。コアだけ共有してあとは現地が担う。","examples":["Age Concern・エマオのフェデレーション","School for Social Entrepreneurs（ロンドン＋7拠点、フランチャイズ料£10,000）"],"alliance":"「核心だけ共有してあとは現地がやる。そのほうがずっと速く広がる。」","sub":null},{"id":122,"name":"ライセンスで革新を知的財産にする","en":"Licensing","src":"#205","stage":5,"layer":"proc","context":"革新的な手法を他者が使えるようにしたい段階。","problem":"ライセンスすれば収益が得られるが知的財産保護が難しく、アクセス制限が普及を妨げる。","solution":"ライセンスの可能性と限界を慎重に判断する。普及から得られる社会的インパクトと収益を比較する。","examples":["社会セクターでのライセンス活用と普及妨害の事例"],"alliance":"「守ることで得られる収益と開放することで生まれる影響力を比べる。」","sub":null},{"id":123,"name":"合併・買収で規模と能力を得る","en":"Mergers and Acquisitions","src":"#207","stage":5,"layer":"proc","context":"一から構築する時間とコストなしに規模・技術・能力が必要な段階。","problem":"単独では到達できない規模・能力が必要だが一から構築できない。","solution":"他の組織との合併・買収によって規模拡大・リスク分散・新技術獲得を図る。","examples":["Age UK──Age Concern EnglandとHelp the Agedの合併（2009年）"],"alliance":"「二つが一つになることでどちらにもできなかったことができる。」","sub":null},{"id":124,"name":"標準的な投資評価を使う","en":"Standard Investment Appraisal","src":"#208","stage":5,"layer":"proc","context":"社会的投資の価値を評価しなければならない段階。","problem":"社会的事業の価値は通常の財務指標では捉えられない。","solution":"標準的な投資評価手法を出発点として使い、社会的価値の要素を追加していく。まず共通言語で話す。","examples":["VC12軸診断モデルの社会版への応用"],"alliance":"「まず通じる言葉で話す。そこから社会的価値の話を始める。」","sub":null},{"id":125,"name":"費用便益分析で社会的価値を示す","en":"Cost-Benefit Analysis","src":"#209","stage":5,"layer":"proc","context":"社会的プログラムへの投資判断が必要な段階。","problem":"市場外の社会的便益が見えない。意思決定者は数字がないと動かない。","solution":"費用便益分析を使い市場外の価値を金銭的に定量化する。","examples":["オランダのポルダーダム高さ決定における費用便益分析"],"alliance":"「数字にすることで今まで比べられなかったものが比べられるようになる。」","sub":null},{"id":126,"name":"人々の意向を価格にする","en":"Stated Preference Methods","src":"#210","stage":5,"layer":"proc","context":"市場取引のない社会的価値を測定したい段階。","problem":"公共サービス・環境・文化的価値には市場価格がない。","solution":"「いくら払うか」を人々に尋ねることで総価値を推計する。","examples":["公園・生態系サービスへの支払意思額調査"],"alliance":"「値段がつかないものでも人は心の中で値段をつけている。それを引き出す。」","sub":null},{"id":127,"name":"行動から価値を推計する","en":"Revealed Preference Methods","src":"#211","stage":5,"layer":"proc","context":"直接的な価値表明が難しい社会的財の価値を測定したい段階。","problem":"人々は本当の支払意思額を正直に答えない場合がある。","solution":"トラベルコスト法・ヘドニック価格法など実際の選択行動から価値を推計する。","examples":["自然公園への旅行コスト分析による訪問価値の推計"],"alliance":"「何をしたかを見れば何を大切にしているかがわかる。」","sub":null},{"id":128,"name":"GDPを超える指標で社会を測る","en":"Social Accounting and Beyond GDP","src":"#212","stage":5,"layer":"proc","context":"経済成長以外の社会的進歩を政策に反映したい段階。","problem":"GDPは社会的幸福・環境・無償労働を見えなくする。","solution":"GDPを補完する社会勘定行列・サテライト勘定を開発する。","examples":["OECD「Beyond GDP」プログラム"],"alliance":"「何を測るかが何を大切にするかを決める。」","sub":null},{"id":129,"name":"QALYで医療の費用対効果を測る","en":"QALYs and DALYs","src":"#213","stage":5,"layer":"proc","context":"医療政策・介入の費用対効果を比較・判断する段階。","problem":"単純な金銭指標では医療介入の比較ができない。","solution":"QALY・DALYで生命の質と量を組み合わせた指標で医療介入を比較する。","examples":["NICEによるQALYを使った医療技術評価"],"alliance":"「何年生きたかではなくどれだけ質の高い生を生きたかを数える。」","sub":null},{"id":130,"name":"患者自身が健康状態を報告する","en":"Patient-Reported Outcomes","src":"#214","stage":5,"layer":"proc","context":"医療サービスの質を患者視点で評価したい段階。","problem":"専門家判定だけでは患者の実感・生活の質が見えない。","solution":"PROMs・EQ-5Dなど患者自身が健康状態を評価するツールを使う。","examples":["NHS Patient-Reported Outcome Measurements"],"alliance":"「専門家が良くなったと言っても本人が良くなったと感じなければ意味がない。」","sub":null},{"id":131,"name":"学校の付加価値を測る","en":"Value-Added Measures in Education","src":"#215","stage":5,"layer":"proc","context":"学校の教育成果を公平に評価したい段階。","problem":"試験成績だけで評価すると恵まれた生徒が多い学校が有利になる。","solution":"入学時と卒業時の学力を比較し学校がどれだけ「付加価値」を生んだかを測る。","examples":["英国の付加価値指標（VA）による学校評価"],"alliance":"「出発点が違う子どもたちにどれだけ寄り添えたかを測る。」","sub":null},{"id":132,"name":"社会的インパクトを総合評価する","en":"Social Impact Assessment","src":"#216","stage":5,"layer":"proc","context":"社会的プログラム・政策の総合的影響を評価したい段階。","problem":"社会的介入の効果は複雑で多面的。単一指標では捉えられない。","solution":"BACO比率・CHIP手法等で確率・リターン・コストを推計して投資判断を支援する。","examples":["Acumen FundのBACO（Best Available Charitable Option）比率"],"alliance":"「お金の使い道を比べるには同じ物差しで測る必要がある。」","sub":null},{"id":133,"name":"社会的投資収益率で価値を示す","en":"Social Return on Investment","src":"#217","stage":5,"layer":"proc","context":"社会的プログラムへの投資価値を関係者に示したい段階。","problem":"社会的活動の価値は財務リターンとして見えない。","solution":"SROIで社会的・経済的リターンを統合した「投資収益率」として表現する。ただし対話プロセスとして使う。","examples":["REDF（米国）によるSROI開発"],"alliance":"「社会的価値も投資家が理解できる言葉に翻訳する。数字は対話の入口だ。」","sub":null},{"id":134,"name":"社会勘定で組織の社会的影響を可視化する","en":"Social Accounting","src":"#218","stage":5,"layer":"proc","context":"組織が社会・環境への影響を報告したい段階。","problem":"財務報告だけでは社会的影響が見えない。","solution":"社会的バランスシートで100〜400の指標により組織の社会的影響を可視化・報告する。","examples":["フランスBilan Sociétal","イタリアBilancio Sociale"],"alliance":"「財務だけが本当のことを言っているわけではない。社会へのインパクトも帳簿に書く。」","sub":null},{"id":135,"name":"社会的・経済的リターンを混ぜた価値を測る","en":"Blended Value Methods","src":"#219","stage":5,"layer":"proc","context":"社会的・経済的リターンを同時に追求する投資の価値を示したい段階。","problem":"投資家が「社会的価値か財務リターンか」の二択を迫られ両方を追求する価値を示せない。","solution":"ブレンデッドバリューで社会的・経済的リターンを統合して示す。","examples":["ジェド・エマーソンのBlended Value Map"],"alliance":"「社会的価値と財務的価値は同じものの二つの顔だ。」","sub":null},{"id":136,"name":"公共価値を測る","en":"Measuring Public Value","src":"#220","stage":5,"layer":"proc","context":"公共政策・公共サービスの価値を示したい段階。","problem":"公共サービスの価値は市場価格では測れないが費用の正当性を示す必要がある。","solution":"公共価値論（マーク・ムーア）を使い市民が国家に与える機会費用との交換として価値を測る。","examples":["BBCが公共価値測定を意思決定ツールとして活用"],"alliance":"「市民が何を差し出してでも得たいと思うか。それが公共価値の本質だ。」","sub":null},{"id":137,"name":"生活満足度で政策を比較する","en":"Life Satisfaction Measures","src":"#221","stage":5,"layer":"proc","context":"社会的介入・政策の効果を生活の質から比較したい段階。","problem":"従来の指標では生活の質が見えない。","solution":"生活満足度（ウェルビーイング）指標で異なる政策を比較する。","examples":["家庭の安全対策投資が家屋修繕の3%コストで4倍の生活満足度向上をもたらした研究"],"alliance":"「人が幸せかどうかが一番の成果指標だ。」","sub":null},{"id":138,"name":"建築環境の価値を多手法で測る","en":"Methods Within the Built Environment","src":"#222","stage":5,"layer":"proc","context":"建築・都市開発投資の社会的・経済的価値を評価したい段階。","problem":"建築環境の価値は複雑で多次元。単一手法では捉えられない。","solution":"30種類近い評価手法を組み合わせて総合評価する。","examples":["Young Foundation研究──建築環境の30近い評価手法の整理"],"alliance":"「建物の価値はお金だけではない。それを測る手法は30種類ある。」","sub":null},{"id":139,"name":"運用データから改善の契機を掴む","en":"Operational Metrics","src":"#223","stage":5,"layer":"proc","context":"継続的なサービス改善を行いたい段階。","problem":"問題があってもデータがなければ見えない。見えなければ改善できない。","solution":"統計的工程管理で運用データをリアルタイム分析し、問題顕在化前に変動を検出して改善の契機にする。","examples":["公営住宅修繕データ分析──変動増大を検出しシステム再設計で平均8日に短縮"],"alliance":"「現場のデータを見れば問題がどこにあるか必ず出てくる。」","sub":null},{"id":140,"name":"比較することで学ぶ","en":"Comparative Metrics","src":"#224","stage":5,"layer":"proc","context":"組織・政策の相対的パフォーマンスを評価・改善したい段階。","problem":"自分たちが良いのか悪いのか単独では判断できない。","solution":"ベンチマーキング・コスト比較・同僚評価・コンペで比較し改善の方向を見つける。","examples":["NYPDのコンパスタットシステム","学校査察"],"alliance":"「隣と比べることで自分がどこにいるかがわかる。」","sub":null},{"id":141,"name":"バランスト・スコアカードで戦略と現場をつなぐ","en":"Balanced Scorecards","src":"#225","stage":5,"layer":"proc","context":"組織の戦略目標と現場の業務を整合させたい段階。","problem":"財務指標だけでは組織の健全性が測れない。戦略と現場の整合が見えない。","solution":"財務・顧客・内部プロセス・学習と成長の4軸でパフォーマンスを測り整合性を可視化する。","examples":["バランスト・スコアカードの社会的企業への応用"],"alliance":"「お金だけ見ていると大事なことを見落とす。」","sub":null},{"id":142,"name":"評価に利用者の声と経験を組み込む","en":"User-Oriented Metrics and Experience Surveys","src":"#226, #227","stage":5,"layer":"proc","context":"サービスの質を利用者の視点から評価したい段階。","problem":"専門家が設計した指標は提供者の論理を反映し当事者が何を大切にしているかが入らない。アウトカムだけ測っても利用者がサービスをどう経験したかが見えない。","solution":"市民による逆調査（Sousveys）や自己モニタリングツール、ユーザー経験調査を組み合わせて、利用者の視点・感情・経験を評価の中心に置く。","examples":["シェフィールドのSousveys","NHS User Experience Surveys"],"alliance":"「使う人が測れば大切なことが測られる。」","sub":null},{"id":143,"name":"地域の成果を地域で測る","en":"Outcome Benchmarks","src":"#228","stage":5,"layer":"proc","context":"地域レベルでの社会的変化を評価したい段階。","problem":"組織が自分に都合の良い指標を選ぶと本当の社会的変化が見えない。","solution":"「この地域の人々はどれだけ助け合っているか」など地域全体の社会的ダイナミクスを客観的に測る指標を設定する。","examples":["英国の近隣関係・地域への影響感覚を測る地域調査"],"alliance":"「自分たちの組織が何をしたかではなく地域が変わったかを測る。」","sub":null},{"id":144,"name":"評価を学びのプロセスにする","en":"Assessment as Learning","src":"#229","stage":5,"layer":"proc","context":"評価を組織・プログラムの改善に活かしたい段階。","problem":"評価は「証明するため」に行われがちで学びの機会にならない。","solution":"ピアレビュー・リアルタイム評価など評価プロセス自体を学びと相互受粉の機会として設計する。","examples":["NESTAのHealth Launchpad評価──ピアレビューと相互学習を組み合わせ"],"alliance":"「評価のために評価するな。学ぶために評価する。」","sub":null},{"id":145,"name":"生産を分散させる","en":"Distributed Production","src":"#230","stage":6,"layer":"proc","context":"集中型の生産・サービス提供システムが限界に達している状況。","problem":"中央集権的なシステムは効率的だが脆弱で、地域のニーズに対応できない。","solution":"エネルギー・医療・教育・ケアの生産を地域・家庭レベルに分散させる。地域マイクログリッド・在宅医療・オンライン学習が「新しい当たり前」になる設計をする。","examples":["地域分散型エネルギーシステム（Woking・London）","在宅医療モデル"],"alliance":"「電力を自分たちで作る。医療を家で受ける。そのための設計を今から始める。」","sub":null},{"id":146,"name":"台本を書き直すことがシステムを変える","en":"Changing Scripts and Post-Chronologism","src":"#231, #240","stage":6,"layer":"proc","context":"既存サービスの根本的な前提（台本）や年齢別役割規範が時代遅れになっている状況。","problem":"表面的な改善を繰り返しても、サービスの「台本」（廃棄物＝捨てるもの、65歳＝引退など）が変わらなければ根本は変わらない。","solution":"「廃棄物は資源だ」「いつでも学び・働き・貢献できる」のように台本そのものを書き直す。新しい台本が新しい制度・行動・文化を生む。","examples":["廃棄物の「揺り籠から揺り籠へ」リスクリプト","定年制の見直し・生涯学習制度改革"],"alliance":"「ゴミ問題を解決しようとするな。資源の循環として最初から設計し直せ。」","sub":null},{"id":147,"name":"今の投資が将来を変える","en":"Prevention and Early Investment","src":"#232, #233","stage":6,"layer":"proc","context":"問題が起きてから対処するサイクルを変えたい、または早期介入によって将来のコストを避けたい状況。","problem":"予防・早期投資の効果は見えにくく、便益は将来にしか現れない。短期的な成果を求めるシステムでは正当化が難しい。","solution":"製造プロセス改善・公衆衛生・早期幼児教育への集中投資を「問題が起きる前に投資する」原理としてシステムに組み込む。40年間のエビデンスを蓄積して政治的支持を得る。","examples":["AbecedairianプロジェクトとSure Start──早期幼児教育への集中投資","ゼロウェイスト政策"],"alliance":"「3歳までに投資した1円は、20歳に投資する7円の効果がある。」","sub":null},{"id":148,"name":"サポート経済の新しいモデル","en":"New Models of the Support Economy","src":"#234","stage":6,"layer":"proc","context":"標準的なサービスパッケージではなく個人を中心とした支援が必要な状況。","problem":"画一的なサービス提供は人々の多様なニーズに対応できない。個人化すると費用が増大する。","solution":"デジタルスパイン・プロとボランタリーのハイブリッドなど、個人を中心にサービスを再編するモデルを設計する。","examples":["ルーラルメインのデジタルコミュニケーション基盤を使った在宅ケアモデル"],"alliance":"「サービスが人に合わせる。人がサービスに合わせるのではない。」","sub":null},{"id":149,"name":"低炭素・ゼロ炭素の生活様式","en":"Low or Zero Carbon Living","src":"#235","stage":6,"layer":"proc","context":"気候変動対応として生活様式の根本的転換が必要な状況。","problem":"エネルギー・交通・住宅を総合的に再設計したいが、個別改善では効果が限定的。","solution":"エコタウン・持続可能都市設計で住居・交通・エネルギー・財政を統合した低炭素生活様式を設計・実証する。","examples":["ストックホルムHammarby Sjöstad","カリフォルニアSonoma Mountain Village"],"alliance":"「一棟ではなく街ごと設計する。それが唯一スケールする低炭素の答えだ。」","sub":null},{"id":150,"name":"分断されたサービスを人を中心に統合する","en":"Holistic and Personalised Support Models","src":"#236, #237","stage":6,"layer":"proc","context":"複雑なニーズを持つ人への支援が断片化している、または大量生産型サービスから個人化への転換が必要な状況。","problem":"専門化・分業化・モジュール化が進むほど、横断的な課題を抱える人への支援に隙間が生まれ、顧客満足が下がる。","solution":"管理のあらゆる側面を横断的に支援するホリスティックモデル、またはパーソナルコーチ・データ共有ネットワークで個人に合わせた支援を実現する。","examples":["The Key（英国校長向け総合支援サービス）","個人健康コーチングと1980〜90年代サービス分離からの転換"],"alliance":"「部分ではなく全体を見る。その人の全部に関わる支援が最も効果的だ。」","sub":null},{"id":151,"name":"市民のエネルギーを動かす支援モデル","en":"Support Models That Mobilise Citizen Energy","src":"#238","stage":6,"layer":"proc","context":"犯罪・健康・教育など社会課題の解決に市民参加が必要な状況。","problem":"専門家主導のアプローチでは当事者コミュニティの力が活かされない。","solution":"当事者の社会的文脈を巻き込み、そのコンテキストを更生・回復・予防に活用するモデルを設計する。","examples":["カナダのCircles of Support（犯罪者更生支援）"],"alliance":"「専門家だけでは治せない。その人のまわりの人間が治す力を持っている。」","sub":null},{"id":152,"name":"周辺化されたグループを主役にする","en":"Energising Marginalised Groups","src":"#239","stage":6,"layer":"proc","context":"社会変革の主体から排除されているグループがいる状況。","problem":"社会変革はエリート主導になりがちで、最も変革が必要な周辺化されたグループが設計から外れる。","solution":"周辺化されたグループを変革の主体・エージェントとして中心に置くシステム的アプローチを設計する。","examples":["ナイキ財団の途上国女子エンパワメント戦略"],"alliance":"「解決策を作る場に、その問題を生きている人を必ず入れる。」","sub":null},{"id":153,"name":"民主主義を新しい空間に広げる","en":"Radical Democratisation","src":"#241","stage":6,"layer":"proc","context":"代議制民主主義が複雑な社会課題に対応できなくなっている状況。","problem":"議会・企業・メディア・職場の権力構造が民主化されておらず、人々が直接参加できない。","solution":"ウェブ・参加型予算・オープンソース・分散システムで民主的参加の空間を職場・地域・メディアに広げる。","examples":["参加型予算のグローバル展開","オープンソース・ソフトウェアの民主的ガバナンス"],"alliance":"「投票日だけが民主主義ではない。日常の中に参加の場を作る。」","sub":null},{"id":154,"name":"信頼を作るデバイスを設計する","en":"Trust-Creating Devices","src":"#242","stage":6,"layer":"proc","context":"新しいサービスモデルで見知らぬ人同士が協力する必要がある状況。","problem":"ボランタリーと専門職の境界が曖昧になるにつれ、信頼の確認コストが増大する。","solution":"eBay的な評判システム・公的データベース・認証制度など、短時間で信頼を判断できる仕組みを設計する。","examples":["eBay・Airbnbの評判システム","DBS（英国前歴確認）"],"alliance":"「初対面でも3秒で信頼できるかどうかわかる仕組みを作る。」","sub":null},{"id":155,"name":"新しいシステムを動かすインフラを先に作る","en":"Creating New Infrastructure and Data Platforms","src":"#243, #244, #245","stage":6,"layer":"proc","context":"新しいシステムの展開に必要な物理インフラ・データ基盤・プラットフォームが存在しない状況。","problem":"革新的な技術・サービスがあっても、それを動かすインフラがなければ普及しない。データを統合すれば支援が向上するが、プライバシーと監視のリスクを生む。農村・低所得層が既存インフラから排除されている。","solution":"スマートグリッド・電気自動車充電インフラ・横断的データベース・M-PESAのようなプラットフォームインフラを先行整備する。ただしプライバシーの課題を丁寧に扱う。","examples":["スマートグリッド整備","M-PESA（ケニアの携帯電話送金基盤）","英国「at risk」児童データベース"],"alliance":"「道路がなければ車は走れない。まず道路を作る。」","sub":null},{"id":156,"name":"経済を再配線する","en":"Rewiring Economies","src":"#246","stage":6,"layer":"proc","context":"異なる産業セクターをつなぐことで新しい市場・価値を生み出したい状況。","problem":"縦割りの産業構造では異セクター間のシナジーが生まれない。","solution":"自動車・電力・廃棄物処理など異なるセクターをつなぐ新しいサプライチェーン・処理チェーンを設計する。","examples":["プラグインハイブリッド車のための電力・自動車産業の統合"],"alliance":"「廃棄物と農業をつなぐ。電力と交通をつなぐ。配線を変えれば新しい経済が生まれる。」","sub":null},{"id":157,"name":"チェーンの急所に技術革新を入れる","en":"Technical Innovations for Key Chain Points","src":"#247","stage":6,"layer":"proc","context":"システム全体の変革を一点から始めたい状況。","problem":"システム全体を一度に変えることはできない。どこに革新を入れれば連鎖が起きるかがわからない。","solution":"家庭用医療検査機器・生分解性プラスチック袋のように、チェーンの重要な一点に技術革新を入れることでシステム全体の革新を促す。","examples":["家庭用医療検査機器の普及が医療システムを変えた事例"],"alliance":"「一点を変えれば全体が動く急所がある。それを探す。」","sub":null},{"id":158,"name":"革新のアカデミーを作る","en":"Innovation Academies","src":"#248","stage":6,"layer":"proc","context":"社会革新を担う人材を体系的に育てたい状況。","problem":"既存の教育・研修機関は専門知識を教えるが、社会変革を動かす実践能力・文化は育てない。","solution":"新しい原理で訓練・行動研究・形成を行うイノベーションアカデミーを設立する。学生が実際に社会的企業で働く経験を組み込む。","examples":["College of Health","Forum for the Future","モンドラゴン大学"],"alliance":"「教室で社会変革は学べない。現場で学ぶしかない。現場が学校になる設計をする。」","sub":null},{"id":159,"name":"当事者が担い手になるシステムを作る","en":"Peer Support, Citizen Design and Self-care","src":"#249, #250, #251","stage":6,"layer":"proc","context":"特定の状況を経験した人々の知恵を活かしたい、または大規模なシステム変革を市民が主体的に推進したい状況。","problem":"専門家は専門知識を持つが「生きた経験知」がない。当事者は経験知を持つが広げる仕組みがない。トップダウン改革は現場の熱量を失い、ボトムアップは資金と権力に届かない。専門家主導のケアでは患者の主体性が育たない。","solution":"慢性疾患患者が同じ状況の他者に助言・訓練を行う、市民参加型設計プロセスでシステム変革を「市民が設計・実装する」構造を作る、豊富なデータフィードバックと支援構造を組み合わせてセルフケア能力を育てる。","examples":["NHS エキスパートペイシェントプログラム","フィンランド北カレリア心臓病予防プロジェクト","慢性疾患のセルフケアプログラム"],"alliance":"「使う人が作る。それが最も長続きするシステムの作り方だ。」","sub":null},{"id":160,"name":"証拠の争いに新しい事実を作る","en":"Creating New Evidence","src":"#252","stage":6,"layer":"proc","context":"既存の証拠体系が旧来のシステムを支持している状況。","problem":"変革に必要な証拠がなければ、「エビデンスがない」と言われて変革が止まる。","solution":"新しい測定・証拠を生み出し、政策議論の「事実の地形」を変える。","examples":["スキポール空港騒音の新測定法開発","OECDのBeyond GDP指標開発"],"alliance":"「正しいものが見えていないなら、見えるようにする方法を作る。」","sub":null},{"id":161,"name":"新しいシステムの動くプロトタイプを作る","en":"Establishing Working Prototypes","src":"#253","stage":6,"layer":"proc","context":"新しいシステムのビジョンを具体的に示したい状況。","problem":"言葉で新しいシステムを描いても信じてもらえない。動いている実物が最大の説得力を持つ。","solution":"低炭素住宅・新しい刑務所モデルなど、新システムの「動くプロトタイプ」を実際に設置する。","examples":["スイスVaubanの低炭素住宅コミュニティ","UK BedZed"],"alliance":"「百回語るより一つ動かす。動いているものが最強のプレゼンだ。」","sub":null},{"id":162,"name":"システム革新を促すプラットフォームを設計する","en":"Platforms for Systemic Innovation","src":"#254","stage":6,"layer":"proc","context":"P2P型の学習・サービスプラットフォームで新しいシステムを生み出したい状況。","problem":"既存のプラットフォームは中央集権的で、システム変革を促す構造になっていない。","solution":"School of EverythingのようなP2Pモデルや、デジタル学習環境を設計・試行することでシステム変革を引き起こす。","examples":["School of Everything（誰もが教え・学べるP2Pプラットフォーム）"],"alliance":"「誰もが先生で誰もが生徒。そのプラットフォームが学校を変える。」","sub":null},{"id":163,"name":"包括的なパイロットでシステムを試す","en":"Comprehensive Pilots","src":"#255","stage":6,"layer":"proc","context":"新しいシステム全体を一つの場所で試したい状況。","problem":"部分的なパイロットでは全体の機能が試せない。しかし全国展開はリスクが高い。","solution":"システム全体を統合した包括的なパイロットを特定の場所で実施する。","examples":["ノルウェーBastoy島刑務所（生態的低コスト刑務所）","NHS全システム実証（コーンウォール・ケント）"],"alliance":"「部分では見えないものが全部やってみたら見える。」","sub":null},{"id":164,"name":"古いシステムへの投資を止める","en":"Blocking Old Investment Choices","src":"#256","stage":6,"layer":"proc","context":"新しいシステムへの移行を妨げる旧システムへの投資が続いている状況。","problem":"新技術・新システムへの投資が進んでも、旧インフラへの大規模投資が続くと変革が遅れる。","solution":"旧システムへの沈没費用的投資を意識的に止め、新しいシステムへの空間を作る。","examples":["石炭火力への新規投資を止めることでの再生可能エネルギー移行加速"],"alliance":"「やめることが最大の革新投資だ。」","sub":null},{"id":165,"name":"フレーミングで変革を加速する","en":"Frames for Change","src":"#257","stage":6,"layer":"proc","context":"特定の事件・危機を変革の契機にしたい状況。","problem":"危機や事件は変革の「窓」を開くが、適切にフレーミングしなければ従来の解決策が選ばれる。","solution":"自然災害・経済危機など特定の事件を根本的な変革の必要性と結びつけ、新しいシステムの採用を促すフレーミングを設計する。","examples":["熱波での高齢者死亡をフレームに使った社会ケア制度改革"],"alliance":"「危機が来たとき、代替案が動いていれば引き寄せられる。普段から作り込む。」","sub":null},{"id":166,"name":"新しい権利を作る","en":"New Rights","src":"#258","stage":6,"layer":"proc","context":"ケア・教育・投票など基本的な社会的権利を拡張したい状況。","problem":"権利が制度として認められなければ、革新的なサービスへの需要が生まれない。","solution":"長期的なキャンペーンを経て新しい権利を立法化する。権利が新しいサービス革新への需要を生む。","examples":["障害者権利法による建築・IT・政策革新の連鎖"],"alliance":"「権利を書けば、その権利を満たすために革新が走る。」","sub":null},{"id":167,"name":"新しい責任を作る","en":"New Responsibilities","src":"#259","stage":6,"layer":"proc","context":"生産者・行政・市民に新しい責任を課してシステムを変えたい状況。","problem":"自発的な行動変容では変化が遅すぎる。","solution":"炭素削減の生産者責任・子育て責任など、新しい法的責任を制度化することでシステム変革を加速する。","examples":["英国の地方政府への特定課題対応の法的義務化"],"alliance":"「責任を法律に書けば、誰もが考えざるを得なくなる。」","sub":null},{"id":168,"name":"財産の新しいかたちを作る","en":"New Forms of Property","src":"#260","stage":6,"layer":"proc","context":"資産の「所有と使用」のあり方を変えてシステムを変革したい状況。","problem":"既存の財産権が資産の非効率な使用を固定化させている。","solution":"「使わなければ失う」所有権・電波・海洋の所有権・知的財産のコモンズ化など、財産の新しいかたちを制度化する。","examples":["「use it or lose it」型所有権","知的財産のコモンズ化"],"alliance":"「空き家を持ち続ける権利はない。使わなければ地域に返す。」","sub":null},{"id":169,"name":"法的禁止でシステムを変える","en":"Legal Bans","src":"#261","stage":6,"layer":"proc","context":"特定の行動・製品を市場から排除してシステムを変えたい状況。","problem":"強い反発を生むが、禁止は最も明確なシグナル。","solution":"屋内禁煙・サンパウロ屋外広告禁止のように、他の手段と組み合わせながら法的禁止を活用する。","examples":["欧州の職場禁煙法","サンパウロ屋外広告禁止"],"alliance":"「禁止は最後の手段だが、使えば一気に変わる。」","sub":null},{"id":170,"name":"法律を本気で執行する","en":"Enforcement","src":"#262","stage":6,"layer":"proc","context":"新しい法律・規制があっても執行されていない状況。","problem":"良い法律があっても執行されなければ機能しない。","solution":"汚染者・DV・強制結婚への法律の本格的な執行を行う。執行の本気度がシステム変革の鍵になる。","examples":["汚染規制の本格執行による産業行動変容"],"alliance":"「書いてあるだけの法律は存在しないのと同じだ。執行して初めて法律になる。」","sub":null},{"id":171,"name":"分類を変えてシステムを変える","en":"Formal Classifications","src":"#263","stage":6,"layer":"proc","context":"どのカテゴリに属するかがリソース配分を決定している状況。","problem":"分類体系が旧来のシステムを維持するように設計されている。","solution":"「薬物依存は犯罪→健康問題」「廃棄物→資源」のように、公式の分類を変えることでシステム全体の論理が変わる。","examples":["慢性薬物使用の刑事司法問題から健康問題への再分類"],"alliance":"「何と呼ぶかが、誰が担当するか・どんなお金がつくかを決める。」","sub":null},{"id":172,"name":"義務とペナルティでシステムを動かす","en":"Targets with Penalties and Regulatory Requirements","src":"#264, #265","stage":6,"layer":"proc","context":"特定の行動変容を強制的に促したい、または新しいシステムの基盤となる行動を義務化したい状況。","problem":"自発的な変化では遅すぎる。ペナルティだけでは創造的解決が生まれない。義務化のコストと便益のバランスが難しい。","solution":"包装規制・埋立て割当取引スキームのように、ターゲット設定とペナルティを組み合わせた準市場スキームを設計する。または全員に義務付けることでインフラ投資を正当化する。","examples":["英国埋立て割当取引スキーム（Landfill Allowance Trading Scheme）","EU生ごみ指令案──全市町村への生ごみ分別義務化"],"alliance":"「目標と罰則を組み合わせれば、誰も思いつかなかった方法が生まれる。」","sub":null},{"id":173,"name":"税制と財政でシステムを再調整する","en":"Tax and Fiscal Structures","src":"#266","stage":6,"layer":"proc","context":"市場の価格シグナルをシステム変革に合わせて再設計したい状況。","problem":"現在の税制・価格体系が旧来のシステムを支持し、新しいシステムへの移行を遅らせている。","solution":"ドイツの再生可能エネルギー固定価格買取制度・VAT軽減措置のように、財政・税制でシステム変革に向けた価格シグナルを作る。","examples":["ドイツの固定価格買取制度（Feed-in Tariff）が再生可能エネルギー市場を創った"],"alliance":"「価格が変われば、誰もが変わる。価格を変えるのは政治の仕事だ。」","sub":null},{"id":174,"name":"何を測るかがシステムの論理を決める","en":"Information Systems, Public Accounting and True Progress Measures","src":"#267, #268, #269","stage":6,"layer":"proc","context":"システム変革を支える情報フロー・会計・指標が整備されていない状況。","problem":"変革に必要な情報が見えなければ変革が起きない。縦割り会計では部門横断の価値創造が見えない。GDPが支配的指標として社会的・環境的価値を政策から排除している。","solution":"ライフサイクルアセスメント・Total Placeのような地域全支出マッピング・OECDのBeyond GDPのような真の進歩を測る指標を組み合わせて、システム変革を支える情報の枠組みを再設計する。","examples":["ライフサイクルアセスメント（LCA）","英国Total Place","OECDのWikiprogress"],"alliance":"「何が見えるかが、何が変わるかを決める。見える化が変革の武器だ。」","sub":null},{"id":175,"name":"自発的な社会運動が生活様式を変える","en":"Social Movements for Lifestyle Innovation","src":"#270, #271","stage":6,"layer":"proc","context":"個人の生活様式の転換を大規模に促したい、または草の根から社会変革の運動を育てたい状況。","problem":"個人への啓発だけでは変化が遅い。強制は反発を生む。中央集権的な組織では多様な人が参加できない。","solution":"フェミニスト運動・グリーン運動・トランジションタウンのように、ライフスタイル革新を社会運動として組織化する。フェスティバル・キャンプ・直接行動の組み合わせで自己組織化する運動を作る。","examples":["Transition Towns（数百のコミュニティが低炭素生活へ）","Camp for Climate Action（英国）──2006年に600人が集まり急成長"],"alliance":"「一人が変わっても社会は変わらない。でも運動になれば社会が変わる。」","sub":null},{"id":176,"name":"明確な目標を持つ公式連合を組む","en":"Organising Formal Coalitions","src":"#272","stage":6,"layer":"proc","context":"複数のセクターが共同して特定の変革目標を達成したい状況。","problem":"個々の組織はバラバラに活動し、方向性がなく既存勢力にかわされ続ける。","solution":"明確な目標・各セクターの役割分担のもとで公式な連合を組み、変革を戦略的に推進する。","examples":["グリーン産業での見習い制度創設を目指すセクター横断連合"],"alliance":"「ハチが一匹では木を動かせない。群れで飛んで初めて風が起きる。」","sub":null},{"id":177,"name":"財政の流れを変革の方向に向け直す","en":"Public Finance for Systems Change","src":"#273, #274","stage":6,"layer":"proc","context":"システム変革を公的財政で後押ししたい、または新しい投資フローを作りたい状況。","problem":"縦割りの予算管理ではシステム変革に必要な横断投資ができない。既存の投資フローがシステム変革を促す方向に向いていない。","solution":"複数省庁の予算コントロールを統合し境界上のイノベーションを可能にする財政設計をする。クリーン開発メカニズム（CDM）のような新しい資産を作ることで新しい投資フローを生み出す。","examples":["英国でのhealth-care、environment-transport間の予算統合","気候変動における清浄開発メカニズム（CDM）"],"alliance":"「縦割りの予算を一つにまとめるだけで、今まで誰も解決できなかった問題が解ける。」","sub":null},{"id":178,"name":"予防への投資を可能にする財政","en":"Finance for Systemic Prevention","src":"#275","stage":6,"layer":"proc","context":"長期的予防プログラムへの投資を公的資金から確保したい状況。","problem":"短期的な政治サイクルでは、長期的な予防への投資が正当化されない。","solution":"Justice Reinvestmentのように、投獄コストを地域予防プログラムに再投資する仕組みを設計する。","examples":["オレゴン州Justice Reinvestment──若者投獄コストをコミュニティ再犯防止プログラムに再投資し72%減少"],"alliance":"「刑務所に使うお金を、刑務所に行かなくて済む投資に変える。」","sub":null},{"id":179,"name":"革新を発見して広める人","en":"Innovation Scouts","src":"#276","stage":null,"layer":"conn","context":"組織が外部の革新を取り込みたい段階。","problem":"良い革新がどこかに存在しても、自組織では気づけない。外部スキャンのコストは高く、個人では限界がある。","solution":"国際見本市・会議を巡り最新技術や実践を発見・報告する「革新スカウト」を専門職として設ける。","examples":["イタリア北部中小企業コンソルティアのスカウト制度","Young Foundationの調査記者型スカウト"],"alliance":"「世界中で起きている革新を、うちに引っ張ってくる専門家を一人置く。」","sub":"people"},{"id":180,"name":"革新を組織に埋め込む人","en":"Innovation Champions","src":"#277","stage":null,"layer":"conn","context":"組織の中に革新的な文化を根付かせたい段階。","problem":"外部から革新を提案するだけでは根付かない。内部にいながら革新の担い手が必要。","solution":"アイデアを生み出しネットワークを築き革新的文化を組織に埋め込む革新チャンピオンを育てる。","examples":["協同組合運動の内部チャンピオン制度"],"alliance":"「中から変える人がいれば、外からの提案がやっと通る。」","sub":"people"},{"id":181,"name":"大組織の内側から社会変革を動かす人","en":"Social Intrapreneurs and Entrepreneurs in Residence","src":"#278, #279","stage":null,"layer":"conn","context":"大企業・大組織が社会課題の解決に動いてほしい段階。","problem":"大組織は資源を持つが社会課題への動機が弱い。外部からの圧力だけでは変わらない。内部変革だけでは視野が狭く革新のスピードと範囲に限界がある。","solution":"大組織の内部から社会的・環境的課題の解決策を開発・推進するソーシャルイントラプレナーを育てる。または外部の社会起業家を組織に常駐させ、才能発見・革新埋め込み・社会的企業スピンアウトを推進させる。","examples":["P&GのWin Sakdinanによる「Future Friendly」イニシアチブ","Young FoundationのBirmingham East and North PCT常駐起業家プログラム"],"alliance":"「大企業の中にいる人が一番変えられる。その人を見つけて支援する。」","sub":"people"},{"id":182,"name":"通常業務から切り離した革新専用の空間を作る","en":"In-house and Arms Length Innovation Units","src":"#280, #281","stage":null,"layer":"conn","context":"組織や公共部門が継続的に革新を生み出したい段階。","problem":"革新は日常業務の中では生まれにくい。行政の内部では政治的制約が強く、本当の革新が生まれにくい。","solution":"組織内の革新専用ユニットを設ける、または行政から独立した革新機関を設立することで、日常の制約から切り離された革新の空間を作る。","examples":["デンマークMindLab","Innovation Unit（英国教育省から独立し現在は独立革新仲介機関）"],"alliance":"「革新のための部屋を作る。場所があれば人が集まる。」","sub":"people"},{"id":183,"name":"地域に根ざした革新チーム","en":"Local Innovation Teams","src":"#282","stage":null,"layer":"conn","context":"地域の行政が市民ニーズに即した革新を生み出したい段階。","problem":"中央からの政策だけでは地域の実情に合わない。地域に密着した革新チームが必要。","solution":"地方自治体内に市民や外部との接点を持つ革新チームを設ける。","examples":["英国Kent County CouncilのSILK（Service Innovation Lab Kent）"],"alliance":"「地域を知る人が地域の問題を解く。」","sub":"people"},{"id":184,"name":"横断的専門革新ユニット","en":"Specialist Innovation Units","src":"#283","stage":null,"layer":"conn","context":"特定の困難な社会課題（ホームレス・社会的排除等）を横断的に解決したい段階。","problem":"縦割り組織では複合的な課題が解決できない。","solution":"統合型の戦略委員会を持つ横断チームを設け特定課題に集中的に取り組む。","examples":["英国Social Exclusion Unit──路上生活者を70%以上削減"],"alliance":"「縦割りをぶち壊すには、最初から縦割りを無視した設計をする。」","sub":"people"},{"id":185,"name":"革新者が集まる場所がエコシステムを生む","en":"Innovation Hubs and Social Silicon Valleys","src":"#284, #285","stage":null,"layer":"conn","context":"社会起業家・革新者・NPOが集まって協働できる場が必要な段階。","problem":"革新的な実践者が孤立して活動しており、知識・資源が共有されない。個別の社会的企業は孤立しており集積効果・共同研究が起きない。","solution":"コワーキングスペースを超えた「革新のコミュニティ空間」──場所・接続・支援・投資へのアクセスを提供するハブを設計する。社会的企業・協同組合が集まる「ソーシャルビジネスパーク」を育てる。","examples":["The Hub（12都市・4大陸）","トロントCentre for Social Innovation","スペインBilbaoのDenokInn"],"alliance":"「同じ方向を向いた人を一つの場所に集める。偶発的な出会いが革新を生む。」","sub":"people"},{"id":186,"name":"革新を政府の公式な仕事にする機関を作る","en":"Innovation Departments and Public Agencies","src":"#286, #287","stage":null,"layer":"conn","context":"政府全体で社会革新を制度的に支援したい段階。","problem":"革新が各省庁にバラバラに任されており、政府全体でのサポートが弱い。短期的な政治サイクルでは長期的な革新投資が難しい。","solution":"革新を横断的に推進する省・室を設ける。または政府から独立した公共革新機関（NESTAやSitraのような）を設立する。","examples":["英国BIS","米国White House Office of Social Innovation","NESTA（英国）/ Sitra（フィンランド）"],"alliance":"「革新を政府の仕事にする。部署を作れば予算がつく。」","sub":"people"},{"id":187,"name":"専門分野の革新機関","en":"Specialist Innovation Agencies","src":"#288","stage":null,"layer":"conn","context":"医療・教育など特定分野での革新を系統的に支援したい段階。","problem":"分野固有の知識と革新能力を組み合わせる専門機関が必要。","solution":"NHS Institute for Innovation and Improvement（英）やHarvard-based Institute for Healthcare Improvement（米）のような分野特化革新機関を設ける。","examples":["NHS Institute for Innovation and Improvement"],"alliance":"「医療の革新は医療がわかる人でないと設計できない。」","sub":"people"},{"id":188,"name":"革新ファンド","en":"Innovation Funds","src":"#289","stage":null,"layer":"conn","context":"社会革新への専用の資金調達インフラが必要な段階。","problem":"社会革新への投資が通常の公共・民間投資の枠組みに入らず、資金が不足している。","solution":"インドNIFやフィンランドイノベーションファンドのように、草の根革新・R&D・内部ベンチャーなど目的別の革新ファンドを設立する。","examples":["インド国家革新財団（NIF）/ 英国Regional Innovation Funds"],"alliance":"「革新専用の財布を作れば、革新専用の提案が来る。」","sub":"people"},{"id":189,"name":"革新インキュベーター","en":"Innovation Incubators","src":"#290","stage":null,"layer":"conn","context":"社会革新の芽を育てる専門的な支援が必要な段階。","problem":"良いアイデアがあっても、それを事業化するスキル・資源・ネットワークがない。","solution":"スキルと専門知識・段階的投資モデル・政策文脈の理解を組み合わせたインキュベーターを設計する。","examples":["Young Foundation Launchpad","MaRS（トロント）──大学・病院・研究室・ビジネスインキュベーターを統合"],"alliance":"「アイデアが事業になる場所。その場所を設計する。」","sub":"people"},{"id":190,"name":"課題と解決策の間に橋をかける専門的仲介","en":"Innovation Brokers and Dedicated Intermediaries","src":"#291, #292","stage":null,"layer":"conn","context":"組織が解決できない課題に外部の知恵を結びつけたい段階。","problem":"課題を持つ組織と解決策を持つ人・組織をつなぐ仕組みがない。組織は自分の革新の可能性を過小評価し、外部への移転も難しい。","solution":"InnoCentiveのようなオープンイノベーションブローカーで世界中の解決者を集める。または「信頼できる仲介者」を組織内に常駐させ暗黙知を引き出しパートナーに移転する。","examples":["InnoCentive──$5,000〜$100,000の賞金で科学的課題の解決者を世界中から募集","英国Innovation Exchange"],"alliance":"「誰かが答えを持っている。それを見つける仕組みを作る。」","sub":"people"},{"id":191,"name":"専門誌・業界誌が革新を流通させる","en":"Trade Papers and Magazines","src":"#293","stage":null,"layer":"conn","context":"特定分野の革新的な実践を業界全体に広めたい段階。","problem":"既存の業界誌は旧来の方法を支持しており、革新的な実践を取り上げない。","solution":"革新志向の専門誌・業界誌を創刊し、新しい実践の流通インフラにする。","examples":["The Waste Paper──地域リサイクルネットワーク（CRN）が設立したリサイクル志向マガジン"],"alliance":"「書いてもらえれば広まる。書く場所を作る。」","sub":"people"},{"id":192,"name":"研究と実践を統合した革新の学習拠点","en":"Research Centres and Innovation Universities","src":"#294, #295","stage":null,"layer":"conn","context":"特定分野の革新に必要な研究・人材・実践の拠点が必要な段階。","problem":"研究は大学、開発は企業、応用は現場とバラバラで革新のスピードが遅い。既存の大学は学問分野ごとに縦割りで、横断的な革新能力が育ちにくい。","solution":"研究者・大学院生・企業を一つの場所に集めた研究センター、または複数学部を統合した革新大学を設立する。","examples":["シンガポールBiopolis──4000人の研究者が集まる生命科学研究センター","Aalto University（技術・ビジネス・芸術デザインの統合）"],"alliance":"「頭脳を一か所に集める。集まれば化学反応が起きる。」","sub":"people"},{"id":193,"name":"革新学習ラボ","en":"Innovation Learning Labs","src":"#296","stage":null,"layer":"conn","context":"革新の実践知を系統的に学べる場が必要な段階。","problem":"革新の方法論は個人・組織の経験に留まり、体系的な学習インフラがない。","solution":"大学内に革新学習ラボを設け、代替的な社会革新の手法を試験・学習できる環境を作る。","examples":["MIT Poverty Action Lab","各大学ビジネススクールの革新ラボ"],"alliance":"「革新は教えられる。それを教える場を大学に作る。」","sub":"people"},{"id":194,"name":"分野特化の専門機関","en":"Sector Specialist Institutions","src":"#297","stage":null,"layer":"conn","context":"廃棄物・医療・教育など特定分野での革新を加速したい段階。","problem":"分野固有の複雑さを扱うには、専門的な知識を持つ機関のサポートが必要。","solution":"WRAP（廃棄物）・NHS Innovation Hubs（医療技術商業化）のような分野専門機関を設ける。","examples":["WRAP（英国廃棄物資源行動プログラム）","NHS Innovation Hubs"],"alliance":"「医療の問題は医療のプロが解く。でもその解き方を広めるのは専門機関だ。」","sub":"people"},{"id":195,"name":"デモンストレーションセンター","en":"Demonstration Centres","src":"#298","stage":null,"layer":"conn","context":"新しいシステム・技術を多くの人に直接体験させたい段階。","problem":"言葉や文書では伝わらない。実際に動いているものを見れば百の説明より伝わる。","solution":"新しい技術・ライフスタイル・サービスモデルを実際に動かして見せるデモンストレーションセンターを設ける。","examples":["Machynlleth WalesのCentre for Alternative Technology（1973年設立、年65,000人訪問）"],"alliance":"「見せれば信じる。動いているものが最強の説得道具だ。」","sub":"network"},{"id":196,"name":"革新アクセラレーター","en":"Innovation Accelerators","src":"#299","stage":null,"layer":"conn","context":"社会革新の初期段階を短期間で加速したい段階。","problem":"良いアイデアがあっても形にするまでに時間がかかりすぎる。","solution":"ウェブデザイナー・開発者・社会課題の実践者が集まり一週間でウェブ解決策を設計するハッカソン型アクセラレーターを開催する。","examples":["Social Innovation Camp──一週末で機能するウェブサイトを設計"],"alliance":"「制約が革新を生む。一週間しかないからこそ本質だけを作る。」","sub":"network"},{"id":197,"name":"革新ネットワーク","en":"Innovation Networks","src":"#300","stage":null,"layer":"conn","context":"社会革新の実践者・研究者・組織をグローバルにつなぎたい段階。","problem":"個々の活動は断片化しており、知識共有・協働・分野全体の成長が起きない。","solution":"Social Innovation Exchange（SIX）のように、小NGOから大企業まで400以上の組織を結ぶグローバルな革新コミュニティを育てる。","examples":["Social Innovation Exchange（SIX）──国際的な社会革新コミュニティ"],"alliance":"「一人でやっている感じが、ネットワークに入った途端に消える。」","sub":"network"},{"id":198,"name":"花粉を運ぶネットワーク","en":"Pollinating Networks","src":"#301","stage":null,"layer":"conn","context":"異なる分野・地域のアイデアを相互に受粉させたい段階。","problem":"同質な人同士のネットワークでは既知の知識が循環するだけ。クロスポリネーションが起きない。","solution":"Doors of Perception networkのように、異分野・多様な文脈のアイデアを意図的に組み合わせるネットワークを設計する。","examples":["Doors of Perception（John Thackara）──デザイナーを中心に非デザイナーも参加する刺激的ネットワーク"],"alliance":"「違う畑の花粉を持ち込めば、全く別の実がなる。」","sub":"network"},{"id":199,"name":"協働ネ
