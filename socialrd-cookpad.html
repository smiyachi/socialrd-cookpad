ットワーク","en":"Collaborative Networks","src":"#302","stage":null,"layer":"conn","context":"複数の組織・都市が共通の課題に協働で取り組みたい段階。","problem":"個々の組織が単独で動いており、集合的な解決策が生まれない。","solution":"C40ネットワーク（都市）・Clinton Global Initiativeのように、国際的な協働行動ネットワークを形成する。","examples":["C40 Cities Network（40都市が気候変動に協働）"],"alliance":"「一つの都市では解けない問題が、40の都市が集まれば解ける。」","sub":"network"},{"id":200,"name":"サービス協働体","en":"Service Collaboratives","src":"#303","stage":null,"layer":"conn","context":"特定のサービス分野での革新を組織間協働で促したい段階。","problem":"個々の組織はサービス改善のリソースが限られており、孤立した改善では効果が限定的。","solution":"対面イベント・研究提供・オンライン支援・資金提供を組み合わせたサービス協働体を形成する。","examples":["英国Primary Care Collaborative──GP実践者のサービス革新を支援"],"alliance":"「一人では学べないことを、みんなで学ぶ場を作る。」","sub":"network"},{"id":201,"name":"実践しながら仲間と学ぶ継続的な場","en":"Communities of Practice and Action Learning Sets","src":"#304, #305","stage":null,"layer":"conn","context":"共通の課題・関心を持つ実践者が継続的に学び合いたい段階。","problem":"知識は使いながら学ぶものだが、孤立した実践では限界がある。実践の忙しさの中では立ち止まって振り返る機会がない。","solution":"共通の関心を持つ人々が継続的に対話する「実践コミュニティ」を形成する。または4〜7人のグループが定期的に集まり、お互いの仕事を振り返り支え合う「アクション学習セット」を設ける。","examples":["英国IDeAの実践コミュニティ──数千人が参加","School for Social Entrepreneurs──アクション学習セット"],"alliance":"「一人で考えていたことが、4人で話すと答えが出る。」","sub":"network"},{"id":202,"name":"会員組織が革新を育てる","en":"Membership Organisations","src":"#306","stage":null,"layer":"conn","context":"特定分野の革新を会員ネットワークを通じて促進したい段階。","problem":"革新的な個人・組織が孤立しており、知識・ネットワーク・影響力が蓄積されない。","solution":"RSAのような会員組織で27,000人のリーダー・専門家ネットワークを作り、革新の生態系を育てる。","examples":["RSA（Royal Society for the Encouragement of the Arts）──27,000名の会員ネットワーク"],"alliance":"「会員になることで世界が広がる。広がった世界が革新を生む。」","sub":"network"},{"id":203,"name":"情報と資源を必要な人につなぐプラットフォーム","en":"Information and Connection Platforms","src":"#307, #308","stage":null,"layer":"conn","context":"特定のニーズに関する情報を広く共有したい、または異なる資源・ニーズを持つ人々をつなぎたい段階。","problem":"有用な情報が分散しており必要な人に届かない。土地を持つ人と農業をしたい人、スキルを持つ人と必要な人が出会う仕組みがない。","solution":"ユーザー生成情報を集積するプラットフォーム、または人々を実際の出会いと行動につなぐプラットフォームを設計する。","examples":["Netmums（50万会員が地域の子育てリソースを共有）","Landshare（農地と農家希望者をマッチング）"],"alliance":"「土地は余っている。農家は余っている。つなぐものがなかっただけだ。」","sub":"platform"},{"id":204,"name":"集合行動プラットフォーム","en":"Platforms for Aggregating Action","src":"#309","stage":null,"layer":"conn","context":"多くの人の小さな行動を集めて大きな変化を作りたい段階。","problem":"個人の行動は小さすぎて変化が生まれない。しかし条件が整えば行動する人は多い。","solution":"PledgeBankのように「N人が同じことをするなら私もやる」という条件付き集合行動プラットフォームを設計する。","examples":["PledgeBank──「100人がリサイクルするなら私もリサイクルする」式の集合行動組織化"],"alliance":"「一人では動けなくても、100人が動くなら動ける人はたくさんいる。」","sub":"platform"},{"id":205,"name":"専門家と市民の壁を溶かして共同制作する","en":"Pro-am and Co-production Platforms","src":"#310, #311","stage":null,"layer":"conn","context":"高い水準の活動を行うアマチュアと専門職の境界を曖昧にしたい、または製品・サービスを利用者が共同制作したい段階。","problem":"資格・認定が専門職と市民の間に壁を作り、高い能力を持つ市民が貢献できない。従来の「企業が作り消費者が買う」モデルでは利用者のニーズとの乖離が生まれる。","solution":"公式認定された専門職とそれ以外の人々が同じ場で機能できるプラットフォームを設計する。顧客が設計に参加する共同制作プラットフォームを設計する。","examples":["School of Everything（誰もが教え学べるプラットフォーム）","LEGOのDesignByMe 3.0"],"alliance":"「資格より能力。資格がなくても教えられる人は教えればいい。」","sub":"platform"},{"id":206,"name":"オンラインラボ","en":"Online Laboratories","src":"#312","stage":null,"layer":"conn","context":"高価な実験設備・教材を広く共有したい段階。","problem":"実験環境へのアクセスが地理的・経済的に制限されており、革新が阻害される。","solution":"MIT iLabのように実験設備・教材をバーチャルで共有するオンラインラボを設計する。","examples":["MIT iLab──高価な実験設備と教材を遠隔共有"],"alliance":"「設備がなくても実験できる。距離がなくなれば革新も広がる。」","sub":"platform"},{"id":207,"name":"P2Pプラットフォーム","en":"Peer-to-Peer Platforms","src":"#313","stage":null,"layer":"conn","context":"中央の調整なしに人々が自律的にリソースを共有・協働したい段階。","problem":"中央集権的なプラットフォームはコスト・管理・単一障害点のリスクがある。","solution":"Napster・Linux・Apache・Bitcoinのように中央調整不要で分散して動作するP2Pプラットフォームを設計する。","examples":["Linuxオープンソース開発コミュニティ","Napsterファイル共有"],"alliance":"「誰も管理しなくても動く仕組みを作る。それが最も強いプラットフォームだ。」","sub":"platform"},{"id":208,"name":"革新を戦略の中心に置く","en":"","src":"#314","stage":null,"layer":"supp","context":"公共機関で革新が担当者の熱意頼みになっている。","problem":"革新を推進したいが、戦略・優先課題・予算と切り離されると周辺活動に留まる。","solution":"革新投資を戦略的優先課題に直接紐付け、「このギャップを埋めるには既存モデルの採用か新規開発か」を問う仕組みを組み込む。","examples":["肥満対策という戦略課題に既存モデルがなく革新投資が正当化されたNHS"],"alliance":"「やってみたいから、ではなく、これをやらないと目標が達成できないから、と言えれば予算がつく。」","sub":"public"},{"id":209,"name":"トップが失敗を歓迎すると宣言する","en":"","src":"#315","stage":null,"layer":"supp","context":"公共機関の職員が失敗を恐れて革新的な行動を取れない。","problem":"現場は革新したいが、失敗が評価に直結するため誰も率先しない。","solution":"リーダーが公式に「革新を支持する。失敗も期待する」と表明する。トップの言葉が組織の行動許可になる。","examples":["FDRルーズベルト「実験を見たい。時に失敗も」宣言","英国上位200官僚の年次合宿で革新をテーマに設定"],"alliance":"「許可が出ていれば現場は動く。邪魔をやめることが最大の支援だ。」","sub":"public"},{"id":210,"name":"革新をブロックしているものを取り除く","en":"","src":"#316","stage":null,"layer":"supp","context":"革新を起こしたいが組織の構造が邪魔をしている。","problem":"インセンティブのみならず、阻害要因（ディスインセンティブ）が革新を止めている。","solution":"革新を妨げる主要な阻害要因を系統的に特定し除去する。報酬は認知・昇進・資金で与える。","examples":["各省庁の革新阻害要因マッピングと除去プログラム"],"alliance":"「背中を押す前に、足かせを取る。」","sub":"public"},{"id":211,"name":"リスクをポートフォリオで管理する","en":"","src":"#317","stage":null,"layer":"supp","context":"公共機関が革新のリスクを取れない。","problem":"リスクをゼロにしようとすると革新のないものしか採用されない。","solution":"高リスク・高リターンから中・低リスクまでのプロジェクトポートフォリオで全体のリスクを管理する。リスク管理≠リスク排除。","examples":["革新ポートフォリオ管理アプローチ"],"alliance":"「100%安全な賭けは存在しない。大事なのは賭け方を設計することだ。」","sub":"public"},{"id":212,"name":"革新を個人の成長に組み込む","en":"","src":"#318","stage":null,"layer":"supp","context":"革新能力を組織全体に広めたい。","problem":"革新の専門家を育てるだけでは不十分。全員が革新への感度と権限を持つ必要がある。","solution":"革新を個人開発計画・研修・文化に統合する。アイデアを発見・育てる専門家と、革新を認識するゲートキーパーを両方育てる。","examples":["革新能力開発の個人研修への組み込み"],"alliance":"「革新は特別な人がやることではない。全員ができるようになる設計をする。」","sub":"public"},{"id":213,"name":"現場の声が組織を学ばせる回路を作る","en":"","src":"#319, #321","stage":null,"layer":"supp","context":"フロントラインの知識が上層部に届かず、同じ失敗が繰り返されている。","problem":"現場の情報が組織の学習・改善に活かされない。失敗は隠され他組織の成功からも学ばない。","solution":"ユーザーから現場スタッフ・シニアマネージャーへの情報回路を設計する。失敗を語れる文化を育て、多様な情報源からアイデアを取り入れることに慣れた組織を作る。","examples":["Patient Opinion（患者が直接公共サービスを評価）","オランダKafka Brigades","学習文化を持つ革新的公共機関の事例"],"alliance":"「現場の声が上に届かない組織は必ず同じ失敗を繰り返す。」","sub":"public"},{"id":214,"name":"ユーザーをサービス設計者にする","en":"","src":"#320","stage":null,"layer":"supp","context":"公共サービスをユーザーのニーズに合わせたい。","problem":"ユーザーは重要な洞察を持っているが、サービス設計に参加できていない。","solution":"ユーザーグループ・エキスパートペイシェントなど、ユーザーを新しい洞察の源泉として積極的にサービス設計に組み込む。","examples":["エキスパートペイシェントの参加によるサービス再設計"],"alliance":"「使う人が設計者になれば全く違うサービスができる。」","sub":"public"},{"id":215,"name":"実験のための安全な空間を作る","en":"","src":"#322","stage":null,"layer":"supp","context":"公共機関が新しいアプローチを試したいが通常業務の中では難しい。","problem":"通常の制約（法律・予算・評価）の中では本当の革新が試せない。","solution":"フランス27e Regionのように、通常のシステムの外で革新を試せる「仮想の革新地域」を設計する。","examples":["フランスの27e Region──26の行政地域の外にある仮想の実験地域"],"alliance":"「失敗しても大丈夫な場所で試す。そこで学んだことを本番に持ち込む。」","sub":"public"},{"id":216,"name":"革新のための専用の財布を作る","en":"","src":"#323, #324, #325","stage":null,"layer":"supp","context":"公共機関が革新に投資したい。","problem":"通常の業務予算では革新への投資が後回しになる。細かく指定された予算では革新が起きない。","solution":"部門予算の1%を革新専用に確保する、横断的な革新専用ファンドを設ける、幅広いプログラムを支援しながら実験の余地を残す横断予算を設計する。","examples":["英国「Invest to Save」Budget","NHSの5年間£220M革新ファンド","英国Sure Start"],"alliance":"「先に確保しなければ革新には使われない。最初に取り分ける。」","sub":"public"},{"id":217,"name":"使途を委ねるほど革新が生まれる","en":"","src":"#326, #327","stage":null,"layer":"supp","context":"公共サービスの委託または地域コミュニティへの資金提供を設計したい。","problem":"インプット管理型予算では提供者の創意工夫が殺される。中央指定では地域の実情に合わない。","solution":"成果目標だけを設定し達成方法は提供者に委ねる、または地域コミュニティに大きな裁量で使える予算を委ねる。使途を委ねることで革新が生まれる。","examples":["成果連動型地域協定（Local Area Agreements）","英国New Deal for Communities（10年間で£50M、地域裁量）"],"alliance":"「どうやるかは任せる。何を達成するかだけ言う。」","sub":"public"},{"id":218,"name":"革新の利益を革新者に還元する","en":"","src":"#328","stage":null,"layer":"supp","context":"公共機関の革新者にインセンティブを与えたい。","problem":"公共機関で革新しても利益は組織全体に帰属し革新者への還元がない。","solution":"革新で生まれた節約・利益の一部を革新チームや革新者に還元する仕組みを設計する。","examples":["革新利益環境ファンドの実験"],"alliance":"「革新して得をするのが革新者でなければ誰も革新しない。」","sub":"public"},{"id":219,"name":"市民がオンラインで予算を設定する","en":"","src":"#329","stage":null,"layer":"supp","context":"市民が予算配分プロセスに参加したい。","problem":"行政の予算決定に市民が関与できる仕組みがない。","solution":"Budget Allocatorのように市民がオンラインで自治体予算の優先配分を選択できるツールを提供する。","examples":["オーストラリアBudget Allocator"],"alliance":"「市民に予算を選ばせると行政が想定しなかった優先順位が見える。」","sub":"public"},{"id":220,"name":"段階的に資金と説明責任を整える","en":"","src":"#330","stage":null,"layer":"supp","context":"革新への投資と成果の評価を組み合わせたい。","problem":"最初からアウトカム評価は難しいが、インプット管理のままでは革新が起きない。","solution":"インプット目標→アウトカム目標→高度な説明責任という段階的な移行を設計する。","examples":["革新予算の段階的移行モデル"],"alliance":"「まず始める。次に測る。次に磨く。最初から完璧を求めない。」","sub":"public"},{"id":221,"name":"革新連動報酬を設計する","en":"","src":"#331","stage":null,"layer":"supp","context":"革新への投資を個人・チーム・組織レベルで促進したい。","problem":"個人ボーナスは公平性問題と動機の歪みを生む。","solution":"日本型の集合ボーナス（R&Dチームから庶務まで全員で共有）など、革新連動報酬を分断を避ける形で設計する。","examples":["日本企業の集合ボーナス制度（秘書・守衛まで全員で共有）"],"alliance":"「誰かだけ得をする革新は分断を生む。全員で分けることで全員が協力する。」","sub":"public"},{"id":222,"name":"公共契約に社会条項を入れる","en":"","src":"#332","stage":null,"layer":"supp","context":"公共調達をより良い社会的成果に使いたい。","problem":"コストと品質だけで調達を評価すると社会的な価値が無視される。","solution":"公共契約に障害者雇用・炭素フットプリント削減などの社会条項を義務付ける。","examples":["障害者雇用・地域雇用を義務付ける社会条項付き公共契約"],"alliance":"「契約書に書くだけで社会的価値が生まれる。」","sub":"public"},{"id":223,"name":"市民が政策・行政に直接関与できる場を作る","en":"","src":"#333, #335","stage":null,"layer":"supp","context":"市民の知恵を政策・意思決定に組み込みたい、または行政の説明責任を市民が直接問える場が必要。","problem":"従来の公聴会は特定の声しか集まらない。選挙以外に行政を問いただす公式な場が少ない。","solution":"Peer-to-Patent Projectのような市民が政策・特許等のレビューと助言ができるプラットフォーム、またはオバマのオンラインタウンホールのように市民が質問・投票し行政が答えるオープンな空間を設計する。","examples":["Peer-to-Patent（米国）","Obama Online Town Halls──106,000の質問から市民投票で選ばれた質問に大統領が回答"],"alliance":"「専門家だけが判断する時代は終わった。市民が参加できる審査の場を作る。」","sub":"public"},{"id":224,"name":"市民のアイデアを立法化する議会構造","en":"","src":"#334","stage":null,"layer":"supp","context":"市民のアイデアが実際の立法につながる仕組みが必要。","problem":"市民の声が収集されても「聞いただけ」に終わる。","solution":"韓国Tribunus Plebisのように市民のアイデアを立法化することを使命とするシニア立法者委員会を設ける。","examples":["韓国Tribunus Plebis──市民のアイデアを立法化するシニア立法者委員会"],"alliance":"「聞くだけでなく市民のアイデアを法律にする仕組みを作る。」","sub":"public"},{"id":225,"name":"資源配分を市民が決める","en":"","src":"#336, #338","stage":null,"layer":"supp","context":"市民が地域の優先課題を決め公的資金を配分したい、または助成先を民主的・透明に決めたい。","problem":"予算配分が行政主導で市民のニーズと乖離している。専門家委員会による審査は閉鎖的で市民の感覚と乖離する。","solution":"参加型予算で市民が直接地域の優先事項を決め公的資金を配分する。またはITV/Big Lottery Fundのように公開投票で助成先を決める。","examples":["ポルト・アレグレ（ブラジル）から数百のコミュニティに広がった参加型予算","「The People's 50 Million」"],"alliance":"「市民に予算を渡したら行政が考えもしなかった使い方をした。」","sub":"public"},{"id":226,"name":"市民社会による影の予算プロセス","en":"","src":"#337","stage":null,"layer":"supp","context":"政府予算の代替案を市民社会が示したい。","problem":"政府予算への批判はできるが代替案がなければ影響力が限定的。","solution":"カナダAFBのように市民社会が独自に代替連邦予算を作成し政策議論の「影の予算」として機能させる。","examples":["カナダAlternative Federal Budget（1994年から継続）"],"alliance":"「批判するだけでなく別の予算を作れば政治が変わる。」","sub":"public"},{"id":227,"name":"コミュニティが自分のサービスを設計・運営する権利","en":"","src":"#339","stage":null,"layer":"supp","context":"地域コミュニティが既存の行政サービスを自分たちでやりたい。","problem":"行政サービスからオプトアウトして独自サービスを作る制度的権利がない。","solution":"コミュニティが国・地域の行政サービスを代替する独自サービスを設計・運営できるオプトアウト権を制度化する。","examples":["英国New Deal for Communities──地域が自分たちで住宅維持管理等を運営"],"alliance":"「自分たちでやる権利を法律に書く。それだけで地域が動き出す。」","sub":"public"},{"id":228,"name":"公的財政を透明にして市民の信頼を生む","en":"","src":"#340, #341","stage":null,"layer":"supp","context":"公的資金の使途を市民が把握したい、または公的説明責任を市民参加で実現したい。","problem":"公的資金がどこに使われているかが見えず市民の信頼が低い。専門家による閉じた監査では市民の信頼が得られにくい。","solution":"Total Placeのように地域内の全支出をマッピングし機関間の相互節約・資産共有を可視化する。またはオープンデータを活用した市民監査を設計する。","examples":["英国Total Place──地域全支出マッピング","Where Does My Money Go?","オープンデータ活用の市民監査"],"alliance":"「税金の使い道が見えれば市民も行政も行動が変わる。」","sub":"public"},{"id":229,"name":"革新を支援する監査・検査体制","en":"","src":"#342","stage":null,"layer":"supp","context":"監査・検査を革新の障壁ではなく支援に変えたい。","problem":"通常の監査・検査は「問題を見つける」モードで革新リスク取得を妨げる。","solution":"英国NAOの革新報告のように監査・検査が革新の採用と支援を評価・促進するように設計を変える。","examples":["英国National Audit Office革新報告──監査を革新支援として再定義"],"alliance":"「検査が来るから革新できない、ではなく、検査が革新を評価するに変える。」","sub":"public"},{"id":230,"name":"政府の革新度を測る指標","en":"","src":"#343","stage":null,"layer":"supp","context":"政府全体の革新能力・成果を可視化したい。","problem":"各省庁がバラバラに革新を進めており全体の状況が見えない。","solution":"韓国Government Innovation Indexのような政府の革新度を横断的に測定・比較する指標を開発する。","examples":["韓国Government Innovation Index"],"alliance":"「測らなければ変わらない。政府の革新度を数値化して公表する。」","sub":"public"},{"id":231,"name":"使途を指定した税・義務","en":"","src":"#344","stage":null,"layer":"supp","context":"特定の社会的目的に安定的な財源を確保したい。","problem":"一般財源では政治的優先度によって投資が変動する。","solution":"BBC受信料・ロンドン渋滞税・気候変動税のように特定目的に使途を限定した税・義務を設ける。","examples":["BBCライセンス料","ロンドン混雑課金","気候変動税"],"alliance":"「目的税なら、その目的には必ずお金が届く。」","sub":"public"},{"id":232,"name":"参加に応じた税優遇","en":"","src":"#345","stage":null,"layer":"supp","context":"市民の社会参加を財政的に促進したい。","problem":"参加した人が得をし、しない人がコストを負担する公平な仕組みがない。","solution":"リサイクル参加者への税軽減・非参加者への税増という税変動で参加インセンティブを作る。","examples":["Harlow市の住宅断熱に税リベートを提供し非断熱住宅の税率を上げる制度"],"alliance":"「良いことをした人が得をする税制を設計する。」","sub":"public"},{"id":233,"name":"自発的な追加税","en":"","src":"#346","stage":null,"layer":"supp","context":"市民の自発的な公共への貢献を促したい。","problem":"強制的な課税への反発を避けながら自発的な貢献を最大化したい。","solution":"ボゴタのMayor Mockusのように市民に10%追加税の自発的支払いを呼びかける。","examples":["ボゴタの自発的10%追加税（63,000人が参加）"],"alliance":"「強制しなくても払う人はいる。仕組みを作れば想像以上の人が参加する。」","sub":"public"},{"id":234,"name":"一時税で大きな目的に投資する","en":"","src":"#347","stage":null,"layer":"supp","context":"特定の大きな目的のために一時的な財源が必要。","problem":"通常予算では大規模な革新投資が難しい。","solution":"オリンピック税・棚ぼた税のような一時税で新興技術・革新への集中投資を可能にする。","examples":["ロンドンオリンピック税","ユーティリティ棚ぼた税"],"alliance":"「一時的な特別税は正当化しやすい。そこに革新投資の財源を作る。」","sub":"public"},{"id":235,"name":"コミュニティ共同誓約","en":"","src":"#348","stage":null,"layer":"supp","context":"コミュニティ内で集合的な資金調達をしたい。","problem":"個人の小さな拠出だけでは大きな変化は起きない。","solution":"「1000人が$20出すなら私も出す」形式のコミュニティ共同誓約を設計する。行政によるマッチングも可能。","examples":["Community Pledgebank（市民が条件付きで小額をコミット）"],"alliance":"「一人では出せなくても100人が出すなら出せる人はたくさんいる。」","sub":"public"},{"id":236,"name":"行動に連動した料金・手数料の設計","en":"","src":"#349","stage":null,"layer":"supp","context":"サービスの使用に応じた料金設計をしたい。","problem":"一律料金では使用量・貢献度・コストが反映されない。","solution":"手数料・変動料金・ペナルティ・報酬・目的税などの組み合わせで行動に連動した料金体系を設計する。","examples":["変動料金制公共サービス"],"alliance":"「使い方に応じて払う。それだけで行動が変わる。」","sub":"public"},{"id":237,"name":"公共の宝くじ・抽選・コンテストで資金を集める","en":"","src":"#350","stage":null,"layer":"supp","context":"国家から一歩離れたコミュニティ活動への資金を確保したい。","problem":"政府直接補助とは違う市民のエネルギーに基づく資金調達が必要。","solution":"宝くじ・抽選・コンテストをコミュニティベンチャーへの資金調達の主要源にする。","examples":["ニュージーランドの宝くじ収益がコミュニティ活動を支援"],"alliance":"「遊びながら社会に投資する。宝くじがそれをやっている。」","sub":"public"},{"id":238,"name":"リスクを社会化する","en":"","src":"#351","stage":null,"layer":"supp","context":"革新的なサービスへの投資リスクを社会全体で分担したい。","problem":"革新的サービスへの投資リスクが個別提供者に集中すると革新が起きない。","solution":"長期ケアの新しい社会保険形態のようにリスクを社会全体で共有し革新インセンティブを作る。","examples":["長期ケア需要削減へのインセンティブを持つ社会保険新形態"],"alliance":"「一人が全部リスクを負わなければ誰もがリスクを取れる。」","sub":"public"},{"id":239,"name":"個人が自分のサービスを設計できる直接支払い","en":"","src":"#352","stage":null,"layer":"supp","context":"障害者・高齢者が自分に合ったケアサービスを選びたい。","problem":"標準的なサービスパッケージは個人のニーズに合わない。","solution":"個人に予算を配分し自分でケアサービスを設計・購入できるようにする。","examples":["英国直接支払い制度（7万人）","スウェーデン・オレゴン州の個人予算"],"alliance":"「お金を渡せば本人が最もよい方法を見つける。」","sub":"public"},{"id":240,"name":"特定の行動に連動した報酬設計","en":"","src":"#353, #356, #357","stage":null,"layer":"supp","context":"特定の望ましい行動（リサイクル・健康活動）をインセンティブ化したい。","problem":"現金インセンティブは汎用的すぎる。一時的なキャンペーンでは行動が定着しない。現金では特定の行動との結びつきが弱い。","solution":"排出権取引証書・健康活動ポイント・クリチバのリサイクルトークン（バス乗車権と交換）のように、特定の行動に連動した非現金報酬を設計する。","examples":["包装回収注（PRN）/ Birmingham East and North PCT「Healthy Incentives」","クリチバのリサイクルトークン"],"alliance":"「ゴミを持ってきたらバスに乗れる。仕組みが変われば行動が変わる。」","sub":"public"},{"id":241,"name":"デジタル技術で公共サービスを再設計する","en":"","src":"#354, #355","stage":null,"layer":"supp","context":"公共サービスの設計をデジタルに合わせて革新したい。","problem":"紙ベース・対面ベースのサービス設計が利便性と効率を制限している。複数の行政機関との取引が分散していて市民にとって不便。","solution":"デンマークNemKontoのように全公的機関との支払いを一つの口座に集約する。香港OctopusカードやロンドンOysterカードのようにスマートカードを導入することでサービスを再設計する起点にする。","examples":["デンマークNemKonto──全公的支払いを一つの口座に統合","香港Octopusカード","ロンドンOysterカード"],"alliance":"「カードを変えれば使い方が変わる。使い方が変わればサービスが変わる。」","sub":"public"},{"id":242,"name":"地域債券と事業改善地区","en":"","src":"#359","stage":null,"layer":"supp","context":"地域の特定エリアに集中した資金調達が必要。","problem":"中央政府の予算配分では地域の具体的なニーズに応えられない。","solution":"Tax Increment Financing（TIF）やBusiness Improvement Districts（BID）のように地域レベルの資金フローを作る。","examples":["TIF（米国）──将来の税収増を担保にした地域開発資金調達"],"alliance":"「地域の未来の価値を今の投資に変える。」","sub":"public"},{"id":243,"name":"公共投資からの収益を地域に還元する","en":"","src":"#360","stage":null,"layer":"supp","context":"公共インフラ投資による地価上昇の恩恵を地域社会に還元したい。","problem":"公共投資で上がった地価の恩恵が私的地主に集中し、投資した公共の利益にならない。","solution":"コミュニティランドトラスト（CLT）に投資前の財産権を帰属させ、投資後の地価上昇を地域に還元する。","examples":["米国の鉄道モデル──沿線地域の地価上昇を公共が先取りする仕組み"],"alliance":"「公共が投資して値上がりした土地の恩恵は公共に返ってくるべきだ。」","sub":"public"},{"id":244,"name":"社会的目的の組織に専用の投資資金を届ける","en":"","src":"#361, #362","stage":null,"layer":"supp","context":"社会的目的の組織・企業に成長投資が必要。","problem":"社会的組織は通常の金融機関からの資金調達が難しく成長が制限される。","solution":"未請求銀行口座を財源とするSocial Investment Bankのような卸売機関、または社会的企業専用の投資ファンドをローン・エクイティの組み合わせで設立する。","examples":["英国Social Investment Bank（提案）","英国Social Enterprise Investment Fund（£100M）"],"alliance":"「社会的なお金を社会的な目的のために動かす専用の銀行を作る。」","sub":"public"},{"id":245,"name":"財団型基金","en":"","src":"#363","stage":null,"layer":"supp","context":"社会革新への長期的・安定的な投資が必要。","problem":"政治的サイクルに左右されない長期投資の仕組みが必要。","solution":"NESTA（英国）やカナダ政府の財団のような恒久的な財団型基金を設立する。","examples":["NESTA（National Endowment for Science, Technology and the Arts）"],"alliance":"「政治に揺れない資金があってこそ長期の革新投資ができる。」","sub":"public"},{"id":246,"name":"異なる資金を組み合わせて大きな投資を実現する","en":"","src":"#364, #365, #366","stage":null,"layer":"supp","context":"複数の資金源を組み合わせて大きな社会的目標に投資したい。","problem":"単一の資金源では大規模・複雑な社会的課題への投資が難しい。異なるリスク許容度を持つ投資家を一つのプロジェクトに集めたい。","solution":"WokingのロンドンClimate Change Agencyのようにハイブリッドに組み合わせる。公共資金を触媒として民間資金を引き付ける。リスク・リターンの異なるトランシェを重層的に組み合わせる。","examples":["Woking Borough CouncilとLCCAの持続可能エネルギープログラム","BlueOrchard（スイス）のマイクロファイナンス向け重層的投資"],"alliance":"「公共の1円が民間の10円を引き出す。レバレッジの設計をする。」","sub":"public"},{"id":247,"name":"保険で不確実性を定量化する","en":"","src":"#368","stage":null,"layer":"supp","context":"環境・社会リスクの高い投資の不確実性を下げたい。","problem":"核廃棄物・廃棄物焼却など大きな環境リスクを持つ投資に公共資金を使うことへの正当性が問われる。","solution":"保険会社にリスクを定量化させ、不確実性を投資家・公共機関にとって管理可能にする。","examples":["Swiss Reによる廃棄物処分場の汚染保険"],"alliance":"「リスクに値段をつければ投資できる。保険はリスクを可視化する道具だ。」","sub":"public"},{"id":248,"name":"保証付き投資で公共機関のリスクを下げる","en":"","src":"#369","stage":null,"layer":"supp","context":"公共機関が社会的投資のリスクを取れるようにしたい。","problem":"公共機関の投資予算はリスクを取ることに制約があり革新的投資が難しい。","solution":"Sheffield市が先駆けた「1年遅延払い保証」のように、保証の請求が翌年予算に計上される設計で公共機関の投資を可能にする。","examples":["Sheffield City Councilの遅延払い保証（1980年代）"],"alliance":"「保証があれば踏み出せる。保証の設計が革新を生む。」","sub":"public"},{"id":249,"name":"将来の収益を証券化して今の投資に変える","en":"","src":"#370","stage":null,"layer":"supp","context":"将来の確実な収益を今の投資資本に変えたい。","problem":"長期的に確実な収益があっても今の投資資金がない。","solution":"Prime Carbon（オーストラリア）のように将来の収益フローを5年契約で大企業に売り、投資資本を調達する。","examples":["Prime Carbon scheme（オーストラリア）──農地の炭素隔離を大企業に5年契約で販売"],"alliance":"「将来のお金を今使う。それが証券化の発想だ。」","sub":"public"},{"id":250,"name":"予防への投資を今の財源から可能にする","en":"","src":"#371, #372, #373","stage":null,"layer":"supp","context":"長期的な予防プログラムへの投資を今の財源から確保したい。","problem":"予防への投資は今コストがかかり便益は将来。短期的な政治サイクルでは投資が正当化されない。投資機関と節約機関が違うため動機がない。","solution":"「Invest to Save」Budget・Social Impact Bond・健康インパクト契約のように予防への投資を可能にする金融手法を設計する。将来の節約を今の投資に変える。","examples":["英国「Invest to Save」Budget","英国初のSIB（Peterborough刑務所）","Health Impact Contract（提案）"],"alliance":"「将来の節約を今の投資に変える。SIBがその橋渡しをする。」","sub":"public"},{"id":251,"name":"成果連動のボーナス支払い","en":"","src":"#374","stage":null,"layer":"supp","context":"社会的成果に連動した公共支出を設計したい。","problem":"特定の成果に支出が連動していない。","solution":"英国のPerformance Reward Grantのような成果連動支払いを設計する。","examples":["英国Government Performance Reward Grant"],"alliance":"「成果が出たら出した分だけお金が入ってくる。それが最高の動機づけだ。」","sub":"public"},{"id":252,"name":"社会革新成長戦略への公的投資","en":"","src":"#375","stage":null,"layer":"supp","context":"社会的革新を戦略的産業として育てたい。","problem":"社会革新を「善意の活動」ではなく「戦略的産業」として公的に位置づける仕組みがない。","solution":"Social Investment Bank・トロント大気基金・Enterprise Boardsのように社会革新成長戦略に公的資金を投入する。","examples":["提案中のSocial Investment Bank","トロントAtmospheric Fund"],"alliance":"「社会革新は産業だ。産業として育てる公的投資を作る。」","sub":"public"},{"id":253,"name":"官民連携によるインフラ整備","en":"","src":"#376","stage":null,"layer":"supp","context":"大規模な物理インフラを公共・民間の連携で整備したい。","problem":"公共資金だけでは大規模なインフラ整備ができない。民間資金だけでは公共性が確保できない。","solution":"PFI（Private Finance Initiative）・PPP（Public Private Partnership）で道路・学校・刑務所の建設・運営に民間資金・能力を活用する。","examples":["英国PFI──病院・学校・刑務所の民間建設・運営"],"alliance":"「公共と民間の役割を明確にした上で組む。それが正しい官民連携だ。」","sub":"public"},{"id":254,"name":"税制と法的地位を社会的革新の後押しに使う","en":"","src":"#377, #379, #380, #381","stage":null,"layer":"supp","context":"社会的企業・NPO・個人の社会的投資を税制優遇で促進したい。","problem":"社会的企業への投資には従来の投資税控除が適用されない。個人が社会的に有益な支出をしても税制上のメリットがない。財団が社会的企業に投資することが難しい。","solution":"EISの社会版・個人支出への税額控除・慈善的地位の拡大・R&D税控除のデザインへの拡大など、税制と法的地位を社会的革新の後押しに使う。","examples":["英国EISの社会版検討","米国L3C","英国CICへの慈善投資の合法化"],"alliance":"「税控除があれば投資家が動く。社会的企業の入口に税控除を設置する。」","sub":"public"},{"id":255,"name":"実験区域を設ける","en":"","src":"#378","stage":null,"layer":"supp","context":"新しいアイデアを地理的に限定した実験区で試したい。","problem":"全国展開する前に特定の場所で試したいが、通常の規制が実験を妨げる。","solution":"特定の地理的エリアを新しいアイデアの実験場として指定し、全国展開前に学びを得る。","examples":["中国の経済特区","英国のエンタープライズゾーン"],"alliance":"「ここだけ特別ルールで試す。うまくいったら全国に広げる。」","sub":"public"},{"id":256,"name":"市場を再設計する政策手段","en":"","src":"#382","stage":null,"layer":"supp","context":"社会経済を促進する市場を政策で作り出したい。","problem":"自由市場は社会的価値を自動的に生み出さない。","solution":"障害者雇用の強制目標・再生可能エネルギー規制・財政措置・計画条件など市場を社会経済促進のために再設計する政策手段を組み合わせる。","examples":["障害者雇用義務目標","英国再生可能エネルギー規制"],"alliance":"「市場は設計できる。そのルールを変えれば市場が変わる。」","sub":"public"},{"id":257,"name":"新しい法的形態と要件を作る","en":"","src":"#383","stage":null,"layer":"supp","context":"社会的目的の組織に適した法的形態が存在しない。","problem":"既存の法人形態では社会的使命の保護と市場参加の両立が難しい。","solution":"CIC（コミュニティ利益会社）・Charity Commissionの公共利益テストのような新しい法的形態と要件を創設する。","examples":["英国CIC法創設","慈善委員会の公共利益テスト"],"alliance":"「器がなければ中身を入れられない。新しい器を法律で作る。」","sub":"public"},{"id":258,"name":"革新を促進する法的義務","en":"","src":"#384","stage":null,"layer":"supp","context":"公的機関に革新を組織的に推進する義務を課したい。","problem":"革新は「やりたければやる」ものとして扱われ、制度的な位置づけがない。","solution":"NHSの「Duty to Promote Innovation」のように革新を推進する法的義務を戦略的健康機関に課す。","examples":["英国NHSの「革新を推進する義務」"],"alliance":"「義務にすれば言い訳できなくなる。革新を義務にする。」","sub":"public"},{"id":259,"name":"創造的経済を促進する計画・税制ルール","en":"","src":"#385","stage":null,"layer":"supp","context":"芸術・クリエイティブ産業の集積地を育てたい。","problem":"高い地価が革新的なクリエイターを追い出す。","solution":"SoHo（NY）・Hackney（ロンドン）のようなアーツ地区での家賃補助・Curitiba（ブラジル）のファベーラでの事業税免除のような計画・税制ルールを設ける。","examples":["SoHoのアーツ地区計画ルール","Curitibのファベーラ事業税免除"],"alliance":"「安くなければクリエイターが集まらない。集まれば街が変わる。」","sub":"public"},{"id":260,"name":"資産移転プログラム","en":"","src":"#386","stage":null,"layer":"supp","context":"公共の建物・土地をコミュニティ組織に移転したい。","problem":"行政が所有する資産が有効活用されず、一方でコミュニティ組織は場所を必要としている。","solution":"英国政府のAsset Transfer Programmeのように建物・土地などの資産を政府からコミュニティ組織に移転する。","examples":["英国Government Asset Transfer Programme"],"alliance":"「空いている公共資産をコミュニティに渡す。それだけで活動が始まる。」","sub":"public"},{"id":261,"name":"革新を評価・可視化して説明責任を作る","en":"","src":"#387, #388, #389","stage":null,"layer":"supp","context":"革新を組織的に評価・可視化することで説明責任と改善を生みたい。","problem":"革新が組織の目標にあっても個人の評価に反映されなければ動かない。組織全体の革新能力が見えず改善の手がかりがない。革新への取り組みが可視化されず説明責任が生まれない。","solution":"360度革新評価を含む個人業績評価・全国省庁の横断的能力評価（Capability Reviews）・年次革新報告書の義務付けを組み合わせる。","examples":["英国Capability Reviews","英国NHS Strategic Health Authoritiesの年次革新報告書"],"alliance":"「評価されることをやる。革新を評価項目に入れれば革新が起きる。」","sub":"public"},{"id":262,"name":"革新アワードで模範を示す","en":"","src":"#390","stage":null,"layer":"supp","context":"公共部門内の革新的な取り組みを広く知らせたい。","problem":"革新的な公共プログラムが認知されず横展開されない。","solution":"Innovations in American Government Awardsのような革新アワードで革新プログラムを公式に認め広める。","examples":["Ash Institute for Democratic Governance and Innovation主催の米国政府革新賞"],"alliance":"「賞をもらえれば自信が出る。他の人も真似し始める。」","sub":"public"},{"id":263,"name":"公務員組合を革新の推進者にする","en":"","src":"#391","stage":null,"layer":"supp","context":"公務員組合を革新の障壁ではなく推進者にしたい。","problem":"公務員組合が革新（特に業務区分変更を伴うもの）に抵抗することがある。","solution":"組合が革新のアドボケーターになれる状況を設計する。専門職の技術向上と新しい役割の創出を通じて革新を推進できる。","examples":["医療・教育での組合と革新の協力事例"],"alliance":"「組合と一緒に革新する。敵ではなく仲間にする。」","sub":"public"},{"id":264,"name":"フロントラインワーカーを革新者として支援する","en":"","src":"#392","stage":null,"layer":"supp","context":"現場スタッフが革新的なアイデアを実現できるようにしたい。","problem":"現場スタッフは最も革新的なアイデアを持つが実現する権限・時間・支援がない。","solution":"IDEO/Kaiser Permanenteのように現場スタッフと専門家が協働し、シフト交代など現場の課題を革新的に解決する。","examples":["IDEO/Kaiser Permanente（KP）のシフト交代改善プロジェクト"],"alliance":"「現場の人が一番よくわかっている。その人を革新者として位置づける。」","sub":"public"},{"id":265,"name":"日常業務から革新のための時間を切り出す","en":"","src":"#393, #394","stage":null,"layer":"supp","context":"公務員が革新プロジェクトに時間を使えるようにしたい。","problem":"革新したいが日常業務に追われて時間がない。現場にいると革新する時間がない。しかし異動すると現場感覚を失う。","solution":"Googleの20%ルールのように業務時間の一定割合を革新に充てる制度を設ける。またはスカンクワーク・革新チームへの一時出向で日常業務を離れ革新に集中できる機会を作る。","examples":["Googleエンジニアの20%時間制度の公共部門版","公共部門スカンクワーク制度"],"alliance":"「時間を与えれば革新が生まれる。それだけでいい。」","sub":"public"},{"id":266,"name":"指定エリアでの革新の自由度拡大","en":"","src":"#395","stage":null,"layer":"supp","context":"特定の優先エリアで革新的なアプローチを試したい。","problem":"既存のルール・規制が革新を妨げている。","solution":"英国「Power to Innovate」のように特定のエリア・機関が大臣に規制の停止・修正を申請できる権限を付与する。","examples":["英国Power to Innovate（2003）──学校・大学・自治体が規制停止を申請できる権限"],"alliance":"「ここは特別ルールで動いていい、と言えるだけで革新が起きる。」","sub":"public"},{"id":267,"name":"革新アニメーター","en":"","src":"#396","stage":null,"layer":"supp","context":"組織全体に革新文化を根付かせたい。","problem":"革新専門チームだけでは組織全体の文化は変わらない。","solution":"ノルウェーTrondheim市のように30人のパートタイム革新アニメーターが週1日公共職員と協働し革新サービスを開発する制度を設ける。","examples":["ノルウェーTrondheim市の30人パートタイム革新アニメーター制度"],"alliance":"「一人の専任より30人の兼任の方が組織全体に革新が広がる。」","sub":"public"},{"id":268,"name":"失敗と雇用を切り離す革新モデル","en":"","src":"#397","stage":null,"layer":"supp","context":"公務員が安心してリスクを取れる環境が必要。","problem":"プロジェクトが失敗すると担当者の雇用が危うくなるため誰もリスクを取らない。","solution":"複数の並行プロジェクトに資金を出し、失敗したプロジェクトの担当者を成功プロジェクトに移す。プロジェクトの失敗と個人の解雇を切り離す。","examples":["並行プロジェクトモデル──失敗から成功プロジェクトへの人材移動"],"alliance":"「プロジェクトが失敗しても仕事を失わない。その安心が革新を生む。」","sub":"public"},{"id":269,"name":"革新者の認定・採用","en":"","src":"#398","stage":null,"layer":"supp","context":"実績ある公共革新者を素早く組織に採用したい。","problem":"革新の実績を持つ人材を通常の採用プロセスでは見つけられない。","solution":"実績ある革新者の認定リストを作り、プロジェクトに素早く採用できる仕組みを設ける。","examples":["英国Neighbourhood Renewal Unitの認定採用リスト"],"alliance":"「革新の実績がある人を認定しておく。必要なときにすぐ呼べる。」","sub":"public"},{"id":270,"name":"内と外を混ぜると両方が強くなる","en":"","src":"#399, #401","stage":null,"layer":"supp","context":"公務員と社会起業家・コミュニティが協働して革新を進めたい。異なるセクターの相互理解と協働を促したい。","problem":"公務員だけでは視野が狭く、外部だけでは制度的な力がない。公共・民間・コミュニティは文化・言語・論理が違いすぎて協働が難しい。","solution":"公務員と社会起業家・コミュニティ活動家をつなぐ内外混成チームを形成する。公務員のNPO・民間企業への出向、および逆方向の出向を制度化し、セクター間の文化的架け橋を育てる。","examples":["オンタリオ州Community Economic Development Programme（1990年代）","SIX（Social Innovation Exchange）の役割交換プログラム"],"alliance":"「相手の靴を履いてみれば、見えていなかったものが見える。」","sub":"public"},{"id":271,"name":"公共部門でのボランティア活用","en":"","src":"#400","stage":null,"layer":"supp","context":"外部の視点・エネルギーを公共サービスに取り込みたい。","problem":"公共部門は閉じがちで外部の新しい視点が入りにくい。","solution":"学校保護者ボランティア・英国500,000人の公共部門ボランティアのように積極的に外部の人を公共サービスに招く。","examples":["英国公共部門（医療・教育・ケア）への500,000人ボランティア参加"],"alliance":"「中に外の人を入れれば当たり前が崩れる。それが革新の入口だ。」","sub":"public"},{"id":272,"name":"地域公共通貨","en":"","src":"#358","stage":null,"layer":"supp","context":"地域経済を活性化し公共的な価値を循環させたい。","problem":"国家通貨だけでは地域内の価値循環が促進されない。","solution":"ウォルゲルやパタコンのように自治体が労働をこの通貨で支払い、税支払いにも使える地域公共通貨を設計する。","examples":["オーストリアWörgl（1930年代）","アルゼンチンPatacón"],"alliance":"「地域で生まれた価値が地域で回る。それだけで経済が動き始める。」","sub":"public"},{"id":273,"name":"高割引率投資家を先に満たす","en":"","src":"#367","stage":null,"layer":"supp","context":"異なる投資家の時間的選好を調整しながら社会的投資をしたい。","problem":"短期リターンを求める投資家と長期的な社会的価値を重視する投資家の利害が合わない。","solution":"最も高い割引率を持つ投資家（短期志向）を初期の収益フローで優先的に満たし、長期投資家を後から参加させる。","examples":["社会的投資の収益スケジューリング設計"],"alliance":"「短期の人を先に返せれば、長期の人も安心して入れる。」","sub":"public"},{"id":274,"name":"協働的な構造でサービスを革新する","en":"","src":"#402","stage":null,"layer":"supp","context":"複数の機関が協働してより革新的なサービスを設計したい。","problem":"縦割りの機関が個別にサービスを設計すると、複合的な課題に対応できない。","solution":"デンマークSSP（学校・社会サービス・警察の協働）のように複数機関が構造的に協働する設計をする。","examples":["デンマークSSP──世界で最も成功した少年非行防止システムの一つ"],"alliance":"「一つの問題に三つの機関が別々に動いている。一緒に設計すれば全く違うものができる。」","sub":"grant"},{"id":275,"name":"最初の一歩に資金を届ける","en":"","src":"#403, #409","stage":null,"layer":"supp","context":"社会起業家個人や初期段階のアイデアを直接支援したい。","problem":"組織への助成は多いが個人の革新者への直接支援が少ない。大きな助成は実績が必要だが実績を作るには最初の小さな実験資金が必要。鶏と卵の問題。","solution":"UnLtd・Ashokaのように社会起業家個人に直接グラントを提供する。概念実証・プロトタイピングに特化したマイクロサイズのR&Dグラントを提供する。","examples":["UnLtd（英国）──社会起業家個人への直接グラント","Ashoka Fellows","概念実証マイクロR&Dグラントプログラム"],"alliance":"「アイデアは組織ではなく人が持っている。人に直接渡す。」","sub":"grant"},{"id":276,"name":"事後の表彰・認識賞","en":"","src":"#404","stage":null,"layer":"supp","context":"社会革新の実績を公式に認め広く知らせたい。","problem":"革新的な取り組みが認知されず、実践者のモチベーションが上がらず横展開もされない。","solution":"ノーベル賞のような事後の表彰で人・組織の達成を認め、社会的革新の価値を可視化する。","examples":["ノーベル賞","Innovations in American Government Awards"],"alliance":"「賞をもらえれば世界が変わる。世界が見えるようになる。」","sub":"grant"},{"id":277,"name":"素早いグラント","en":"","src":"#405","stage":null,"layer":"supp","context":"革新的なアイデアに素早く資金を届けたい。","problem":"通常の助成プロセスは時間がかかりすぎ、機会を逃す。書類作業が重くて小規模組織が申請できない。","solution":"Sobrato Family Foundationのように官僚的な手続きを最小化し、グラントを素早く届ける。","examples":["Sobrato Family Foundation──手続き最小化で受給者に素早く資金を届ける"],"alliance":"「アイデアが熱いうちに資金が届かなければ意味がない。」","sub":"grant"},{"id":278,"name":"期限付き慈善組織","en":"","src":"#406","stage":null,"layer":"supp","context":"特定の目標を達成したら解散することを前提とした支援をしたい。","problem":"組織は永続しようとするため、目標を達成しても活動を続ける。資産が目的ではなく組織維持のために使われる。","solution":"John M. Olin Foundation・Atlantic Philanthropiesのように一定期間内に資産を使い切ることを義務付けた期限付き慈善組織を設計する。","examples":["John M. Olin Foundation","Atlantic Philanthropies（期限内全額拠出型財団）"],"alliance":"「目的を達成したら終わる。それが資産を目的に使う唯一の方法だ。」","sub":"grant"},{"id":279,"name":"コンペとチャレンジファンド","en":"","src":"#407","stage":null,"layer":"supp","context":"革新的な解決策を広く集めたい。","problem":"通常の助成では既存の組織・方法しか選ばれない。全く新しいアプローチが生まれない。","solution":"X Prize Foundationのように大きな賞金を設定し、特定の社会課題の革新的解決策を世界から募る。","examples":["X Prize Foundation──100人のゲノム解読デバイスに$10M賞金"],"alliance":"「高い賞金を設定すれば誰も想像しなかった人が参加してくる。」","sub":"grant"},{"id":280,"name":"専門的な配分仲介者","en":"","src":"#408","stage":null,"layer":"supp","context":"特定の分野・プロジェクトへの助成を専門的に配分したい。","problem":"ドナーは助成したいが選定・評価の専門知識がない。良いプロジェクトに適切な資金が届かない。","solution":"文化セクターのように、ドナーの代わりに特定分野の専門知識を持つ仲介者がグラントを配分する。","examples":["文化セクターの専門的グラント配分仲介機関"],"alliance":"「誰に渡すかを知っている人に渡す役割を任せる。」","sub":"grant"},{"id":281,"name":"非営利組織のIPO","en":"","src":"#410","stage":null,"layer":"supp","context":"非営利組織が長期的な資金調達をしたい。","problem":"非営利組織は株式を発行できず、資本市場へのアクセスが限られる。","solution":"社会的リターンを「投資」として明示したIPOで非営利組織が広く資金を調達する。","examples":["非営利組織による社会的リターンを明示したIPO実験"],"alliance":"「株式を買わなくても社会に投資できる仕組みを作る。」","sub":"grant"},{"id":282,"name":"助成を投資として設計する","en":"","src":"#411, #412, #413","stage":null,"layer":"supp","context":"助成を単なる補助金ではなく組織の成長・成果に連動する投資として設計したい。","problem":"通常の助成は使途制限があり組織の成長に使えない。バランスシート外支出を通常の投資では賄えない。成果を出した組織への増額ができない。","solution":"段階的削減グラント・公的エクイティ・逆テーパリング（成果に応じて増額）など投資的な性格を持つ助成を設計する。投資パッケージを完成させるためにグラントを補完的に使う。","examples":["段階的削減グラントファンディング","Cordaidの投資・グラント複合パッケージ","成果連動型逆テーパリンググラントプログラム"],"alliance":"「補助金ではなく投資。育てることを最初から意図する。」","sub":"grant"},{"id":283,"name":"ギビング・サークルとソーシャル投資サークル","en":"","src":"#414","stage":null,"layer":"supp","context":"個人の小額拠出を集めて社会的インパクトに変えたい。","problem":"個人は少額しか出せないが、集まれば大きな力になる。しかし集める仕組みがない。","solution":"Funding Network・United Way・North Virginia Giving Circle of HOPEのように会員が共同で審査・配分するギビングサークルを作る。","examples":["North Virginia Giving Circle of HOPE──100人以上の会員が4年間で多くのグラントを配分"],"alliance":"「一人では動かせないお金が、サークルになれば動く。」","sub":"grant"},{"id":284,"name":"企業の非現金資源を社会革新に届ける","en":"","src":"#415, #416","stage":null,"layer":"supp","context":"資金だけでなく企業の時間・スキル・資産を社会革新に活用したい。","problem":"企業が現金以外の貢献（人材・設備・知識）をする仕組みがない。企業はプロボノで貢献したいが、NPOとのマッチングの仕組みがない。","solution":"税優遇と現物拠出の組み合わせで企業が社会革新に参画するパートナーシップを設計する。Taproot Foundationのように企業のマーケティング・HR・ITスキルを非営利組織に届けるプロボノプログラムを設計する。","examples":["企業の時間・スキルを社会革新に活用する税優遇付きパートナーシップ","Taproot Foundation（米国）──企業のプロボノスキルをNPOに届けるService Grant Program"],"alliance":"「現金じゃなくていい。あなたのスキルと時間が一番必要だ。」","sub":"grant"},{"id":285,"name":"善意と資金を効率よくつなぐデジタルプラットフォーム","en":"","src":"#417, #418","stage":null,"layer":"supp","context":"ボランティア・フィランソロピー機会と個人の寄付をより効率的にマッチングしたい。","problem":"ボランティアをしたい人と機会の間に橋がなく善意が活かされない。従来の寄付募集は高コストで資金の15〜33%が調達費用になる。","solution":"VolunteerMatchのようにボランティア機会を地域で検索できるプラットフォームと、GlobalGiving・Network for Goodのようなオンラインドナープラットフォームで調達コストを大幅に下げる。","examples":["VolunteerMatch──地域のボランティア機会を検索・マッチング","GlobalGiving","Firstgiving"],"alliance":"「やりたい人はいる。場所がわからないだけだ。見える化するだけで動く。」","sub":"grant"},{"id":286,"name":"資金を特定の変革目標に集中させる","en":"","src":"#419, #420","stage":null,"layer":"supp","context":"特定のセクター全体を変革したい、または特定の社会的課題領域での革新を集中的に支援したい。","problem":"個別の組織支援では業界全体の構造は変わらない。一般的なフィランソロピーでは特定分野の革新に集中した支援ができない。","solution":"Gates Foundationの小規模高校投資・Prosperity Initiativeのような業界パートナーシップ形成を通じたセクター変革投資をする。またはRWJF Pioneer Portfolioのように特定分野に特化したベンチャーフィランソロピーポートフォリオを設計する。","examples":["Bill and Melinda Gates Foundation──米国全土の小規模高校への戦略的投資","RWJF Pioneer Portfolio──医療とITの革新に特化"],"alliance":"「一つの組織を支援するのではなく、業界全体を変える投資をする。」","sub":"grant"},{"id":287,"name":"フィランソロピーのミューチュアルファンド","en":"","src":"#421","stage":null,"layer":"supp","context":"複数のドナーが共同で社会的インパクトへ投資したい。","problem":"個別の財団では対応できない大きな社会課題がある。","solution":"Acumen Fund・Global Fund for Womenのようにフィランソロピーをミューチュアルファンド形式で集めて大きな課題に投資する。","examples":["Acumen Fund（社会的インパクトへのフィランソロピー集合投資）"],"alliance":"「一人では小さい力が、集まれば大きな課題を動かせる。」","sub":"grant"},{"id":288,"name":"受益者を意思決定と評価の中心に置く","en":"","src":"#422, #423","stage":null,"layer":"supp","context":"組織の意思決定と革新の評価に受益者の声を反映させたい。","problem":"理事会が外部の視点を持たず受益者のニーズから乖離する。革新の評価が提供者・専門家視点のみで受益者のニーズとの合致が見えない。","solution":"Room 13のように受益者・利用者を管理委員会に参加させる。受益者・利用者の視点から革新の内容とプロセスを評価するアセスメントを委託する。","examples":["Room 13（スコットランド、1994年〜）──学生が自分たちのアートスタジオの管理委員会を運営","受益者視点の革新評価プログラム"],"alliance":"「使う人が決める。それが最も正しい意思決定だ。」","sub":"grant"},{"id":289,"name":"会員・準会員を革新と評価の源泉にする","en":"","src":"#424","stage":null,"layer":"supp","context":"組織の外部視点を会員・準会員から取り入れたい。","problem":"内部だけで革新を進めると視野が狭くなる。外部の独立した視点が必要。","solution":"会員・準会員を革新のアイデア源・独立した評価者として活用する。","examples":["会員組織による内部革新と独立評価の組み合わせ"],"alliance":"「中にいる人より外にいる人の方が大事なことを言える。その仕組みを作る。」","sub":"grant"},{"id":290,"name":"ベンチャーフィランソロピーのための指標","en":"","src":"#425","stage":null,"layer":"supp","context":"フィランソロピー投資の社会的成果を測定・報告したい。","problem":"社会的リターンを財務的リターンと同様に測定・比較する指標がない。","solution":"Homeward Bound（米国）のような指標、またはブレンデッドバリュー・SROI指標をステークホルダーコミュニケーションに使う。","examples":["Homeward Bound（米国）──ホームレス解決プロジェクトの社会的成果指標"],"alliance":"「社会的リターンも数字にする。数字にすれば対話できる。」","sub":"grant"},{"id":291,"name":"フィランソロピーを透明化して効果を高める","en":"","src":"#426, #427","stage":null,"layer":"supp","context":"フィランソロピーの質と効果を高め、ドナーが適切に判断できるようにしたい。","problem":"慈善活動の効果が不透明で資金が最も必要な場所に届いているか確認できない。NGOの質・成果がわからずドナーが適切な判断をできない。","solution":"Center for Effective Philanthropyのように受益者が財団を評価できるフィードバックツールを整備する。GuideStar・New Philanthropy Capitalのようにドナーが参照できるNGOパフォーマンスデータを広く提供する。","examples":["Center for Effective Philanthropy──受益者が財団を評価するツール","GuideStar（多国展開）"],"alliance":"「助ける側が評価される。その緊張感が質を上げる。」","sub":"grant"},{"id":292,"name":"革新者へのサポートサービス","en":"","src":"#428","stage":null,"layer":"supp","context":"社会起業家・革新者が孤立して活動している。","problem":"良いアイデアを持つ革新者がメンタリング・情報・ネットワーク・可視性を欠いて前進できない。","solution":"Cleveland's Civic Innovation Lab・Social Innovation Generator（トロント）のように革新者へのメンタリング・情報・接続・可視性を統合提供するサポートサービスを設ける。","examples":["Cleveland Civic Innovation Lab（ミシガン）","Social Innovation Generator（トロント）"],"alliance":"「良いアイデアは一人では死ぬ。サポートがあれば生き残る。」","sub":"grant"},{"id":293,"name":"社会的組織の経営能力を体系的に強化する","en":"","src":"#429, #430","stage":null,"layer":"supp","context":"社会的組織の内部能力を強化したい。","problem":"社会的組織は社会的使命は強いが経営・財務・人材の能力が弱く成長できない。人材育成に投資する余裕がなくマネジメント能力が組織の成長を制限する。","solution":"Private Equity Foundation・Impetus Trustのようにプライベートエクイティの手法を使って組織の「ターンアラウンド」と内部能力を構築する。ACEVO・NCVOのような非営利組織マネージャー向けの研修プログラムを整備する。","examples":["Private Equity Foundation（英国）","ACEVO・NCVO（英国）──非営利組織マネージャー向け研修プログラム"],"alliance":"「使命は素晴らしい。でも経営が弱ければ続かない。両方を育てる。」","sub":"grant"},{"id":294,"name":"個人のリーダーシップ・起業家精神評価ツール","en":"","src":"#431","stage":null,"layer":"supp","context":"社会起業家のリーダーシップ・感情知性を評価・開発したい。","problem":"社会起業家の選抜・育成に適切な能力評価ツールがない。","solution":"Echoing GreenのSEQ（社会的感情知性）モデルのような個人評価ツールで自己認識と成長を支援する。","examples":["Echoing GreenのSEQ（Social Emotional Intelligence）モデル"],"alliance":"「自分を知ることが最初の一歩。自己認識が革新者を育てる。」","sub":"grant"},{"id":295,"name":"社会セクターの人材を専門的に育成する","en":"","src":"#432, #433","stage":null,"layer":"supp","context":"社会起業家の実践能力と非営利・社会セクターの次世代リーダーを育てたい。","problem":"MBA等の通常のビジネス教育は社会的目的の事業に特化していない。既存のリーダーが去った後に引き継げる次世代リーダーがいない。","solution":"Echoing Green・School for Social Entrepreneurs（英）・Fuping（中国）のような社会起業家専用の育成プログラムを整備する。Clore Social Leadership Programme・UpRisingのような次世代リーダー専用のプログラムを設計する。","examples":["Echoing Green（米国）","School for Social Entrepreneurs（英国）","Clore Social Leadership Programme","UpRising（Young Foundation）"],"alliance":"「社会起業家が学べる場を作る。その場が社会を変える人を育てる。」","sub":"grant"},{"id":296,"name":"セクター間の役割交換","en":"","src":"#434","stage":null,"layer":"supp","context":"異なる組織・セクターの人々が互いの視点を学びたい。","problem":"自分の組織の常識が当たり前になり外部の視点が失われる。","solution":"Social Innovation Exchange（SIX）のように2組織の担当者が3〜6ヶ月間役割を交換する出向プログラムを設ける。","examples":["SIX（Social Innovation Exchange）の役割交換プログラム──3〜6ヶ月のロールスワップ"],"alliance":"「相手の靴を履いてみれば、どれだけ違う世界を生きているかがわかる。」","sub":"grant"},{"id":297,"name":"社会的目的組織のための法的形態と場所の確保","en":"","src":"#435, #436","stage":null,"layer":"supp","context":"助成経済内の組織が適切な法的形態を選択できるようにしたい、かつ活動の場所を確保したい。","problem":"既存の法的形態では社会的使命保護と活動の自由度の両立が難しい。高い地価・家賃が社会的組織の場所を奪う。","solution":"CIC（コミュニティ利益会社）・慈善委員会の公共利益テストのような法的形態と要件で社会的目的組織を支援する。SoHo・HackneyのようなアーツDIストリクトでの家賃補助・Curitibのファベーラ事業税免除を助成経済・社会的企業にも適用する。","examples":["英国CIC（Community Interest Company）法","Charity Commission公共利益テスト","SoHoアーツ地区の計画ルール"],"alliance":"「正しい器を選べば使命が守られる。場所がなければ活動できない。」","sub":"grant"},{"id":298,"name":"コモンズを財産化して収益を社会に還元する","en":"","src":"#437","stage":null,"layer":"supp","context":"共有資源から生まれる価値を社会に還元したい。","problem":"コモンズ（土地・知識・情報）から生まれる価値が私的に独占されている。","solution":"コミュニティランドトラスト（CLT）や知識の財団帰属のように、コモンズを「財産化（propertising）」しながらその収益を社会目的に使う。","examples":["Goodwin Trust（ハル）","Community Land Trusts（CLT）"],"alliance":"「土地は誰のものでもない。でも財産化すれば社会のために管理できる。」","sub":"grant"},{"id":299,"name":"グローバルネットワーク","en":"","src":"#438","stage":null,"layer":"supp","context":"市民社会組織をグローバルにつなぎたい。","problem":"個々の市民社会組織が孤立しており、世界規模での連帯・学習・影響力が生まれない。","solution":"Civicus（国際市民社会同盟）のようなグローバルなネットワークで地域・国・地域レベルで市民行動を強化する。","examples":["Civicus──市民行動と市民社会の強化を目指す国際同盟"],"alliance":"「一国の市民社会は弱い。世界でつながれば強くなる。」","sub":"grant"},{"id":300,"name":"全国ネットワーク","en":"","src":"#439","stage":null,"layer":"supp","context":"特定国内の非営利・社会的組織をつなぎたい。","problem":"個々のNPO・社会的企業が孤立しており、知識共有・能力向上・政策影響力が弱い。","solution":"NCVO・SCVO（英国）のような全国ネットワークで会員の革新を促進し、能力向上プログラムを提供する。","examples":["NCVO（英国非営利組織全国評議会）","SCVO（スコットランド版）"],"alliance":"「一人では変えられない政策もネットワークなら変えられる。」","sub":"grant"},{"id":301,"name":"受給者ネットワークで知識を共有する","en":"","src":"#440","stage":null,"layer":"supp","context":"同じ資金源から支援を受けた組織間で学びを共有したい。","problem":"同じ助成プログラムから支援を受けた組織がバラバラに動き、同じ失敗を繰り返している。","solution":"EU EQUALプログラムのように助成受給者をネットワーク化し、経験・ベストプラクティス・学びを共有する仕組みを義務付ける。","examples":["EU EQUALプログラム──助成受給者のネットワーク化と知識共有を義務付け"],"alliance":"「同じお金をもらった仲間同士でつながれば、お金の価値が何倍にもなる。」","sub":"grant"},{"id":302,"name":"インスピレーションと接続を提供するネットワーク","en":"","src":"#441","stage":null,"layer":"supp","context":"社会的組織が世界の革新的な取り組みからインスピレーションを得たい。","problem":"世界中で良い実践が生まれているが、それを知る手段がない。","solution":"WiserEarthのように非政府・社会的責任組織のオンラインディレクトリ（243か国・110,000エントリー）でインスピレーションと接続を提供する。","examples":["WiserEarth──243か国110,000超の組織を掲載する社会的責任組織ディレクトリ"],"alliance":"「世界のどこかで同じことをやっている人がいる。それを見つける地図を作る。」","sub":"grant"},{"id":303,"name":"社会的企業として市場で活動する","en":"","src":"#442","stage":null,"layer":"supp","context":"社会的目的を持ちながら市場で持続可能に活動したい。","problem":"社会的使命と市場での持続性を両立させる形態・定義が曖昧で、組織の設計が難しい。","solution":"社会的企業という概念のもとで多様な形態（協同組合・CIC・ハイブリッド等）で市場に参加しながら社会的目的を追求する。","examples":["社会的企業の多様な形態の事例集"],"alliance":"「社会的目的とビジネスは矛盾しない。両方を持つ企業の形を設計する。」","sub":"market"},{"id":304,"name":"所有することで市場の論理に対抗する協同の形","en":"","src":"#443, #444, #447","stage":null,"layer":"supp","context":"メンバー・消費者・生産者が共同で所有することで市場の論理に対抗したい。","problem":"通常の会社形態ではメンバーの利益が守られない。個々の消費者は市場に対して弱い立場にある。消費者協同組合は広まっているが生産者協同組合の規模は限定的。","solution":"サービスコンソルティア・消費者生協・MONDRAGON型の生産者協同組合など、メンバー・消費者・生産者が所有することで市場の論理に対抗する。","examples":["日本の食品消費者生協（1300万会員）","MONDRAGON（スペイン）──世界最大の労働者協同組合グループ"],"alliance":"「みんなのものはみんなで運営する。それが最も公平なサービスだ。」","sub":"market"},{"id":305,"name":"所有とガバナンスで使命を守る","en":"","src":"#445, #448","stage":null,"layer":"supp","context":"通常の企業形態でありながら社会的使命をガバナンスに組み込みたい、または企業の収益を社会的目的に使いたい。","problem":"社会的使命を持ちながら市場で活動する組織が、通常の株主圧力で使命を失うリスクがある。企業の利益が株主に還元されるだけで社会的目的に使われない。","solution":"Banca Intesa・Co-operative Bank・Welsh Waterのようにガバナンス構造に社会的使命を組み込む。Bertelsmann財団・Robert Bosch財団のように財団が企業を所有し収益を社会的目的に直接使う。","examples":["Co-operative Bank（英国）","Welsh Water（ミューチュアル型水道事業）","Bertelsmann財団（ドイツ）"],"alliance":"「使命を定款に書けば、株主が変わっても使命は守られる。」","sub":"market"},{"id":306,"name":"社会的モデルの営利開発","en":"","src":"#446","stage":null,"layer":"supp","context":"社会的サービスを営利企業が革新的に提供したい。","problem":"社会的サービスは非営利組織のみが担うという固定観念があり、営利企業の革新的なアプローチが活かされない。","solution":"就労支援・受刑者更生・障害者サービスなど社会的サービスを営利の枠組みで革新的に設計・提供する。","examples":["就労移行支援・受刑者更生・障害者サービスの営利ベースでの革新的提供"],"alliance":"「社会的サービスを誰が提供するかより、誰がどうサービスを受けるかの方が大事だ。」","sub":"market"},{"id":307,"name":"企業の資源と責任を社会的目的に向ける","en":"","src":"#449, #452","stage":null,"layer":"supp","context":"企業が社会的・環境的責任を果たしたい、または企業の資源と社会的企業の使命を組み合わせて社会課題を解決したい。","problem":"企業が利益追求だけでなく社会的責任を果たす仕組みが弱い。企業は資源・技術を持つが社会課題への動機が弱く、社会的企業は使命を持つが資源が弱い。","solution":"グラント提供・ボランティア・余剰ビジネス資産の社会的活用などCSR活動を設計する。BASF-GAINのビタミンA事業・Danone-Grameenのヨーグルト事業のように企業と社会的企業が利益非分配型のパートナーシップを組む。","examples":["Salesforce（NPO向けソフトウェア無償提供）","Danone-Grameen（バングラデシュヨーグルト）"],"alliance":"「企業の技術と社会的使命が一緒に動けば、どちらにもできなかったことができる。」","sub":"market"},{"id":308,"name":"フェアトレードのような市場コミットメント","en":"","src":"#453","stage":null,"layer":"supp","context":"企業が特定の社会的・環境的基準を持つ調達にコミットしたい。","problem":"企業は社会的に責任ある調達をしたいが、個別の取り組みでは市場全体が変わらない。","solution":"CadburyのフェアトレードのみのADM購入コミットメントのように、企業が特定の社会的基準を持つ調達に正式にコミットする。","examples":["Cadbury──特定製品に使うカカオを全てフェアトレード認証のみにするコミットメント"],"alliance":"「大企業が動けば市場が変わる。そのコミットメントを公表する。」","sub":"market"},{"id":309,"name":"企業の資源（技術・費用）を社会的目的に転用する","en":"","src":"#454, #455","stage":null,"layer":"supp","context":"企業の資源を社会的サービスの評価や社会的課題の解決に活用したい。","problem":"社会的サービスの大規模な試験・評価は費用がかかりすぎてNPOや政府だけでは実施できない。企業の高度な技術が社会的課題の解決に使われず商業目的のみに留まっている。","solution":"Azim Premji Foundationのように企業財団が社会サービスの大規模試験に資金を提供する。IBMのアラビア語ブログ翻訳ソフト・CiscoのTelePresence技術のように商業技術を社会的目的に転用する。","examples":["Azim Premji Foundation──インドの学校運営代替モデルの大規模試験","IBMのMeedan（アラビア語ブログ翻訳）","CiscoのTelePresenceをDialogue Caféが社会対話に活用"],"alliance":"「企業が作った道具を社会のために借りる。それだけで世界が広がる。」","sub":"market"},{"id":310,"name":"投資を社会的価値・使命と整合させる","en":"","src":"#456, #457","stage":null,"layer":"supp","context":"投資を社会的・環境的価値に沿って行いたい、または組織の使命と投資ポートフォリオを整合させたい。","problem":"通常の投資は財務リターンのみを追求し社会的・環境的悪影響を無視する。財団・社会的組織が使命と矛盾する対象に投資していることがある。","solution":"社会的責任投資（SRI）戦略で社会的・財務的リターンを最大化しながら投資の負の影響を最小化する。使命連動型投資で組織の投資ポートフォリオを慈善的目標と一致させる。","examples":["社会的責任投資ファンドの多様な展開","環境財団が環境基準を満たす企業のみに投資するポートフォリオ設計"],"alliance":"「お金を投じる先を選ぶことが最大の社会的行動だ。」","sub":"market"},{"id":311,"name":"社会的企業・ベンチャーに段階に応じたエクイティを届ける","en":"","src":"#458, #459, #466","stage":null,"layer":"supp","context":"高インパクト・商業的に持続可能な社会的企業、初期段階の社会的ベンチャー、スケールアップ段階の社会的企業に投資したい。","problem":"社会的企業は通常のベンチャーキャピタルから投資を受けにくい。立ち上げ期はローン融資に適さないがエクイティ投資を受ける仕組みがない。スケールアップ段階の資金が不足している。","solution":"Triodos Bankの社会的企業ベンチャーキャピタルファンド・Bridges Community Venturesの準エクイティ投資・CAN Breakthrough Social Investment Fundのような段階に応じた専門的な投資を組み合わせる。","examples":["Triodos Bank社会的企業ベンチャーキャピタルファンド（英国）","Bridges Community Ventures（英国）","CAN Breakthrough Social Investment Fund"],"alliance":"「社会的企業専用の投資家を育てる。専用の資金が専用の企業を育てる。」","sub":"market"},{"id":312,"name":"通常の金融が届かない人・組織への融資","en":"","src":"#460, #461, #462","stage":null,"layer":"supp","context":"低所得者・小規模生産者・社会的目的組織が資本にアクセスできるようにしたい。","problem":"通常の銀行融資は担保・信用履歴が必要で低所得者・小規模生産者は排除される。通常の金融機関を通じた小額融資は手数料が高い。慈善組織・社会的目的組織は通常の融資条件では成立しない。","solution":"Grameen・BRAC・ASAのマイクロクレジット・Kivaのようなウェブ直接融資・Charity Bankのような市場金利以下融資を組み合わせて通常の金融が届かない人・組織を支援する。","examples":["Grameen Bank（バングラデシュ）","Kiva──世界中の個人が低所得起業家に直接小額融資","Charity Bank（英国）"],"alliance":"「少額の貸付が人生を変える。担保なしで貸す。それだけで世界が変わる。」","sub":"market"},{"id":313,"name":"慈善と投資を組み合わせる金融商品","en":"","src":"#463, #464","stage":null,"layer":"supp","context":"社会的目的に投資しながら慈善的な効果も得たい、または慈善組織が社会的ベンチャーに投資できるようにしたい。","problem":"投資家は財務的リターンを求め、慈善的貢献と投資の両立が難しい。英国では慈善組織が社会的ベンチャーの株式に投資することが長らく認められていなかった。","solution":"Citylifeが開発した慈善ボンド（投資額の20%と全利息が慈善に）や、Mustard Seed慈善組織がLiberation Foods（フェアトレードCIC）に投資できるような慈善的エクイティを設計する。","examples":["英国Citylife──投資額の20%と全利息が慈善に寄付される慈善ボンド","Mustard Seed慈善組織のLiberation Foods（フェアトレードCIC）への投資"],"alliance":"「投資しながら寄付もできる。その仕組みが新しい投資家を呼ぶ。」","sub":"market"},{"id":314,"name":"投資準備支援","en":"","src":"#465","stage":null,"layer":"supp","context":"有望なプロジェクト・企業が投資を受けられる状態にしたい。","problem":"良いアイデアや実績があっても「投資を受けられる状態（Investment-ready）」でないため資金が集まらない。","solution":"財務ディレクターの一時提供・製品/サービステストの加速など、プロジェクトを投資可能な状態に整えるための準備支援を提供する。","examples":["社会的企業への投資準備支援プログラム"],"alliance":"「良いものが投資を受けられないのは見せ方の問題だ。そこを支援する。」","sub":"market"},{"id":315,"name":"起業前のR&Dメンタードファンディング","en":"","src":"#467","stage":null,"layer":"supp","context":"起業前の段階でR&Dとメンタリングを組み合わせた支援が必要。","problem":"起業前の段階は最もリスクが高く支援が少ない。しかしここでの投資が最も大きなリターンを生む。","solution":"MONDRAGONのCaja Laboralのように起業前のR&Dにメンタードファンディングを提供する。","examples":["MONDRAGON Caja Laboral──起業前のR&Dメンタードファンディング"],"alliance":"「生まれる前から育てる。それが最も効率的な投資だ。」","sub":"market"},{"id":316,"name":"社会的価値を優先する銀行・金融機関","en":"","src":"#468, #469, #470","stage":null,"layer":"supp","context":"社会的・環境的価値に沿った形で資金を運用する金融機関が必要。","problem":"通常の銀行は財務リターンのみを追求し社会的・環境的影響を考慮しない。大手銀行は地域コミュニティのニーズより株主利益を優先する。大手銀行は低所得者・小規模コミュニティへのサービスが不十分で高コスト。","solution":"Triodos Bank・Co-operative Bank・GLS Bank（ドイツ）・Banca Etica（イタリア）のような倫理的銀行。メンバー所有・一人一票原則の協同組合銀行。メンバーの預金だけを財源とする信用組合。","examples":["Triodos Bank（オランダ発）","GLS Bank（ドイツ）","Banca Etica（イタリア）","英国の建築組合（Building Societies）"],"alliance":"「どこに預けるかが社会への投票だ。倫理的銀行に預けることが変化を生む。」","sub":"market"},{"id":317,"name":"金融保証協同組合","en":"","src":"#471","stage":null,"layer":"supp","context":"小規模企業・協同組合が融資を受けやすくしたい。","problem":"小規模企業は担保が弱く、単独では融資を受けにくい。","solution":"イタリアのconsorzi fidi（confidi）のようにメンバーが相互保証する金融保証協同組合を設立し、集合的な保証力を使って個々の融資を可能にする。","examples":["イタリアのconsorzi fidi（confidi）──中小企業の相互融資保証協同組合"],"alliance":"「一人では保証できなくても、みんなで保証すれば借りられる。」","sub":"market"},{"id":318,"name":"投資家と社会的プロジェクトを直接つなぐ","en":"","src":"#472, #476","stage":null,"layer":"supp","context":"投資家と社会的プロジェクトを効率的にマッチングしたい。","problem":"通常の金融機関を経由すると手数料が高く、社会的・財務的両方のリターンを求める投資家と社会的プロジェクトが直接つながれない。社会的企業が資金調達先を探すコストと投資家が社会的企業を探すコストが高い。","solution":"Zopa（英国）のようにP2Pで私的投資家と資本を必要とするプロジェクトを直接結ぶ脱仲介化プラットフォームと、ClearlySo（英国）のようなオンラインマッチングプラットフォームを組み合わせる。","examples":["Zopa（英国）","ClearlySo（英国）──社会的企業と投資家をオンラインでマッチング"],"alliance":"「銀行を通らなくてもお金は動く。直接つなぐ方が双方にとっていい。」","sub":"market"},{"id":319,"name":"社会的企業への銀行融資","en":"","src":"#473","stage":null,"layer":"supp","context":"社会的企業・非営利組織が銀行から融資を受けたい。","problem":"通常の銀行は社会的企業の評価が難しく適切な融資条件が設定できない。","solution":"Banca Prossima（Intesa San Paolo傘下）のように大手銀行グループ内に社会的企業・非営利専門の銀行部門を設ける。","examples":["Banca Prossima（イタリア、Intesa San Paolo グループ）──社会的企業・非営利専門銀行"],"alliance":"「社会的企業を理解する銀行が一つあれば、業界全体が変わる。」","sub":"market"},{"id":320,"name":"ビジネスエンジェルによる社会的ベンチャー投資","en":"","src":"#474","stage":null,"layer":"supp","context":"初期段階の社会的ベンチャーに資金と助言を提供したい。","problem":"初期段階の社会的ベンチャーはVCには小さすぎ、通常の助成では成長投資に使えない。","solution":"ビジネスエンジェルが資金提供とアドバイザリー役割で初期段階の社会的ベンチャーを支援する。エンジェルネットワークで投資家と候補先を結ぶ。","examples":["社会的ベンチャーへのビジネスエンジェル投資ネットワーク"],"alliance":"「お金だけでなく経験と知恵も一緒に渡す。それがエンジェル投資だ。」","sub":"market"},{"id":321,"name":"社会的卸売銀行","en":"","src":"#475","stage":null,"layer":"supp","context":"社会的目的組織への資金フローを拡大する卸売機能が必要。","problem":"社会的金融の小売機関（信用組合・倫理的銀行等）への資金供給が不足している。","solution":"社会的金融機関への資金供給と社会的・財務的リターンの混合を目指す卸売銀行を設立する。","examples":["英国Social Investment Bank（提案）──社会的金融の卸売機関"],"alliance":"「末端に届ける前に、末端を支える卸売を作る。」","sub":"market"},{"id":322,"name":"ビジネス能力と社会的使命を組み合わせたハイブリッドビジネスモデル","en":"","src":"#450","stage":null,"layer":"supp","context":"ビジネス能力と社会的使命を同時に実現したい。","problem":"純粋なビジネスは社会的使命を持ちにくく、純粋な社会的組織はビジネス能力が弱い。","solution":"M-PESAのようにビジネス能力（Safaricom・Vodafone）と社会的目的（金融包摂）を組み合わせたハイブリッドビジネスモデルを設計する。","examples":["M-PESA（Safaricom／Vodafone）──携帯電話送金で金融包摂を実現"],"alliance":"「ビジネスと使命は一つのモデルに同居できる。その設計をする。」","sub":"market"},{"id":323,"name":"社会的サービスの非営利的企業管理","en":"","src":"#451","stage":null,"layer":"supp","context":"公共サービスを企業的な手法で非営利的に管理したい。","problem":"公共機関は硬直的で革新が難しい。民営化すると社会的目的が失われる。第三の道が必要。","solution":"英国Academy Schools・米国Charter Schoolsのように企業スポンサーによる非営利的管理で社会的サービスを革新する。","examples":["英国Academy Schools（企業スポンサーによる学校管理）","米国Charter Schools"],"alliance":"「管理方法を変えるだけで同じリソースが全く違う成果を生む。」","sub":"market"},{"id":324,"name":"社会的価値を認証・マークで見えるようにする","en":"","src":"#477, #478, #479","stage":null,"layer":"supp","context":"消費者が社会的・環境的価値のある商品を選べるようにしたい。","problem":"社会的・環境的価値は商品を見ただけではわからない。良いものが選ばれない。社会的価値が価格に反映されず良い取り組みをしても収益につながらない。全国的な認証は地域の実情を反映しない。","solution":"食品ラベル・環境パフォーマンス評価・炭素フットプリント公表のようにラベリングと評価システムで社会的価値を可視化する。フェアトレード・オーガニックのような社会的マーク・ブランドで品質と社会的価値を保証し価格プレミアムを生む。地域の医師が地域の店舗・レストランに健康食品提供のカイトマークを与える仕組みも作る。","examples":["フェアトレードマーク","オーガニック認証","Devon TivertonのGPが地域の健康食品提供店にカイトマークを付与"],"alliance":"「ラベルひとつで農家の顔が見えるようになった。」","sub":"informal"},{"id":325,"name":"消費者ガイドとレビュー","en":"","src":"#480","stage":null,"layer":"supp","context":"消費者が複雑な選択をする際に信頼できる情報が必要。","problem":"企業の広告や宣伝は消費者の視点でなく企業の利益のために作られている。","solution":"Good Food Guide（1951年〜）・Which?（1957年〜）のような消費者の立場からの独立ガイドとレビューを整備する。","examples":["Good Food Guide（Raymond Postgate創設）","Which?（Michael Young創設）"],"alliance":"「消費者が消費者のために書く情報が一番信頼できる。」","sub":"informal"},{"id":326,"name":"企業行動に対する社会運動キャンペーン","en":"","src":"#481","stage":null,"layer":"supp","context":"企業の社会的・環境的に問題ある行動を変えたい。","problem":"個別消費者の抗議は無視されるが、組織的な社会運動は企業を動かす力を持つ。","solution":"ネスレ粉ミルクキャンペーンのように企業の問題ある行動に対して組織的な社会運動キャンペーンを展開する。","examples":["ネスレ粉ミルクキャンペーン──企業の途上国での粉ミルク販売慣行を変えた社会運動"],"alliance":"「一人では無視される。運動になれば企業が動く。」","sub":"informal"},{"id":327,"name":"国家通貨では届かない価値を循環させる代替システム","en":"","src":"#482, #507, #508, #509, #510","stage":null,"layer":"supp","context":"地域経済・時間・ケアなど国家通貨では届かない価値を交換・循環させたい。","problem":"国家通貨は地域経済の活性化に必ずしも役立たない。お金がないと助け合いが成立しない。国家通貨が不足している地域での交換が難しい。ケアに携わる時間の価値が認められない。","solution":"Ithaca Hoursのような地域交換通貨・タイムバンク・LETS・日本のFureai Kippu（ケア通貨）・アフリカの携帯通話時間通貨のように時間・ケア・地域の資源を交換・循環させる代替システムを設計する。","examples":["Ithaca Hours（米国）","英国のタイムバンク（100か所以上）","日本のFureai Kippu（ふれあいきっぷ）","アフリカの携帯通話時間通貨"],"alliance":"「お金がなくても時間があれば参加できる。時間が通貨になる。」","sub":"informal"},{"id":328,"name":"社会経済を担う人材を育成する","en":"","src":"#483, #484, #485, #486","stage":null,"layer":"supp","context":"社会経済・協同組合経済を担う専門人材を育てたい。","problem":"社会経済・協同組合の経営に必要な専門知識を学べる教育機関が少ない。ビジネスリーダーの強力なスキルが引退後に社会に活かされない。非営利組織のマネージャーはリーダーシップ研修の機会が少ない。通常のMBAは社会的目的の事業を扱わない。","solution":"MONDRAGON大学のような社会経済に特化した専門アカデミー・HarvardのAdvanced Leadership Programme・On Purposeのような実践型非営利研修・INSEADやOxfordのSkoll Centreの社会的起業家精神授業を組み合わせる。","examples":["MONDRAGON大学──協同組合経営に特化した大学","Harvard Advanced Leadership Programme","On Purpose（英国）","Oxford Saïd Business School（Skoll Centre）"],"alliance":"「社会経済を学べる場を作る。その場が次の世代を育てる。」","sub":"informal"},{"id":329,"name":"相互支援ネットワーク","en":"","src":"#487","stage":null,"layer":"supp","context":"社会的起業家・社会的企業が互いに支え合いたい。","problem":"社会的起業家は孤立しがちで、同じ課題を抱える仲間とのつながりが少ない。","solution":"Community Action Network（CAN）のように社会的起業家精神と社会的企業を横断的に支援する相互支援ネットワークを育てる。","examples":["Community Action Network（CAN）──英国全土の社会的起業家精神と社会的企業の支援ネットワーク"],"alliance":"「一人で戦うより仲間と戦う方がずっと遠くまでいける。」","sub":"informal"},{"id":330,"name":"余暇時間の社会的市場","en":"","src":"#488","stage":null,"layer":"supp","context":"人々の余暇時間と雇用主のニーズをマッチングしたい。","problem":"人々には活用されていない余暇時間があり、雇用主には柔軟な労働力のニーズがある。しかしつなぐ仕組みがない。","solution":"Slivers-of-Time（Guaranteed Electronic Market）のようにウェブで人々の余暇時間と雇用主・コミュニティのニーズをマッチングする市場を作る。","examples":["Slivers-of-Time──人々の余暇時間と雇用主ニーズをウェブでマッチング"],"alliance":"「余っている時間と足りない力をつなぐ。それだけで価値が生まれる。」","sub":"informal"},{"id":331,"name":"市場の価格設計で悪を減らし善を増やす","en":"","src":"#489, #490","stage":null,"layer":"supp","context":"排出・廃棄物などの社会的「悪」を削減し、炭素削減・環境保全など社会的「善」に市場で報酬を与えたい。","problem":"排出・廃棄物は規制だけでは削減が遅い。炭素削減・環境保全などの社会的「善」は市場で報酬されず、過少供給される。","solution":"排出権取引・廃棄物処理取引スキームのように「悪」に価格をつける。オーストラリアの土壌炭素隔離証書のように炭素削減などの「善」に市場で価格をつけて報酬する。","examples":["CO2排出権取引スキーム（EU-ETS）","オーストラリアPrime Carbon scheme──農地の土壌炭素隔離に証書を発行し市場で取引"],"alliance":"「悪いことに値段をつければ人々は避けようとする。市場の力を社会的目的に使う。」","sub":"informal"},{"id":332,"name":"ソーシャルストック取引所","en":"","src":"#491","stage":null,"layer":"supp","context":"社会的ビジネスのパフォーマンスを測定・取引できる市場を作りたい。","problem":"社会的ビジネスへの投資家が増えているが、株式を取引し投資成果を評価する公式な場がない。","solution":"ソーシャルストック取引所を設立し、投資家が社会的目的企業の株式を取引し企業が新しい資金調達手段にアクセスできるようにする。","examples":["複数国でのソーシャルストック取引所設立の試み"],"alliance":"「社会的企業も株式市場に上場できる。その場所を作る。」","sub":"informal"},{"id":333,"name":"社会的指標","en":"","src":"#492","stage":null,"layer":"supp","context":"社会的責任ある企業への投資を測定・促進したい。","problem":"企業の社会的責任（CSR）のパフォーマンスを比較できる標準的な指標がなく、責任投資が難しい。","solution":"FTSE4Good Index Seriesのようにグローバルに認められたCSR基準を満たす企業を測定する社会的指標を作る。","examples":["FTSE4Good Index Series──グローバルCSR基準を満たす企業の指数"],"alliance":"「測れれば比べられる。比べられれば競争が生まれる。社会的責任でも。」","sub":"informal"},{"id":334,"name":"バーチャル市民社会","en":"","src":"#493","stage":null,"layer":"supp","context":"オンラインで市民が議論・行動できるコミュニティを育てたい。","problem":"現実の社会では議論しにくいトピックについて市民が意見を形成・共有する場が少ない。","solution":"中国のFever Friend Networkのようにオンラインで論争的・現代的な問題を議論し、映画・情報を共有するバーチャル市民社会を育てる。","examples":["中国「Fever Friend Network」──オンラインコミュニティで炭鉱規制・都市移住等を議論"],"alliance":"「現実では言えないことがオンラインでは言える。その場が社会を動かす。」","sub":"informal"},{"id":335,"name":"個人の小さな行動を集めて大きな力にする","en":"","src":"#494, #495, #496","stage":null,"layer":"supp","context":"コミュニティ内での集合行動・共同購買・物品ギフティングを組織化したい。","problem":"個人はカーシェアなど集合行動に参加したいが組織化コストが高い。個人では価格交渉力が弱く大量購入のメリットを享受できない。使えるものが捨てられる一方で必要な人がいる。","solution":"Liftshare（カーシェア）・YumShare（グループ購買）・Freecycle（物品ギフティング）のように個人では小さすぎる行動を集めて大きな力にするプラットフォームを設計する。","examples":["Liftshare──通勤者のカーシェアプラットフォーム","YumShare","Freecycle──85か国500万会員以上の物品ギフティングコミュニティ"],"alliance":"「一人ではできないことが、プラットフォームがあればできる。」","sub":"informal"},{"id":336,"name":"共同制作プラットフォーム（インフォーマル経済版）","en":"","src":"#497","stage":null,"layer":"supp","context":"市民・アマチュアが専門家と同じ場でコンテンツ・サービスを共同制作したい。","problem":"プロのメディア・サービスは市民の視点・声を排除し、市民は受け身の消費者に留まる。","solution":"OhmyNews（韓国）のように市民レポーターが記事を書き、プロと同じプラットフォームで公開できる共同制作プラットフォームを設計する。","examples":["OhmyNews（韓国）──数万人の市民レポーターがニュースを共同制作"],"alliance":"「消費者が生産者になる。その場を作れば社会が変わる。」","sub":"informal"},{"id":337,"name":"オンラインガイドとモデレーター","en":"","src":"#498","stage":null,"layer":"supp","context":"オンライン上の健康・社会的情報の質と信頼性を確保したい。","problem":"インターネット上の情報は玉石混交で、特に医療・健康情報は誤情報が多い。","solution":"英国のHealth Information Accreditation Schemeのように情報生産・ウェブサイト・フォーラムを認定しカイトマークを付与する仕組みを設ける。","examples":["英国Health Information Accreditation Scheme──オンライン医療情報の認定とカイトマーク付与"],"alliance":"「信頼できる情報に印をつける。その印が人々を守る。」","sub":"informal"},{"id":338,"name":"知識・情報をオープンにしながら創造者も守る","en":"","src":"#499, #500, #502","stage":null,"layer":"supp","context":"情報・知識の利用権を確立しながら広くアクセスできるようにしたい。","problem":"民営化は独占的所有を生みアクセスを制限する。しかし完全なオープンでは創造者のインセンティブがなくなる。学術論文・専門知識は購読料・アクセス制限で多くの人に届かない。","solution":"Creative Commonsのようなオープンライセンスで社会の利益と創造者の権利のバランスを取る。Open Access Journalのように研究者が無料でオンライン公開する情報コモンズを作る。","examples":["Creative Commons──「いくつかの権利を保留」する柔軟な著作権","Open Access Journals──学術論文の無料オンライン公開"],"alliance":"「全部守るか全部開けるかではない。部分的に開ける仕組みが最も多くの人に届く。」","sub":"informal"},{"id":339,"name":"コミュニティによる資産の新しい所有形態","en":"","src":"#501","stage":null,"layer":"supp","context":"コミュニティが土地・建物を所有し社会的目的に使いたい。","problem":"土地・建物の民間所有は転売・価格上昇を生み、コミュニティの長期的な利用が難しい。","solution":"Goodwin Trust（ハル）やCommunity Land Trusts（CLT）のようにコミュニティが資産を所有し土地の新しい使い方・建物の活用を可能にする所有形態を設計する。","examples":["Goodwin Trust（ハル）","Community Land Trusts（CLT）──コミュニティによる土地・建物の長期保有"],"alliance":"「土地をコミュニティが持てば、地価が上がっても住み続けられる。」","sub":"informal"},{"id":340,"name":"家庭・コミュニティの無償労働を社会が認め守る","en":"","src":"#503, #504, #505","stage":null,"layer":"supp","context":"家庭内の無償労働・ケアを社会的に価値あるものとして認め、家庭・コミュニティが社会的生産に参加できる時間を確保したい。","problem":"家庭内のケア・支援は市場で取引されないため「見えない」ものとして扱われ評価・支援されない。フルタイム雇用が標準の社会では家庭・コミュニティへの貢献時間がない。硬直した雇用条件がコミュニティ活動・家庭内ケアの時間を奪う。","solution":"公的税額控除・コミュニティコミッショニング・グラント支援プロジェクトで家庭内の時間を社会的生産として認める。ソーシャルサバティカルや専門職のサバティカル権のような政策で生産活動のための時間を制度的に作る。フレキシブルワーキング申請権のように正規雇用の条件を柔軟にする。","examples":["公的税額控除を通じた家庭内ボランタリーワークの認定","特定専門職のサバティカル権","英国フレキシブルワーキング申請権"],"alliance":"「育て・世話し・支える時間は働いている。その時間に価値を与える。」","sub":"informal"},{"id":341,"name":"ボランティアへの研修とネットワーク","en":"","src":"#506","stage":null,"layer":"supp","context":"ボランティアの能力を高め、活動先とマッチングしたい。","problem":"ボランティアはやる気があっても必要なスキルがなく、活動先も見つかりにくい。","solution":"Timebank・Youthnetのようにボランティアへの研修・インセンティブ・プロジェクトとのマッチングネットワークを整備する。","examples":["Timebank（英国）","Youthnet──ボランティアの研修・マッチングネットワーク"],"alliance":"「やる気があるだけでは足りない。スキルと場所をつなぐことが必要だ。」","sub":"informal"},{"id":342,"name":"ストリートを革新とサービスの単位にする","en":"","src":"#511","stage":null,"layer":"supp","context":"超ローカルなレベルでのコミュニティ革新を生み出したい。","problem":"地域の問題は近隣レベルで最もよく見えるが、その単位での組織化・革新が起きない。","solution":"街路コンシェルジュ・守衛・ウォーデンのような役割を通じて超ローカルな問題を発見しコミュニティを組織化する。","examples":["街路レベルの革新者・守衛制度"],"alliance":"「街路が最小の革新単位だ。そこから始める。」","sub":"informal"},{"id":343,"name":"公共空間をコミュニティの活動・生産に開放する","en":"","src":"#512, #514","stage":null,"layer":"supp","context":"公共空間をより多様・包摂的に使いたい、または市民が食物を育てる活動ができる公共空間が必要。","problem":"公共空間が特定の目的（車・商業）に占有されコミュニティの多様な活動に使えない。都市化で多くの市民が農地・庭を持てず食物の生産から切り離されている。","solution":"ボゴタの「Night for Women」・カナダ都市の車のない日のように公共空間を取り戻し多目的に使う。市民農園・学校菜園・公園の一部開放など公共空間を家庭的生産に解放する。","examples":["ボゴタの「Night for Women」","Food for Life Partnership（英国）──学校菜園・地産地消の推進"],"alliance":"「この空間は誰のものでもある。みんなで使い方を決める。」","sub":"informal"},{"id":344,"name":"活動を通じた抗議","en":"","src":"#513","stage":null,"layer":"supp","context":"社会変革への抗議や要求を活動を通じて表現したい。","problem":"言葉だけの抗議は無視されやすい。しかし具体的な行動で示せば社会が動く。","solution":"Guerrilla Gardening（活動家が公共用地を耕す）・シチリアの失業者による逆ストライキ（道路建設）のように「活動を通じた抗議」を展開する。","examples":["Guerrilla Gardening──「活動家」ガーデナーが公共の小さな土地を耕して花を植える"],"alliance":"「不満を言うより先に始める。やっていれば人が来る。」","sub":"informal"},{"id":345,"name":"家庭活動に溶け込むコミュニティセンター","en":"","src":"#515","stage":null,"layer":"supp","context":"コミュニティセンターをより日常的な活動の場にしたい。","problem":"従来のコミュニティセンターは「特別な場所」として設計され、日常の家庭活動とかけ離れている。","solution":"保育・娯楽・食事などの家庭活動を取り込み、市民が運営に参加するコミュニティセンターを設計する。","examples":["保育・食事・娯楽を統合したコミュニティセンターの設計"],"alliance":"「コミュニティセンターが家の延長になれば、毎日来る場所になる。」","sub":"informal"},{"id":346,"name":"近隣ウェブサイトとメディア","en":"","src":"#516","stage":null,"layer":"supp","context":"近隣コミュニティの情報交換・活動調整をオンラインで支援したい。","problem":"近隣の情報（活動・問題・交換）が共有されず、コミュニティの潜在力が活かされない。","solution":"Boscalicious（ハイパーローカルウェブサイト）のように近隣の交換・ローカルニュース・活動のハブとなるウェブサイト・メディアを設ける。","examples":["Boscalicious──近隣の情報交換・活動のハブとなるハイパーローカルウェブサイト"],"alliance":"「近所のことは近所のメディアが一番よく伝える。」","sub":"informal"},{"id":347,"name":"ユーザーが生産者になる","en":"","src":"#517","stage":null,"layer":"supp","context":"サービスの利用者が自分自身のニーズを管理・解決できるようにしたい。","problem":"専門家主導のサービスでは利用者が受け身になり、依存が生まれ、持続コストが高くなる。","solution":"Expert Patients Programme（NHS）のように長期疾患を持つ患者が自分の健康状態を管理し他の患者にも教えられるようにする。","examples":["Expert Patients Programme（NHS）──慢性疾患患者が自分の状態を管理し他者に訓練を提供"],"alliance":"「使う人が作る人になれる。そのための設計をする。」","sub":"informal"},{"id":348,"name":"生産者・消費者協働","en":"","src":"#518","stage":null,"layer":"supp","context":"消費者が生産者を直接支援し、持続可能な生産を実現したい。","problem":"消費者と生産者の距離が遠く、農家が季節的な資金リスクを一人で負っている。","solution":"Community Shared Agriculture（CSA）のように消費者が農家の季節コストを前払いし、毎週の収穫のシェアを受け取る。","examples":["Community Shared Agriculture（CSA）──消費者が農家のシーズンコストを前払い"],"alliance":"「農家のリスクを消費者が分かち合う。それだけで関係が変わる。」","sub":"informal"},{"id":349,"name":"家の枠を超えてコミュニティが支え合う住まいを作る","en":"","src":"#519, #520, #521","stage":null,"layer":"supp","context":"ケア・回復・コミュニティを必要とする人々の生活環境を拡張したい、または高齢者・ケアが必要な人々にグループとして効率的にサービスを届けたい。","problem":"個別の家庭では提供できないケア・コミュニティサポートが必要な人がいる。個別家庭へのサービス提供はコストが高く孤立も深刻。通常の住宅は個別の居住単位として設計されコミュニティの相互支援が生まれにくい。","solution":"San Patrignano（イタリア）のような居住コミュニティで「拡張された家」としてケアを支援する。シェルタードアコモデーションの原理を一般化し個別家庭・ボランタリー参加・共有サービスを組み合わせる。Niagara Peninsula Homes（カナダ）のような協同組合住宅でメンバーが維持管理へのボランタリーな時間貢献を条件とする相互支援コミュニティを作る。","examples":["San Patrignano（イタリア）──薬物依存回復のための居住コミュニティ","高齢者向けシェルタードアコモデーション","Niagara Peninsula Homes（カナダ）"],"alliance":"「一人では回復できない。コミュニティという家が回復を支える。」","sub":"informal"},{"id":350,"name":"ケア・支援の新しいモデルを開発する","en":"","src":"#522","stage":null,"layer":"supp","context":"家庭的生産における助言・コーチング・仲介・補完・コミュニケーションの新しいモデルが必要。","problem":"従来のケア・支援モデルは専門家主導で画一的。多様な形態・組み合わせが必要な時代に対応できていない。","solution":"助言・コーチング・仲介・補完・コミュニケーションを組み合わせた家庭的生産のための新しいケア・支援モデルを開発する。","examples":["様々な形態のケア・支援の新しい組み合わせモデルの開発"],"alliance":"「ケアの形は一つではない。多様な形を認め育てる。」","sub":"informal"}];

const suppStr  = s => ({public:"公共セクター",grant:"助成経済",market:"市場経済",informal:"家庭・インフォーマル"})[s]||"";
const subLabel = p => p.layer==="conn"?connStr(p.sub):p.layer==="supp"?suppStr(p.sub):stageStr(p.stage);

// 日本事例コンポーネント
function JpCases({cases, color, bg, patternId}) {
  const [open, setOpen] = useState(false);
  if (!cases || cases.length === 0) return null;
  return React.createElement("div", {style:{marginTop:10}},
    React.createElement("button", {
      onClick: e => { e.stopPropagation(); setOpen(!open); },
      style: {
        display:"inline-flex", alignItems:"center", gap:6,
        padding:"4px 12px", borderRadius:20, border:"none",
        background: open ? color : bg,
        color: open ? "#fff" : color,
        fontSize:11, fontWeight:700, cursor:"pointer", transition:"all 0.15s"
      }
    }, `🏷 日本の事例 ${cases.length}件 ${open?"▲":"▼"}`),
    open && React.createElement("div", {
      style:{marginTop:8, display:"flex", flexDirection:"column", gap:8, animation:"fadeIn 0.2s ease"}
    },
      cases.map((c, i) => React.createElement("div", {
        key:i,
        style:{
          background:"#fff", border:`1px solid ${color}44`,
          borderRadius:10, padding:"10px 14px",
          borderLeft:`3px solid ${color}`
        }
      },
        React.createElement("div", {style:{fontSize:13, fontWeight:700, marginBottom:3}}, c.title),
        c.desc && React.createElement("div", {style:{fontSize:12, color:"#374151", lineHeight:1.6, marginBottom:4}},
          c.desc.slice(0,100) + (c.desc.length > 100 ? "..." : "")
        ),
        React.createElement("div", {style:{display:"flex", gap:8, flexWrap:"wrap", alignItems:"center"}},
          React.createElement("a", {
            href: "./cases.html?collection=si&patternId="+patternId+"&caseIndex="+i,
            target:"_blank",
            onClick: e => e.stopPropagation(),
            style:{fontSize:11, color: color, textDecoration:"underline", fontWeight:600}
          }, "📄 詳細・削除"),
          c.url && React.createElement("a", {
            href: c.url, target:"_blank", rel:"noopener",
            onClick: e => e.stopPropagation(),
            style:{fontSize:11, color: color, textDecoration:"underline"}
          }, "🔗 参照リンク"),
          c.date && React.createElement("span", {style:{fontSize:11, color:"#9CA3AF"}}, c.date),
          c.author && React.createElement("span", {style:{fontSize:11, color:"#9CA3AF"}}, `by ${c.author}`)
        )
      ))
    )
  );
}

function App(){
  const [layer,setLayer]=useState("all");
  const [sub,setSub]=useState("all");
  const [search,setSearch]=useState("");
  const [expanded,setExpanded]=useState(null);

  const filtered=useMemo(()=>{
    return ALL_PATTERNS.filter(p=>{
      if(layer!=="all"&&p.layer!==layer) return false;
      if(sub!=="all"){
        if(layer==="proc"&&p.stage!==sub) return false;
        if((layer==="conn"||layer==="supp")&&p.sub!==sub) return false;
      }
      if(search){
        const q=search.toLowerCase();
        return p.name.toLowerCase().includes(q)||
               (p.problem||"").toLowerCase().includes(q)||
               (p.solution||"").toLowerCase().includes(q)||
               (p.alliance||"").toLowerCase().includes(q)||
               (p.notes||"").toLowerCase().includes(q)||
               (p.examples||[]).some(e=>e.toLowerCase().includes(q))||
               (p.jp_cases||[]).some(c=>(c.title||"").toLowerCase().includes(q)||(c.desc||"").toLowerCase().includes(q));
      }
      return true;
    });
  },[layer,sub,search]);

  const subOptions = layer==="proc"?PROC_STAGES:layer==="conn"?CONN_SUBS:layer==="supp"?SUPP_SUBS:[];
  const cntFor = sid => {
    const base = layer==="all"?ALL_PATTERNS:ALL_PATTERNS.filter(p=>p.layer===layer);
    if(sid==="all") return base.length;
    if(layer==="proc") return ALL_PATTERNS.filter(p=>p.layer==="proc"&&p.stage===sid).length;
    return ALL_PATTERNS.filter(p=>p.layer===layer&&p.sub===sid).length;
  };

  return React.createElement("div",{style:{background:"#F8F7F4",minHeight:"100vh",padding:"24px 16px",maxWidth:900,margin:"0 auto"}},

    // ヘッダー
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
      React.createElement("div",{style:{marginBottom:0}},
        React.createElement("span",{style:{fontSize:10,fontWeight:700,letterSpacing:"0.1em",color:"#D97706",textTransform:"uppercase"}},"ソーシャルR&D Cookpad — Pattern Language")),
      React.createElement("a",{
        href:"./admin.html",
        style:{fontSize:11,fontWeight:600,color:"#059669",textDecoration:"none",
          background:"#D1FAE5",padding:"4px 12px",borderRadius:20,whiteSpace:"nowrap"}
      },"＋ 事例を登録")
    ),
    React.createElement("h1",{style:{fontSize:20,fontWeight:800,lineHeight:1.4,margin:"0 0 4px"}},"「眠ってるなんでもないものを起こす」パターン・カード"),
    React.createElement("p",{style:{fontSize:12,color:"#6B7280",margin:"0 0 20px"}},`Open Book of Social Innovationから抽出・精錬。${ALL_PATTERNS.length}パターン収録。`),

    // 検索
    React.createElement("input",{
      placeholder:"キーワードで検索（問題・解決・事例・同盟の文脈・日本事例）",
      value:search,
      onChange:e=>{setSearch(e.target.value);setExpanded(null);},
      style:{width:"100%",padding:"8px 14px",borderRadius:10,border:"1px solid #E5E7EB",
             fontSize:13,marginBottom:14,outline:"none",background:"#fff"}
    }),

    // 層フィルター
    React.createElement("div",{style:{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}},
      LAYERS.map(l=>{
        const cnt=l.id==="all"?ALL_PATTERNS.length:ALL_PATTERNS.filter(p=>p.layer===l.id).length;
        return React.createElement("button",{key:l.id,
          onClick:()=>{setLayer(l.id);setSub("all");setExpanded(null);},
          style:{padding:"6px 14px",borderRadius:20,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",
            background:layer===l.id?(l.id==="all"?"#1A1A1A":l.color):"#E5E7EB",
            color:layer===l.id?"#fff":"#374151",transition:"all 0.15s"}
        },`${l.label} (${cnt})`);
      })
    ),

    // サブフィルター
    layer!=="all"&&React.createElement("div",{style:{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",
      paddingLeft:8,borderLeft:`3px solid ${lc(layer)}`}},
      subOptions.map(s=>React.createElement("button",{key:s.id,
        onClick:()=>{setSub(s.id);setExpanded(null);},
        style:{padding:"4px 12px",borderRadius:16,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",
          background:sub===s.id?lc(layer):"#F3F4F6",
          color:sub===s.id?"#fff":"#6B7280",transition:"all 0.15s"}
      },`${s.label} (${cntFor(s.id)})`))
    ),

    // 件数
    React.createElement("div",{style:{fontSize:11,color:"#9CA3AF",marginBottom:12}},`${filtered.length}件表示`),

    // カード一覧
    React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      filtered.map(p=>{
        const isOpen=expanded===p.id;
        const c=lc(p.layer); const bg=lb(p.layer);
        const hasJpCases = p.jp_cases && p.jp_cases.length > 0;
        return React.createElement("div",{key:p.id,
          onClick:()=>setExpanded(isOpen?null:p.id),
          style:{background:"#fff",borderRadius:14,
            border:isOpen?`2px solid ${c}`:"1px solid #E5E7EB",
            overflow:"hidden",cursor:"pointer",
            boxShadow:isOpen?`0 4px 16px ${c}22`:"0 1px 3px rgba(0,0,0,0.04)",
            transition:"all 0.2s"}},

          // ヘッダー行
          React.createElement("div",{style:{padding:"14px 18px",display:"flex",alignItems:"center",gap:12}},
            React.createElement("div",{style:{width:36,height:36,borderRadius:10,background:bg,color:c,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:12,fontWeight:800,flexShrink:0}},p.id),
            React.createElement("div",{style:{flex:1,minWidth:0}},
              React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
                React.createElement("span",{style:{fontSize:15,fontWeight:700}},p.name),
                hasJpCases&&React.createElement("span",{
                  style:{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,
                    background:c,color:"#fff",flexShrink:0}
                },`🏷 ${p.jp_cases.length}件`)
              ),
              React.createElement("div",{style:{fontSize:10,color:"#9CA3AF",overflow:"hidden",
                textOverflow:"ellipsis",whiteSpace:"nowrap"}},
                p.en+"  |  src:"+p.src)),
            React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}},
              React.createElement("span",{style:{fontSize:10,fontWeight:600,padding:"2px 8px",
                borderRadius:10,background:bg,color:c}},ll(p.layer)),
              subLabel(p)&&React.createElement("span",{style:{fontSize:10,color:"#9CA3AF"}},subLabel(p))),
            React.createElement("span",{style:{color:"#9CA3AF",fontSize:14,flexShrink:0,
              transition:"transform 0.2s",transform:isOpen?"rotate(180deg)":"none"}},"▼")),

          // 展開パネル
          isOpen&&React.createElement("div",{style:{padding:"0 18px 18px",animation:"fadeIn 0.2s ease"}},
            React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},
              React.createElement("div",{style:{background:"#F9FAFB",borderRadius:10,padding:"10px 14px"}},
                React.createElement("div",{style:{fontSize:10,fontWeight:700,color:"#6B7280",marginBottom:3}},"状況（Context）"),
                React.createElement("div",{style:{fontSize:13,lineHeight:1.7}},p.context)),
              React.createElement("div",{style:{background:"#FEF2F2",borderRadius:10,padding:"10px 14px",borderLeft:"3px solid #EF4444"}},
                React.createElement("div",{style:{fontSize:10,fontWeight:700,color:"#EF4444",marginBottom:3}},"問題（力の対立）"),
                React.createElement("div",{style:{fontSize:13,lineHeight:1.7}},p.problem)),
              React.createElement("div",{style:{background:"#F0FDF4",borderRadius:10,padding:"10px 14px",borderLeft:"3px solid #22C55E"}},
                React.createElement("div",{style:{fontSize:10,fontWeight:700,color:"#16A34A",marginBottom:3}},"解決（Solution）"),
                React.createElement("div",{style:{fontSize:13,lineHeight:1.7}},p.solution)),
              p.examples&&p.examples.length>0&&React.createElement("div",{style:{background:"#F9FAFB",borderRadius:10,padding:"10px 14px"}},
                React.createElement("div",{style:{fontSize:10,fontWeight:700,color:"#6B7280",marginBottom:3}},"事例"),
                p.examples.map((e,i)=>React.createElement("div",{key:i,style:{fontSize:12,color:"#374151",lineHeight:1.6}},"・"+e))),
              React.createElement("div",{style:{background:bg,borderRadius:10,padding:"10px 14px",borderLeft:`3px solid ${c}`}},
                React.createElement("div",{style:{fontSize:10,fontWeight:700,color:c,marginBottom:3}},"🌱 同盟の文脈"),
                React.createElement("div",{style:{fontSize:13,lineHeight:1.7}},p.alliance)),
              p.notes&&React.createElement("div",{style:{background:"#FFFBEB",borderRadius:10,padding:"10px 14px",borderLeft:"3px solid #F59E0B"}},
                React.createElement("div",{style:{fontSize:10,fontWeight:700,color:"#D97706",marginBottom:3}},"📝 メモ・追記"),
                React.createElement("div",{style:{fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}},p.notes)),
              React.createElement(JpCases, {cases: p.jp_cases, color: c, bg: bg, patternId: p.id})
            ))
        );
      })
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
