<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伴走者のパターン・ランゲージ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #333;
  --text: #e8e4df;
  --text-muted: #999;
  --accent-before: #c9a96e;
  --accent-during: #6ea5c9;
  --accent-after: #7bc96e;
  --accent-cross: #c96eb8;
  --accent-meta: #c96e6e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  line-height: 1.8;
  overflow-x: hidden;
}
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 50%, rgba(201,169,110,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 50%, rgba(110,165,201,0.04) 0%, transparent 50%);
  animation: drift 20s ease-in-out infinite;
}
@keyframes drift {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-3%, 2%); }
}
.hero h1 {
  font-family: 'Noto Serif JP', serif;
  font-weight: 900;
  font-size: clamp(2rem, 5vw, 4rem);
  letter-spacing: 0.15em;
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, var(--accent-before), var(--text), var(--accent-during));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle {
  font-size: clamp(0.9rem, 2vw, 1.2rem);
  color: var(--text-muted);
  margin-top: 1.5rem;
  position: relative;
  z-index: 1;
  max-width: 640px;
  letter-spacing: 0.05em;
}
.hero .count {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(3rem, 8vw, 7rem);
  font-weight: 900;
  color: var(--accent-before);
  opacity: 0.15;
  position: relative;
  z-index: 1;
  margin-top: 2rem;
}
.hero .scroll-hint {
  position: absolute;
  bottom: 2rem;
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 0.3em;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,13,13,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
}
.filter-btn {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 0.4rem 1rem;
  border: 1px solid var(--border);
  border-radius: 2rem;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.05em;
}
.filter-btn:hover { border-color: var(--text); color: var(--text); }
.filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.filter-btn[data-phase="before"].active { background: var(--accent-before); border-color: var(--accent-before); color: var(--bg); }
.filter-btn[data-phase="during"].active { background: var(--accent-during); border-color: var(--accent-during); color: var(--bg); }
.filter-btn[data-phase="after"].active { background: var(--accent-after); border-color: var(--accent-after); color: var(--bg); }
.filter-btn[data-phase="cross"].active { background: var(--accent-cross); border-color: var(--accent-cross); color: var(--bg); }
.filter-btn[data-phase="meta"].active { background: var(--accent-meta); border-color: var(--accent-meta); color: var(--bg); }

.grid {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.5rem;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.8rem;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  transition: width 0.3s;
}
.card[data-phase="before"]::before { background: var(--accent-before); }
.card[data-phase="during"]::before { background: var(--accent-during); }
.card[data-phase="after"]::before { background: var(--accent-after); }
.card[data-phase="cross"]::before { background: var(--accent-cross); }
.card[data-phase="meta"]::before { background: var(--accent-meta); }
.card:hover { transform: translateY(-4px); border-color: #555; }
.card:hover::before { width: 6px; }

.card .num {
  font-family: 'Noto Serif JP', serif;
  font-weight: 900;
  font-size: 2rem;
  opacity: 0.12;
  position: absolute;
  top: 0.8rem;
  right: 1.2rem;
}
.card .phase-tag {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  padding: 0.2rem 0.6rem;
  border-radius: 1rem;
  margin-bottom: 0.8rem;
}
.card[data-phase="before"] .phase-tag { background: rgba(201,169,110,0.15); color: var(--accent-before); }
.card[data-phase="during"] .phase-tag { background: rgba(110,165,201,0.15); color: var(--accent-during); }
.card[data-phase="after"] .phase-tag { background: rgba(123,201,110,0.15); color: var(--accent-after); }
.card[data-phase="cross"] .phase-tag { background: rgba(201,110,184,0.15); color: var(--accent-cross); }
.card[data-phase="meta"] .phase-tag { background: rgba(201,110,110,0.15); color: var(--accent-meta); }

.card .name {
  font-family: 'Noto Serif JP', serif;
  font-weight: 700;
  font-size: 1.25rem;
  margin-bottom: 0.6rem;
  letter-spacing: 0.05em;
}
.card .summary {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.7;
}

/* Modal */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 2rem;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 700px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 2.5rem;
  position: relative;
  animation: modalIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalIn { from { opacity: 0; transform: translateY(30px) scale(0.96); } }
.modal .close-btn {
  position: absolute;
  top: 1rem;
  right: 1.2rem;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.5rem;
  cursor: pointer;
}
.modal .m-phase {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  padding: 0.25rem 0.8rem;
  border-radius: 1rem;
  margin-bottom: 1rem;
}
.modal .m-name {
  font-family: 'Noto Serif JP', serif;
  font-weight: 900;
  font-size: 1.6rem;
  margin-bottom: 1.5rem;
  letter-spacing: 0.05em;
}
.modal .section-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 1.5rem;
  margin-bottom: 0.5rem;
}
.modal .section-label.ctx { color: var(--accent-before); }
.modal .section-label.prob { color: var(--accent-meta); }
.modal .section-label.sol { color: var(--accent-after); }
.modal .section-label.social { color: var(--accent-cross); }
.modal p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.9; }

.stats {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem 2rem 4rem;
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem 1.8rem;
  text-align: center;
  min-width: 140px;
}
.stat-box .stat-num { font-family: 'Noto Serif JP'; font-weight: 900; font-size: 2rem; }
.stat-box .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem; letter-spacing: 0.1em; }

footer {
  text-align: center;
  padding: 3rem 2rem;
  font-size: 0.75rem;
  color: #555;
  border-top: 1px solid var(--border);
  letter-spacing: 0.1em;
  line-height: 2;
}
footer a {
  color: var(--accent-before);
  text-decoration: none;
  border-bottom: 1px solid rgba(201,169,110,0.4);
  transition: border-color 0.2s;
}
footer a:hover { border-color: var(--accent-before); }
.source-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: rgba(201,169,110,0.1);
  border: 1px solid rgba(201,169,110,0.25);
  border-radius: 2rem;
  padding: 0.35rem 0.9rem;
  margin: 0.3rem 0.2rem;
  font-size: 0.7rem;
  color: var(--accent-before);
  text-decoration: none;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.source-badge:hover {
  background: rgba(201,169,110,0.2);
  border-color: var(--accent-before);
  transform: translateY(-1px);
}
.footer-sources {
  margin-top: 1rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  justify-content: center;
}
.case-badge {
  display: inline-block;
  font-size: 0.62rem;
  font-weight: 600;
  padding: 0.2rem 0.6rem;
  border-radius: 1rem;
  background: rgba(110,165,201,0.15);
  color: var(--accent-during);
  margin-top: 0.4rem;
  letter-spacing: 0.05em;
}
.cases-list { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
.case-item {
  display: block;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.8rem 1rem;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s;
}
.case-item:hover { border-color: var(--accent-cross); transform: translateX(3px); }
.case-item-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.2rem; }
.case-item-meta { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 0.25rem; }
.case-item-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.6; }
</style>
</head>
<body>

<section class="hero">
  <h1>伴走者のパターン・ランゲージ</h1>
  <p class="subtitle">越境学習の伴走者ガイドライン（経済産業省 2025）の知見を<br>パターン・ランゲージの形式で構造化した 試作版</p>
  <div class="count">38</div>
  <div class="scroll-hint">▼ SCROLL</div>
</section>

<div class="stats" id="stats"></div>

<nav class="controls">
  <button class="filter-btn active" data-phase="all">すべて（38）</button>
  <button class="filter-btn" data-phase="before">越境前</button>
  <button class="filter-btn" data-phase="during">越境中</button>
  <button class="filter-btn" data-phase="after">越境後</button>
  <button class="filter-btn" data-phase="cross">フェーズ横断</button>
  <button class="filter-btn" data-phase="meta">伴走の構え</button>
</nav>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<footer>
  パターン・ランゲージ試作版 — 井庭崇『パターン・ランゲージ』の方法論に基づき構造化
  <div class="footer-sources">
    <a class="source-badge" href="https://www.meti.go.jp/policy/economy/jinzai/shukkokigyo/gaidorain.pdf" target="_blank" rel="noopener">
      📄 原典：経済産業省 越境学習伴走者ガイドライン (2025)
    </a>
    <a class="source-badge" href="./index.html">
      ← ツール一覧に戻る
    </a>
  </div>
</footer>

<script>
const patterns = [
  // === 越境前 ===
  { id:1, phase:"before", name:"想いの言語化", summary:"「何を変えたいのか」を本人の言葉で紡ぎ出す",
    context:"越境学習者（または社会起業家）が「何かを変えたい」という漠然とした動機を持っている。しかしその想いは言葉になっておらず、行動の方向が定まらない。",
    problem:"目的が曖昧なまま越境を始めると、越境先とのミスマッチが起き、本人も「なぜここにいるのか」を見失う。所属組織も「とりあえず行かせれば成長するだろう」と送り出すだけでは成果が不透明になる。",
    solution:"対話を通じて「なぜ・何を・どのように」を本人の言葉で紡ぎ出す。面談を複数回設定し、キャリアの理想と現実の乖離を質問で掘り下げ、本人の希望を文書化・可視化して周囲と共有する。",
    social:"社会起業家支援では、起業家の「課題意識」を事業計画レベルに言語化する初期面談に相当する。想いを構造化することで、支援者・資金提供者との共通言語が生まれる。" },
  { id:2, phase:"before", name:"期待の地ならし", summary:"三者の期待値を可視化し、ズレを事前に埋める",
    context:"送り出す側（所属組織）、受け入れる側（越境先）、本人がそれぞれ異なる期待を持っている。",
    problem:"認識のズレが放置されると、越境中に「思っていたのと違う」「期待はずれ」という失望が三者間で同時に起こる。",
    solution:"三者の期待値を一覧化し、合致する範囲と乖離する範囲を可視化する。三者面談を設定し、業務範囲・期待する成果・期間を明文化して合意する。",
    social:"中間支援組織が起業家と地域・行政・企業をつなぐ際の「期待値調整」そのもの。全員が同じ絵を見て動き出せるかが成否を分ける。" },
  { id:3, phase:"before", name:"不安の正体を見せる", summary:"漠然とした不安を分解し、対処可能にする",
    context:"新しい環境に飛び込む前に、「なじめるだろうか」「評価されなくなるのでは」という漠然とした恐れがある。",
    problem:"不安が言語化されないままだと行動を阻み、せっかくの越境機会を前向きに捉えられず、初動から意欲を失う。",
    solution:"不安を具体的な項目に分解し、「対処可能なもの」と「受け入れるしかないもの」を仕分ける。評価制度や帰任後の見通しなど答えられる部分は情報提供し、消えない不安は「それでも挑戦する価値がある」と納得する状態をつくる。",
    social:"起業家が「失敗したらどうなるのか」という恐れを抱えるとき、伴走者がリスクを具体化し、最悪シナリオでも生存できる道筋を見せる行為に重なる。" },
  { id:4, phase:"before", name:"先輩の轍", summary:"経験者の生の体験談に触れ、「自分にもできる」と感じる",
    context:"先例のない挑戦に踏み出そうとしているが、具体的なイメージが湧かず不安が大きい。",
    problem:"未知の世界を頭だけで想像すると、不安が過大に膨らむ。逆に楽観しすぎて準備不足にもなりうる。",
    solution:"既に同様の経験をした先輩の生の声（苦労と成功の両面）に触れる場を設ける。座談会や1on1で、リアルな体験を聞くことで「自分にもできるかもしれない」という実感を育む。",
    social:"先輩起業家との対話セッション、ロールモデル紹介。成功談だけでなく「こう苦しんだ」という話が最も力になる。" },
  { id:5, phase:"before", name:"帰り道の灯", summary:"「戻った後の世界」の見通しを示し、越境中の集中力を守る",
    context:"越境後のキャリアや事業の見通しが不透明で、「行きっぱなし」になる恐れがある。",
    problem:"帰任後の配属やキャリアが曖昧なまま送り出すと、本人は越境中に思い切った挑戦ができず、中途半端な学びで終わる。",
    solution:"「戻った後にこういう仕事・役割が待っている」という見通しをある程度示す。評価上の扱いや復帰後の方向性を言語化し、安心して現在の挑戦に全力を注げる状態をつくる。",
    social:"社会起業家が「この事業が終わった後の人生」を不安に思うとき、次のキャリアパスやスキルの可搬性を一緒に考える。" },
  { id:6, phase:"before", name:"送り出しの根回し", summary:"周囲を味方にし、越境を組織ぐるみで支える態勢をつくる",
    context:"越境学習者が組織から離れることで、残されるメンバーに負荷が偏る。",
    problem:"「なぜあの人だけ行けるのか」という不公平感や、業務引き継ぎの混乱が起き、越境学習者が後ろめたさを抱える。",
    solution:"越境の意義を周囲に丁寧に説明し、引き継ぎ計画を組み、残るメンバーにも「帰ってきたら知見が共有される」というメリットを伝える。",
    social:"起業家が前職を離れる、あるいは本業との両立を始めるとき、周囲の理解を得るプロセスそのもの。" },
  { id:7, phase:"before", name:"越境先の下見", summary:"事前情報を共有し、スタートダッシュを切れるようにする",
    context:"越境先の文化・業務・ツールがまったく未知の状態で飛び込もうとしている。",
    problem:"情報ゼロで始めると、最初の1〜2週間が適応だけで消耗し、本来の学習機会を逃す。",
    solution:"越境先の企業情報、利用ツール、プロジェクト概要、暗黙のルールなどを事前に共有する。受け入れ資料の作成やオリエンテーションを設定する。",
    social:"新しい活動フィールド（地域・セクター）に入る前の事前リサーチやキーパーソンへの事前挨拶。" },
  { id:8, phase:"before", name:"契約の見える化", summary:"業務内容・条件・評価基準を曖昧にせず文書化する",
    context:"越境学習者と越境先の間で、具体的な業務内容や評価基準が口約束レベルにとどまっている。",
    problem:"「聞いていない」「想定と違う」という混乱が開始後に噴出し、信頼関係が早期に崩れる。",
    solution:"期間・形態・業務範囲・評価基準・成果物の期待を文書化し、三者の了承を得る。開始後にも「合意事項にズレがないか」を定期的に確認する。",
    social:"起業家と支援先の協定書、助成金の要件定義など、曖昧さを排除する営み。" },

  // === 越境中 ===
  { id:9, phase:"during", name:"葛藤を味わう", summary:"違和感を「解消すべき問題」ではなく「学びの種」として掘り下げる",
    context:"越境先の文化やルールの中で強い違和感やストレスを感じている。",
    problem:"違和感を回避・解消することだけに注力すると、越境学習の最大の醍醐味である「常識の問い直し」が起きない。",
    solution:"「なぜそう感じるのか」を掘り下げる問いを投げかける。違和感を言語化させ、その裏にある自分の前提や価値観に気づかせることで、新しい発想の種に変える。",
    social:"社会起業家が現場で「こんなはずじゃなかった」と感じたとき、それを事業モデル再設計のヒントとして活かす。" },
  { id:10, phase:"during", name:"見守りの距離感", summary:"手を出すべき場面と見守るべき場面を見極める",
    context:"伴走者が熱心に支援しようとしている。越境学習者が壁にぶつかっている。",
    problem:"先回りして解決すると、本人が自力で壁を乗り越える機会を奪い、依存的・受動的になる。",

    context:"伴走者が日々の業務に追われ、「なぜこの仕事をしているのか」を問い直す余裕がない。",
    problem:"動機を見失った伴走は形骸化し、相手にも伝わる。テクニックだけでは人は動かない。",
    solution:"アレグザンダーが言うように、パターン・ランゲージの背後には倫理観と美学がある。「不幸な人をできるかぎり減らしたい」「みんなで一緒に何かをつくる喜び」——伴走者自身がそのような個人的な美学を自覚し、磨き続ける。",
    social:"「なぜ社会起業家を支援するのか」という問いを自分の中に持ち続けること。それが支援の質の最も深い土台になる。" }
];

const phaseLabels = {
  before: "越境前", during: "越境中", after: "越境後", cross: "フェーズ横断", meta: "伴走の構え"
};
const phaseCounts = {};
patterns.forEach(p => { phaseCounts[p.phase] = (phaseCounts[p.phase]||0)+1; });

// Stats
const statsEl = document.getElementById('stats');
const phaseColors = { before:'var(--accent-before)', during:'var(--accent-during)', after:'var(--accent-after)', cross:'var(--accent-cross)', meta:'var(--accent-meta)' };
Object.entries(phaseCounts).forEach(([phase, count]) => {
  statsEl.innerHTML += `<div class="stat-box"><div class="stat-num" style="color:${phaseColors[phase]}">${count}</div><div class="stat-label">${phaseLabels[phase]}</div></div>`;
});

// Update filter button counts
document.querySelectorAll('.filter-btn').forEach(btn => {
  const p = btn.dataset.phase;
  if (p !== 'all' && phaseCounts[p]) btn.textContent = `${phaseLabels[p]}（${phaseCounts[p]}）`;
});

// ===== 事例データ読み込み =====
let casesData = {};
let currentFilter = 'all';

async function loadCases() {
  try {
    const r = await fetch('./cross-border-patterns.json?_=' + Date.now());
    if (!r.ok) return;
    const data = await r.json();
    const list = data.patterns || data;
    list.forEach(p => {
      if (Array.isArray(p.jp_cases) && p.jp_cases.length > 0) {
        casesData[p.id] = p.jp_cases;
      }
    });
    renderCards(currentFilter);
  } catch(e) { /* 事例なしで続行 */ }
}

// Render cards
const grid = document.getElementById('grid');
function renderCards(filter) {
  currentFilter = filter;
  grid.innerHTML = '';
  const filtered = filter === 'all' ? patterns : patterns.filter(p => p.phase === filter);
  filtered.forEach((p, i) => {
    const cases = casesData[p.id] || [];
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.phase = p.phase;
    card.style.animationDelay = `${i * 0.04}s`;
    card.innerHTML = `
      <div class="num">${String(p.id).padStart(2,'0')}</div>
      <span class="phase-tag">${phaseLabels[p.phase]}</span>
      <div class="name">${p.name}</div>
      <div class="summary">${p.summary}</div>
      ${cases.length > 0 ? `<div class="case-badge">事例 ${cases.length}件</div>` : ''}
    `;
    card.onclick = () => openModal(p);
    grid.appendChild(card);
  });
}
renderCards('all');
loadCases();

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.phase);
  };
});

// Modal
const overlay = document.getElementById('overlay');
const modal = document.getElementById('modal');
function openModal(p) {
  const color = phaseColors[p.phase];
  const cases = casesData[p.id] || [];
  const casesHtml = cases.length > 0 ? `
    <div class="section-label" style="color:var(--accent-cross);margin-top:1.5rem">事例 — Cases（${cases.length}件）</div>
    <div class="cases-list">
      ${cases.map((c, i) => `
        <a class="case-item" href="./cases.html?collection=cross-border&patternId=${p.id}&caseIndex=${i}" target="_blank">
          <div class="case-item-title">${c.title}</div>
          <div class="case-item-meta">${c.date || ''}${c.author ? ' / ' + c.author : ''}</div>
          <div class="case-item-desc">${(c.desc||'').slice(0,80)}${(c.desc||'').length > 80 ? '...' : ''}</div>
        </a>
      `).join('')}
    </div>
  ` : '';

  modal.innerHTML = `
    <button class="close-btn" onclick="closeModal()">✕</button>
    <span class="m-phase" style="background:${color}22;color:${color}">${phaseLabels[p.phase]} #${String(p.id).padStart(2,'0')}</span>
    <div class="m-name">${p.name}</div>
    <div class="section-label ctx">状況 — Context</div>
    <p>${p.context}</p>
    <div class="section-label prob">問題 — Problem</div>
    <p>${p.problem}</p>
    <div class="section-label sol">解決 — Solution</div>
    <p>${p.solution}</p>
    <div class="section-label social">社会起業家支援への読み替え</div>
    <p>${p.social}</p>
    ${casesHtml}
  `;
  overlay.classList.add('open');
}
function closeModal() { overlay.classList.remove('open'); }
overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
