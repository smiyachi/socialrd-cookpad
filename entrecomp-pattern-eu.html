  {id:"P50", area:"area3", areaName:"行動へ", comp:"計画と管理",
   name:"変化に柔軟に対応する", en:"Adapting with Agility",
   context:"起業家が計画通りに進まない状況に直面して、「計画を守ること」に固執するか「全部やめること」の二択で考えている。",
   problem:"計画は「守るもの」ではなく「現実と対話しながら更新するもの」である。しかしこの感覚は体験なしには身につかない。",
   solution:"「計画が変わったこと」を失敗ではなく「環境から学んだ証拠」と意味づける。「何が変わったから計画を修正するのか」を言語化することを習慣にする。",
   result:"計画の変更が「諦め」ではなく「賢い適応」として起業家に体験される。",
   related:["P46","P51"]},

  // C13: 不確かさへの対処
  {id:"P51", area:"area3", areaName:"行動へ", comp:"不確かさへの対処",
   name:"不確かさを受け入れる", en:"Embracing Uncertainty",
   context:"起業家が「全部わかってから動きたい」「正解が見えないと不安」という状態にある。",
   problem:"社会課題解決の現場は構造的に不確かである。情報が揃うことを待っていると、永遠に動けない。",
   solution:"「今持っている情報で、最も合理的な次の一手は何か」を問う。「不確かさを減らすこと」ではなく「不確かな中で決める力を育てること」が支援の目的だと伝える。",
   result:"起業家が「決断力」と「柔軟性」の両方を持つようになる。",
   related:["P52","P50"]},

  {id:"P52", area:"area3", areaName:"行動へ", comp:"不確かさへの対処",
   name:"リスクを計算する", en:"Calculating Risk",
   context:"起業家が「リスクがあるからやらない」と言うか、逆に「社会のためだから」とリスクを無視して動いている。",
   problem:"リスクは「ゼロにするもの」でも「無視するもの」でもなく、「理解した上で賭けるもの」である。",
   solution:"「最悪のケースは何で、その確率はどのくらいで、その場合の回復コストはどのくらいか」を一緒に整理する。「許容できる損失（Affordable Loss）」を先に決めてから動く。",
   result:"リスクとの関係が「恐怖」から「設計可能なもの」に変わる。",
   related:["P51","P53"]},

  {id:"P53", area:"area3", areaName:"行動へ", comp:"不確かさへの対処",
   name:"リスクを管理する", en:"Managing Risk",
   context:"起業家が事業を進める中で、思わぬリスクが顕在化してきた。",

   solution:"「今後3ヶ月で最も起こりそうなリスクを3つ挙げてください」と問い、それぞれに「発生確率」「影響度」「対応策」をセットで考える。リスク管理を「危機対応」ではなく「日常的な思考習慣」にする。",
   result:"起業家が先を読みながら動けるようになり、事業の安定性が高まる。",
   related:["P52","P19"]},

  // C14: 他者との協働
  {id:"P54", area:"area3", areaName:"行動へ", comp:"他者との協働",
   name:"違いを触媒にする", en:"Diversity as Catalyst",
   context:"チームや連携グループの中で、バックグラウンドや価値観の違いが「摩擦」として現れている。",

   result:"多様性が「管理するもの」から「活かすもの」へと転換し、集団としての創造力が高まる。",

  {id:"P55", area:"area3", areaName:"行動へ", comp:"他者との協働",

   solution:"「何も解決しようとせずに、ただ聴く」時間を意識的に作る。共感的傾聴（相手の言葉を繰り返す・感情を受け取る）のスキルを意識的に練習する。「あなたが一番伝えたいことは何ですか」を最後に確認する。",
   result:"起業家が「聴いてもらえた」と感じることで、自分自身の問題を整理し始める。",

  {id:"P57", area:"area3", areaName:"行動へ", comp:"他者との協働",
   name:"チームをデザインする", en:"Designing the Team",
   context:"起業家が「一緒にやる仲間がいない」と言っているか、あるいは「仲間はいるが機能していない」という状態にある。",

   solution:"「この事業に必要なスキル・視点・人脈を持っている人は誰か」から逆算してチームを設計する。「好きな人」より「補完的な人」を意識的に選ぶ発想を渡す。",
   result:"チームが「仲良しグループ」から「機能するユニット」へと進化する。",

  {id:"P58", area:"area3", areaName:"行動へ", comp:"他者との協働",
   name:"協働の場を設計する", en:"Designing for Collaboration",
   context:"複数の組織・人が「連携しよう」と言いながら、実際にはそれぞれが自分の論理で動いており、連携が機能していない。",
   problem:"「連携」は宣言するものではなく、一緒に何かを作るプロセスを通じて生まれるものである。",
   solution:"「今日この場で一緒に決めることは何か」「それぞれが持ち帰ってやることは何か」を明確にする。「共同作業の経験」を意図的に設計する。",
   result:"宣言的な連携から「実質的な協働」へと変わる。",
   related:["P57","P59"]},

  {id:"P59", area:"area3", areaName:"行動へ", comp:"他者との協働",
   name:"ネットワークを耕す", en:"Cultivating Networks",
   context:"コーディネーターが「人脈はあるが、使い方がわからない」、あるいは起業家が「ネットワーキングは苦手」と言っている。",
   problem:"ネットワークは「数」ではなく「質と文脈の多様性」で決まる。「名刺交換のための場」は機能しない。",

   result:"ネットワークが「社交的な活動」から「事業推進のための戦略的資源」へと変わる。",
   related:["P32","P58"]},

  // C15: 経験から学ぶ
  {id:"P60", area:"area3", areaName:"行動へ", comp:"経験から学ぶ",
   name:"失敗を問い直す", en:"Reexamining Failure",
   context:"起業家（またはコーディネーター自身）が「うまくいかなかった経験」を抱えており、そこから抜け出せないでいる。",
   problem:"失敗を「自分のせい」として内在化すると自己効力感が下がり、「外のせい」として外在化すると学習が止まる。",
   solution:"「何が起きたか」を事実として整理し、「なぜ起きたか」を構造として分析し、「次に何が変えられるか」を具体的に問う。「失敗の解剖」を、批判ではなく知識生成のプロセスとして位置づける。",
   result:"失敗が「傷」から「次の設計のための情報」に変わる。",
   related:["P61","P62"]},

  {id:"P61", area:"area3", areaName:"行動へ", comp:"経験から学ぶ",
   name:"学び続ける力を育てる", en:"Growing as a Learner",
   context:"コーディネーターが「忙しくて学ぶ時間がない」という状態になっている。",
   problem:"学習を「特別な時間に行うもの」として捉えると、日常業務の中で学習機会を見逃す。",
   solution:"「今日の仕事の中で、何を学んだか」を毎日30秒で記録する。「経験そのものを教材にする」という姿勢で日常業務に臨む。月に一度、「この1ヶ月で変わった自分の認識」を言語化する。",
   result:"学習が「特別な場での知識習得」から「日常的な認識の更新」へと変わる。",
   related:["P60","P62"]},

  {id:"P62", area:"area3", areaName:"行動へ", comp:"経験から学ぶ",
   name:"経験を知識に変える", en:"Turning Experience into Knowledge",
   context:"ベテランコーディネーターが多くの経験を持っているが、それが「個人の勘」として留まっており、チームや組織に蓄積されていない。",
   problem:"暗黙知が個人に留まると、離職・異動で知識が消える。また本人も「なぜうまくいったか」を説明できないまま、再現性を持てない。",
   solution:"「あのとき、なぜそう判断したのですか」「それはどんな経験から来ていますか」と問い、暗黙知を言語化する対話を意図的に行う。「うまくいったパターン」を物語として記録し、チームで共有する。",
   result:"ベテランの知恵がチームの財産になり、経験の少ないコーディネーターの成長が加速する。",
   related:["P60","P61"]},
];

const AREAS = [
  {id:"all",   label:"全パターン",    color:"#6B7280"},
  {id:"area1", label:"I. アイデアと機会", color:"#2D7D6E"},
  {id:"area2", label:"II. リソース",    color:"#3D4F8C"},
  {id:"area3", label:"III. 行動へ",    color:"#B5442A"},
];

// コンピテンシー一覧（エリアごと）
const COMPS = {
  area1:["機会を見つける","創造性","ビジョン","アイデアの価値","倫理と持続可能な思考"],
  area2:["自己認識と自己効力感","動機と粘り強さ","リソースの動員","財務・経済リテラシー"],
  area3:["他者を動員する","主体的に動く","計画と管理","不確かさへの対処","他者との協働","経験から学ぶ"],
};

const areaColor = a => ({area1:"#2D7D6E",area2:"#3D4F8C",area3:"#B5442A"}[a]||"#6B7280");
const areaBg    = a => ({area1:"#D1FAE5",area2:"#EDE9FE",area3:"#FCE7F3"}[a]||"#F3F4F6");
const areaLabel = a => ({area1:"I. アイデアと機会",area2:"II. リソース",area3:"III. 行動へ"}[a]||"");

function App(){
  const [area, setArea]       = useState("all");
  const [comp, setComp]       = useState("all");
  const [search, setSearch]   = useState("");
  const [expanded, setExpanded] = useState(null);

  // エリア切替時にコンプをリセット
  const handleAreaChange = (a) => { setArea(a); setComp("all"); setExpanded(null); };
  const handleCompChange = (c) => { setComp(c); setExpanded(null); };

  const filtered = useMemo(()=>{
    return PATTERNS.filter(p=>{
      if(area!=="all" && p.area!==area) return false;
      if(comp!=="all" && p.comp!==comp) return false;
      if(search){
        const q = search.toLowerCase();
        return p.name.toLowerCase().includes(q) ||
               p.en.toLowerCase().includes(q) ||
               p.comp.toLowerCase().includes(q) ||
               p.context.includes(q) ||
               p.problem.includes(q) ||
               p.solution.includes(q) ||
               p.result.includes(q);
      }
      return true;
    });
  },[area,comp,search]);

  // サブフィルター選択肢
  const compOptions = useMemo(()=>{
    if(area==="all") return [];
    return COMPS[area]||[];
  },[area]);

  const compCount = (c) => {
    const base = area==="all" ? PATTERNS : PATTERNS.filter(p=>p.area===area);
    if(c==="all") return base.length;
    return base.filter(p=>p.comp===c).length;
  };

  return (
    <div style={{background:"#F8F7F4",minHeight:"100vh",padding:"20px 16px",maxWidth:860,margin:"0 auto"}}>

      {/* ヘッダー */}
      <div style={{marginBottom:4}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",color:"#C4852A",textTransform:"uppercase"}}>
          Pattern Language — EntreComp × 社会起業家支援コーディネーター
        </span>
      </div>
      <h1 style={{fontSize:19,fontWeight:800,lineHeight:1.4,margin:"0 0 4px"}}>
        変化の種を育てる人
      </h1>
      <p style={{fontSize:12,color:"#9CA3AF",margin:"0 0 18px"}}>
        EUのEntreComp（起業家的コンピテンシー・フレームワーク）60スレッドを、社会起業家支援コーディネーターの現場文脈に翻訳したパターン・ランゲージ。{PATTERNS.length}パターン収録。
      </p>

      {/* 検索 */}
      <input
        placeholder="キーワード検索（パターン名・コンピテンシー・文脈・問題・解決策）"
        value={search}
        onChange={e=>{setSearch(e.target.value);setExpanded(null);}}
        style={{width:"100%",padding:"9px 14px",borderRadius:10,border:"1.5px solid #E5E7EB",
          fontSize:13,marginBottom:14,outline:"none",background:"#fff",
          fontFamily:"inherit"}}
      />

      {/* エリアフィルター */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {AREAS.map(a=>{
          const cnt = a.id==="all" ? PATTERNS.length : PATTERNS.filter(p=>p.area===a.id).length;
          return (
            <button key={a.id}
              onClick={()=>handleAreaChange(a.id)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",fontSize:12,fontWeight:600,
                cursor:"pointer",transition:"all 0.15s",
                background:area===a.id?(a.id==="all"?"#1A1A1A":a.color):"#E5E7EB",
                color:area===a.id?"#fff":"#374151"}}
            >{a.label}（{cnt}）</button>
          );
        })}
      </div>

      {/* コンピテンシー（サブ）フィルター */}
      {area!=="all" && (
        <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap",
          paddingLeft:10,borderLeft:`3px solid ${areaColor(area)}`}}>
          <button
            onClick={()=>handleCompChange("all")}
            style={{padding:"4px 12px",borderRadius:16,border:"none",fontSize:11,fontWeight:600,
              cursor:"pointer",transition:"all 0.15s",
              background:comp==="all"?areaColor(area):"#F3F4F6",
              color:comp==="all"?"#fff":"#6B7280"}}
          >すべて（{compCount("all")}）</button>
          {compOptions.map(c=>(
            <button key={c}
              onClick={()=>handleCompChange(c)}
              style={{padding:"4px 12px",borderRadius:16,border:"none",fontSize:11,fontWeight:600,
                cursor:"pointer",transition:"all 0.15s",
                background:comp===c?areaColor(area):"#F3F4F6",
                color:comp===c?"#fff":"#6B7280"}}
            >{c}（{compCount(c)}）</button>
          ))}
        </div>
      )}

      {/* 件数 */}
      <div style={{fontSize:11,color:"#9CA3AF",marginBottom:10}}>
        {filtered.length}件表示
      </div>

      {/* カードリスト */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map(p=>{
          const isOpen = expanded===p.id;
          const c  = areaColor(p.area);
          const bg = areaBg(p.area);
          return (
            <div key={p.id}
              onClick={()=>setExpanded(isOpen?null:p.id)}
              style={{background:"#fff",borderRadius:14,
                border:isOpen?`2px solid ${c}`:"1.5px solid #E5E7EB",
                overflow:"hidden",cursor:"pointer",
                boxShadow:isOpen?`0 4px 20px ${c}25`:"0 1px 3px rgba(0,0,0,0.04)",
                transition:"all 0.2s"}}
            >
              {/* ── カードヘッダー ── */}
              <div style={{padding:"13px 16px",display:"flex",alignItems:"center",gap:11}}>
                {/* ID バッジ */}
                <div style={{width:38,height:38,borderRadius:10,background:bg,color:c,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:11,fontWeight:800,flexShrink:0,letterSpacing:"0.05em"}}>
                  {p.id}
                </div>
                {/* タイトル */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>{p.name}</div>
                  <div style={{fontSize:10,color:"#9CA3AF",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {p.en}
                  </div>
                </div>
                {/* ラベル群 */}
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}}>
                  <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,background:bg,color:c}}>
                    {p.areaName}
                  </span>
                  <span style={{fontSize:10,color:"#9CA3AF"}}>{p.comp}</span>
                </div>
                {/* 展開矢印 */}
                <span style={{color:"#9CA3AF",fontSize:13,flexShrink:0,
                  transition:"transform 0.2s",transform:isOpen?"rotate(180deg)":"none"}}>▼</span>
              </div>

              {/* ── 展開パネル ── */}
              {isOpen && (
                <div style={{padding:"0 16px 16px",animation:"fadeIn 0.2s ease"}}>
                  <div style={{display:"flex",flexDirection:"column",gap:9}}>

                    {/* 文脈 */}
                    <div style={{background:"#F9FAFB",borderRadius:10,padding:"10px 13px",borderLeft:`3px solid ${c}`}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#6B7280",marginBottom:3,letterSpacing:"0.1em"}}>
                        📍 文脈 — Context
                      </div>
                      <div style={{fontSize:13,lineHeight:1.75}}>{p.context}</div>
                    </div>

                    {/* 問題 */}
                    <div style={{background:"#FEF2F2",borderRadius:10,padding:"10px 13px",borderLeft:"3px solid #EF4444"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#DC2626",marginBottom:3,letterSpacing:"0.1em"}}>
                        ⚡ 問題・葛藤 — Problem
                      </div>
                      <div style={{fontSize:13,lineHeight:1.75}}>{p.problem}</div>
                    </div>

                    {/* 解決策 */}
                    <div style={{background:"#F0FDF4",borderRadius:10,padding:"10px 13px",borderLeft:"3px solid #22C55E"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#16A34A",marginBottom:3,letterSpacing:"0.1em"}}>
                        ✦ 解決策 — Solution
                      </div>
                      <div style={{fontSize:13,lineHeight:1.75}}>{p.solution}</div>
                    </div>

                    {/* 結果 */}
                    <div style={{background:bg,borderRadius:10,padding:"10px 13px",borderLeft:`3px solid ${c}`}}>
                      <div style={{fontSize:10,fontWeight:700,color:c,marginBottom:3,letterSpacing:"0.1em"}}>
                        🌱 結果 — Result
                      </div>
                      <div style={{fontSize:13,lineHeight:1.75}}>{p.result}</div>
                    </div>

                    {/* 関連パターン */}
                    {p.related && p.related.length>0 && (
                      <div style={{paddingTop:4,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:10,color:"#9CA3AF",fontWeight:600,letterSpacing:"0.1em"}}>
                          🔗 関連：
                        </span>
                        {p.related.map(r=>{
                          const rp = PATTERNS.find(x=>x.id===r);
                          return rp ? (
                            <span key={r}
                              onClick={e=>{e.stopPropagation();setExpanded(rp.id);}}
                              style={{fontSize:11,padding:"3px 10px",borderRadius:20,cursor:"pointer",
                                background:areaBg(rp.area),color:areaColor(rp.area),fontWeight:600,
                                border:`1px solid ${areaColor(rp.area)}33`,transition:"all 0.15s"}}
                            >{r}「{rp.name}」</span>
                          ):null;
                        })}
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {filtered.length===0 && (
        <div style={{textAlign:"center",color:"#9CA3AF",padding:"40px 0",fontSize:13}}>
          該当するパターンが見つかりませんでした。
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
