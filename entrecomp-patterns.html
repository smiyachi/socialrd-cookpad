<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>起業家的行動のパターン — 日本版EntreComp パターンランゲージ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Shippori+Mincho:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#1C1A17;
  --paper:#F5F0E8;
  --warm-white:#FDFAF4;
  --accent-teal:#2D7D6E;
  --accent-amber:#C4852A;
  --accent-rust:#B5442A;
  --accent-indigo:#3D4F8C;
  --light-teal:#EAF3F1;
  --light-amber:#FDF3E3;
  --light-rust:#FDF0ED;
  --light-indigo:#EDF0F8;
  --border:#D4CFC5;
  --muted:#7A7269;
}
body{
  background:var(--paper);
  font-family:'Noto Serif JP',serif;
  color:var(--ink);
  min-height:100vh;
}

/* HEADER */
.site-header{
  background:var(--ink);
  padding:2rem 2.5rem;
  position:sticky;top:0;z-index:100;
  border-bottom:3px solid var(--accent-amber);
}
.site-header h1{
  font-family:'Shippori Mincho',serif;
  font-size:1.15rem;font-weight:700;
  color:var(--warm-white);
  letter-spacing:.08em;
}
.site-header .sub{
  font-family:'Space Mono',monospace;
  font-size:.65rem;color:var(--accent-amber);
  letter-spacing:.15em;margin-top:.25rem;
  text-transform:uppercase;
}

/* HERO */
.hero{
  padding:3.5rem 2.5rem 2.5rem;
  border-bottom:1px solid var(--border);
  background:var(--warm-white);
}
.hero-eyebrow{
  font-family:'Space Mono',monospace;
  font-size:.65rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:.75rem;
}
.hero h2{
  font-family:'Shippori Mincho',serif;
  font-size:2.2rem;font-weight:700;
  line-height:1.35;
  margin-bottom:1rem;
  letter-spacing:.02em;
}
.hero p{
  font-size:.92rem;line-height:1.8;
  color:var(--muted);max-width:640px;
}

/* CONTROLS */
.controls{
  display:flex;gap:.75rem;flex-wrap:wrap;
  padding:1.5rem 2.5rem;
  background:var(--warm-white);
  border-bottom:1px solid var(--border);
  position:sticky;top:72px;z-index:90;
}
.filter-btn{
  font-family:'Space Mono',monospace;
  font-size:.7rem;letter-spacing:.12em;
  text-transform:uppercase;
  padding:.45rem 1rem;border-radius:2px;
  border:1.5px solid var(--border);
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;
}
.filter-btn:hover{border-color:var(--ink);color:var(--ink);}
.filter-btn.active.comp-1{background:var(--accent-teal);border-color:var(--accent-teal);color:#fff;}
.filter-btn.active.comp-2{background:var(--accent-indigo);border-color:var(--accent-indigo);color:#fff;}
.filter-btn.active.comp-3{background:var(--accent-rust);border-color:var(--accent-rust);color:#fff;}
.filter-btn.active.all{background:var(--ink);border-color:var(--ink);color:#fff;}

/* GRID */
.patterns-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:1.5rem;
  padding:2.5rem;
}

/* CARD */
.pattern-card{
  background:var(--warm-white);
  border:1.5px solid var(--border);
  border-radius:4px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .2s, box-shadow .2s;
  position:relative;
}
.pattern-card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(28,26,23,.12);
}
.card-accent-bar{
  height:4px;width:100%;
}
.comp-1 .card-accent-bar{background:var(--accent-teal);}
.comp-2 .card-accent-bar{background:var(--accent-indigo);}
.comp-3 .card-accent-bar{background:var(--accent-rust);}

.card-header{
  padding:1.25rem 1.5rem .75rem;
  border-bottom:1px solid var(--border);
}
.card-meta{
  display:flex;align-items:center;gap:.5rem;
  margin-bottom:.6rem;
}
.skill-tag{
  font-family:'Space Mono',monospace;
  font-size:.6rem;letter-spacing:.1em;
  text-transform:uppercase;
  padding:.2rem .55rem;
  border-radius:2px;
}
.comp-1 .skill-tag{background:var(--light-teal);color:var(--accent-teal);}
.comp-2 .skill-tag{background:var(--light-indigo);color:var(--accent-indigo);}
.comp-3 .skill-tag{background:var(--light-rust);color:var(--accent-rust);}

.pattern-num{
  font-family:'Space Mono',monospace;
  font-size:.6rem;color:var(--muted);
}
.hashtags{
  display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.5rem;
}
.hashtag{
  font-family:'Space Mono',monospace;
  font-size:.58rem;color:var(--accent-amber);
  background:var(--light-amber);
  padding:.15rem .45rem;border-radius:2px;
}
.pattern-name{
  font-family:'Shippori Mincho',serif;
  font-size:1.25rem;font-weight:700;
  letter-spacing:.02em;line-height:1.3;
}
.pattern-name-en{
  font-family:'Space Mono',monospace;
  font-size:.65rem;color:var(--muted);
  margin-top:.25rem;letter-spacing:.05em;
}

.card-body{padding:1.25rem 1.5rem 1.5rem;}
.card-section{margin-bottom:1rem;}
.card-section:last-child{margin-bottom:0;}
.section-label{
  font-family:'Space Mono',monospace;
  font-size:.58rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:.4rem;
}
.card-section p{
  font-size:.85rem;line-height:1.75;
  color:var(--ink);
}
.context-text{color:var(--muted)!important;}

/* DETAIL PANEL */
.detail-overlay{
  position:fixed;inset:0;
  background:rgba(28,26,23,.6);
  z-index:200;
  display:flex;align-items:flex-start;justify-content:flex-end;
}
.detail-panel{
  width:min(560px,100vw);
  height:100vh;
  background:var(--warm-white);
  overflow-y:auto;
  border-left:3px solid var(--border);
  animation:slideIn .25s ease;
}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

.detail-accent{height:6px;}
.comp-1 .detail-accent{background:var(--accent-teal);}
.comp-2 .detail-accent{background:var(--accent-indigo);}
.comp-3 .detail-accent{background:var(--accent-rust);}

.detail-close{
  position:absolute;top:1rem;right:1rem;
  background:none;border:none;
  font-size:1.4rem;cursor:pointer;
  color:var(--muted);line-height:1;
  z-index:10;
}
.detail-inner{padding:2rem 2rem 3rem;}
.detail-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;}
.detail-num{
  font-family:'Space Mono',monospace;
  font-size:.7rem;color:var(--muted);
}
.detail-name{
  font-family:'Shippori Mincho',serif;
  font-size:1.8rem;font-weight:700;
  line-height:1.2;margin-bottom:.35rem;
  letter-spacing:.02em;
}
.detail-name-en{
  font-family:'Space Mono',monospace;
  font-size:.7rem;color:var(--muted);
  margin-bottom:1rem;letter-spacing:.05em;
}
.detail-hashtags{
  display:flex;flex-wrap:wrap;gap:.4rem;
  margin-bottom:1.5rem;
}
.detail-section{
  margin-bottom:1.5rem;
  padding:1.25rem;
  border-radius:4px;
  border-left:3px solid var(--border);
}
.comp-1 .detail-section.context-sec{border-left-color:var(--accent-teal);}
.comp-1 .detail-section.problem-sec{border-left-color:var(--accent-amber);}
.comp-1 .detail-section.solution-sec{border-left-color:var(--accent-teal);background:var(--light-teal);}
.comp-2 .detail-section.context-sec{border-left-color:var(--accent-indigo);}
.comp-2 .detail-section.problem-sec{border-left-color:var(--accent-amber);}
.comp-2 .detail-section.solution-sec{border-left-color:var(--accent-indigo);background:var(--light-indigo);}
.comp-3 .detail-section.context-sec{border-left-color:var(--accent-rust);}
.comp-3 .detail-section.problem-sec{border-left-color:var(--accent-amber);}
.comp-3 .detail-section.solution-sec{border-left-color:var(--accent-rust);background:var(--light-rust);}

.detail-section .label{
  font-family:'Space Mono',monospace;
  font-size:.6rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:.5rem;
}
.detail-section p{
  font-size:.9rem;line-height:1.8;
}
.activities-list{
  list-style:none;margin-top:.5rem;
}
.activities-list li{
  font-size:.85rem;line-height:1.7;
  padding:.3rem 0;
  border-bottom:1px dashed var(--border);
  display:flex;align-items:flex-start;gap:.5rem;
}
.activities-list li:last-child{border-bottom:none;}
.act-tag{
  font-family:'Space Mono',monospace;
  font-size:.55rem;color:var(--accent-amber);
  background:var(--light-amber);
  padding:.15rem .4rem;border-radius:2px;
  white-space:nowrap;margin-top:.2rem;
  flex-shrink:0;
}
.alliance-box{
  margin-top:1.5rem;
  padding:1.25rem;
  background:var(--ink);
  border-radius:4px;
}
.alliance-box .label{
  font-family:'Space Mono',monospace;
  font-size:.6rem;letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--accent-amber);margin-bottom:.5rem;
}
.alliance-box p{
  font-size:.88rem;line-height:1.8;
  color:var(--warm-white);
  font-style:italic;
}

/* STATS */
.stats-bar{
  padding:1rem 2.5rem;
  background:var(--paper);
  border-bottom:1px solid var(--border);
  display:flex;gap:2rem;align-items:center;
}
.stat{
  font-family:'Space Mono',monospace;
  font-size:.65rem;letter-spacing:.08em;
  color:var(--muted);
}
.stat span{color:var(--ink);font-weight:700;font-size:.85rem;}

.empty{
  padding:4rem 2.5rem;
  text-align:center;color:var(--muted);
  font-size:.9rem;
}

footer a, .source-badge {
  color: inherit;
  text-decoration: none;
  opacity: 0.7;
  transition: opacity 0.2s;
}
footer a:hover, .source-badge:hover { opacity: 1; }
.footer-sources {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.source-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  letter-spacing: 0.05em;
}
  
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo} = React;

const PATTERNS = [
  // ── コンピテンシー① 機会の発見 ──
  {id:1,comp:"comp-1",compName:"機会の発見",skill:"問いを立てる",skillNum:"①-1",
   name:"違和感を問いに変える",en:"From Discomfort to Question",
   hashtags:["#問いの型","#問いの変換"],
   context:"日常の中に「何かおかしい」「なぜそうなっているんだろう」という感覚はあるが、それが言葉になっていない状況。",
   problem:"漠然とした不満や違和感はあるのに、それを「問い」として扱えないため、解決策を探す入口が見つからない。感覚を問いに変換する術がないと、行動が始まらない。",
   solution:"「違和感」を放置せず、「なぜそうなっているのか」「本来どうあるべきか」という問いの型に変換する。自分の知識と現実とのズレに名前をつけることで、探究の起点を作る。",
   activities:[{tag:"#問いの型",text:"普段不思議に思っていること・違和感を持っていることをリストアップする"},
               {tag:"#問いの変換",text:"「〇〇がおかしい」を「なぜ〇〇なのか」「〇〇はどうあるべきか」という問いの形式に変換する"},
               {tag:"#問いの型",text:"バックキャストを使い、理想の状態から逆算して「何が欠けているか」を問いにする"}],
   alliance:"「うちの地域、なんか元気ないよね」という雑談を、「なぜ若者が戻ってこないのか」「戻りたくなる条件とは何か」という問いに変えた瞬間、探索が始まる。"},
  {id:2,comp:"comp-1",compName:"機会の発見",skill:"問いを立てる",skillNum:"①-1",
   name:"わがままから始める",en:"Start from Your Own Desire",
   hashtags:["#問いの型","#課題の特定"],
   context:"自分には関係ないことを課題として扱おうとして、空回りしている状況。あるいは「大きな社会課題」を扱わねばという思い込みがある状況。",
   problem:"遠い課題を扱おうとすると、当事者性が薄く、問いに熱量が生まれない。半径5メートルの不満は「小さすぎる」と思って見捨てがちだが、実は最も鮮度の高い問いの源泉である。",
   solution:"「自分がこうなったらいいな」「これがあったら嬉しい」というわがままを出発点にする。身近な不満・欲求を問いの形にすることで、当事者性を持ったリアルな課題発見ができる。",
   activities:[{tag:"#問いの型",text:"自分が日常で「あったらいいのに」「なくなればいいのに」と思うことを書き出す"},
               {tag:"#課題の特定",text:"身近な人（家族・友人）が「面倒だ」「困っている」と言っていることを集める"},
               {tag:"#問いの型",text:"「わがまま」リストの中から、自分だけの特殊事情か、多くの人が感じているかを仮説立てる"}],
   alliance:"「駅のトイレが臭い」という個人的な不満から、「公共空間の快適性はなぜ日本ではこんなに低いのか」という問いに育てたチームが、自治体と共同プロジェクトを始めた。"},
  {id:3,comp:"comp-1",compName:"機会の発見",skill:"情報を探索する",skillNum:"①-2",
   name:"当事者に直接会いに行く",en:"Go Direct to the Source",
   hashtags:["#インタビュー調査","#観察調査"],
   context:"問いやアイデアはあるが、本当のニーズや現場の実態がつかめていない状況。資料やデータは読んだが、リアルが見えない。",
   problem:"インターネットや報告書の情報は「平均値」であり、「建前」が多い。アンケートでは当事者の無意識の困りごとは出てこない。現場に足を運ばない限り、本当の問いに近づけない。",
   solution:"対象者のそばに行き、話を聞き、状況を観察する。半構造化インタビューで「なぜ」を掘り下げ、観察で言葉にならない行動パターンを掴む。情報は現場にある。",
   activities:[{tag:"#インタビュー調査",text:"想定する当事者に直接インタビューし、「最後に困ったのはいつか」「どうやって対処したか」を聞く"},
               {tag:"#観察調査",text:"当事者が実際に過ごす場所（職場・施設・商店街など）に一定期間通い、行動を観察する"},
               {tag:"#インタビュー調査",text:"「なぜ」を3回繰り返して、表面的なニーズの背後にある本質的な欲求を探る"}],
   alliance:"「高齢者向けアプリが使われない」と悩んでいたチームが、お年寄りの家に1週間通ったところ、「スマホそのものが重くて持てない」という物理的事実を発見し、設計を一から変えた。"},
  {id:4,comp:"comp-1",compName:"機会の発見",skill:"情報を探索する",skillNum:"①-2",
   name:"先人の地図を読む",en:"Read the Maps Others Drew",
   hashtags:["#事例調査","#文献調査","#情報の構造化"],
   context:"アイデアが浮かんだが、「これは既にあるのでは」「どこかで失敗した事例があるかも」という不安がある状況。",
   problem:"先行事例を知らずに動くと、すでに解決済みの問題に労力を使ったり、過去の失敗を繰り返す。一方、調べすぎて動けなくなることもある。適切な情報収集と判断が必要。",
   solution:"関連する先行事例を体系的に収集し、「なぜうまくいったか」「なぜ失敗したか」を構造化して学ぶ。自分のアイデアと比較して、独自性と課題を明確にする。",
   activities:[{tag:"#事例調査",text:"国内外の類似取り組みを10件以上収集し、成功・失敗の要因を表にまとめる"},
               {tag:"#文献調査",text:"普段読まない分野の雑誌・業界紙を読み、意外な接続点を探す"},
               {tag:"#情報の構造化",text:"KJ法で収集した情報をグループ化し、パターンと例外を可視化する"}],
   alliance:"「フードロス削減アプリ」を考えていたチームが事例調査をしたところ、世界に200以上の類似サービスがあることを発見。「失敗した事例から学んだ点」をコアコンセプトにした。"},
  {id:5,comp:"comp-1",compName:"機会の発見",skill:"アイデアを作る",skillNum:"①-3",
   name:"情報を組み合わせて跳ぶ",en:"Leap by Combining",
   hashtags:["#アイデアの生成","#アイデアの加工"],
   context:"情報や事例は集まったが、「新しいアイデア」がなかなか出てこない状況。",
   problem:"情報を「知識」として蓄えるだけでは新しいものは生まれない。アイデアは、異なる情報・分野・文脈を組み合わせることで飛躍する。しかし組み合わせ方が分からないと袋小路に入る。",
   solution:"全く異なる領域の事例・概念・技術を意図的に組み合わせる。「この成功事例の構造を自分の文脈に転用したら？」「真逆にしたら？」という問いで発想を広げる。",
   activities:[{tag:"#アイデアの生成",text:"集めた事例の「成功の構造」だけを抽出し、自分の課題に転用できないか考える"},
               {tag:"#アイデアの加工",text:"オズボーンのチェックリスト（転用・適合・変更・拡大・縮小・逆転など）でアイデアを加工する"},
               {tag:"#アイデアの生成",text:"マインドマップで思考を発散させた後、異なるブランチを意図的につなぐ"}],
   alliance:"「農家の規格外野菜」と「シェフの食材探し」を組み合わせることで、食品ロスを高級食材として流通させるサービスが生まれた。どちらの「常識」も壊していない。"},
  {id:6,comp:"comp-1",compName:"機会の発見",skill:"アイデアを作る",skillNum:"①-3",
   name:"アイデアを構造に載せる",en:"Give Your Idea a Structure",
   hashtags:["#アイデアの構造化","#アイデアの伝達"],
   context:"アイデアは浮かんでいるが、頭の中だけにある。他者に伝えようとすると言葉に詰まる状況。",
   problem:"直感的なアイデアをそのまま伝えても相手に届かない。構造化されていないアイデアは、自分自身の思考の穴も見えにくくする。また、一人では気づけない欠点が構造化すると浮かび上がる。",
   solution:"リーンキャンバスやTheory of Changeなどのフレームワークに当てはめてアイデアを可視化する。「誰のどんな課題を」「どんな方法で」「なぜ自分たちが」を埋めることで、アイデアが具体的な仮説になる。",
   activities:[{tag:"#アイデアの構造化",text:"リーンキャンバスの9つのブロックを埋めて、アイデアの全体像を整理する"},
               {tag:"#アイデアの構造化",text:"Theory of Changeで「理想状態→必要な変化→自分たちの介入」を逆算する"},
               {tag:"#アイデアの伝達",text:"2分間のピッチを5回繰り返し、毎回相手の反応を観察して改善する"}],
   alliance:"「地域の子どもを支援したい」という想いだけだったチームが、Theory of Changeを書いたことで「学習機会ではなく、安心できる居場所が先決」という気づきを得て、活動の軸が変わった。"},

  // ── コンピテンシー② 資源の動員 ──
  {id:7,comp:"comp-2",compName:"資源の動員",skill:"今ある資源を認識する",skillNum:"②-4",
   name:"手持ちの棚卸しから始める",en:"Inventory What You Have",

const COMP_COLORS = {
  "comp-1": {name:"機会の発見", color:"#2D7D6E", label:"COMP. 1"},
  "comp-2": {name:"資源の動員", color:"#3D4F8C", label:"COMP. 2"},
  "comp-3": {name:"リスクへの対処", color:"#B5442A", label:"COMP. 3"},
};

function PatternCard({pattern, onClick}){
  return (
    <div className={`pattern-card ${pattern.comp}`} onClick={()=>onClick(pattern)}>
      <div className="card-accent-bar"/>
      <div className="card-header">
        <div className="card-meta">
          <span className="skill-tag">{pattern.compName}</span>
          <span className="pattern-num">{pattern.skillNum} — {pattern.skill}</span>
        </div>
        <div className="hashtags">
          {pattern.hashtags.map(h=><span className="hashtag" key={h}>{h}</span>)}
        </div>
        <div className="pattern-name">#{pattern.id} {pattern.name}</div>
        <div className="pattern-name-en">{pattern.en}</div>
      </div>
      <div className="card-body">
        <div className="card-section">
          <div className="section-label">状況</div>
          <p className="context-text">{pattern.context.slice(0,80)}…</p>
        </div>
        <div className="card-section">
          <div className="section-label">解決</div>
          <p>{pattern.solution.slice(0,90)}…</p>
        </div>
      </div>
    </div>
  );
}

function DetailPanel({pattern, onClose}){
  return (
    <div className="detail-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className={`detail-panel ${pattern.comp}`}>
        <div className="detail-accent"/>
        <button className="detail-close" onClick={onClose}>✕</button>
        <div className="detail-inner">
          <div className="detail-meta">
            <span className="skill-tag">{pattern.compName}</span>
            <span className="detail-num">{pattern.skillNum} — {pattern.skill}</span>
          </div>
          <div className="detail-name">#{pattern.id} {pattern.name}</div>
          <div className="detail-name-en">{pattern.en}</div>
          <div className="detail-hashtags">
            {pattern.hashtags.map(h=><span className="hashtag" key={h}>{h}</span>)}
          </div>

          <div className={`detail-section context-sec`}>
            <div className="label">📍 状況 — Context</div>
            <p>{pattern.context}</p>
          </div>
          <div className={`detail-section problem-sec`}>
            <div className="label">⚡ 問題・葛藤 — Problem</div>
            <p>{pattern.problem}</p>
          </div>
          <div className={`detail-section solution-sec`}>
            <div className="label">✦ 解決 — Solution</div>
            <p>{pattern.solution}</p>
          </div>

          <div className="detail-section">
            <div className="label">🛠 学習活動の例</div>
            <ul className="activities-list">
              {pattern.activities.map((a,i)=>(
                <li key={i}>
                  <span className="act-tag">{a.tag}</span>
                  <span>{a.text}</span>
                </li>
              ))}
            </ul>
          </div>

          <div className="alliance-box">
            <div className="label">💡 現場でのシーン</div>
            <p>「{pattern.alliance}」</p>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [filter,setFilter] = useState("all");
  const [selected,setSelected] = useState(null);
  const [search,setSearch] = useState("");

  const visible = useMemo(()=>PATTERNS.filter(p=>{
    const matchComp = filter==="all" || p.comp===filter;
    const q = search.toLowerCase();
    const matchSearch = !q || p.name.includes(q) || p.en.toLowerCase().includes(q) ||
      p.solution.includes(q) || p.hashtags.some(h=>h.includes(q));
    return matchComp && matchSearch;
  }),[filter,search]);

  return (
    <>
      <header className="site-header">
        <h1>起業家的行動のパターン</h1>
        <div className="sub">Pattern Language for Entrepreneurship — 日本版 EntreComp v1 より</div>
      </header>

      <div className="hero">
        <div className="hero-eyebrow">Pattern Language / Entrepreneurial Competency</div>
        <h2>「機会を見つけ、資源を動かし、<br/>不確実性の中で動く」ための言語</h2>
        <p>日本版EntreCompの3つのコア・コンピテンシー（機会の発見・資源の動員・不確実性への対処）を、パターンランゲージの形式で記述しています。各パターンには「状況」「問題」「解決」と、現場での実践例が含まれています。</p>
      </div>

      <div className="controls">
        <button className={`filter-btn all ${filter==="all"?"active":""}`} onClick={()=>setFilter("all")}>すべて ({PATTERNS.length})</button>
        <button className={`filter-btn comp-1 ${filter==="comp-1"?"active":""}`} onClick={()=>setFilter("comp-1")}>① 機会の発見</button>
        <button className={`filter-btn comp-2 ${filter==="comp-2"?"active":""}`} onClick={()=>setFilter("comp-2")}>② 資源の動員</button>
        <button className={`filter-btn comp-3 ${filter==="comp-3"?"active":""}`} onClick={()=>setFilter("comp-3")}>③ リスクへの対処</button>
      </div>

      <div className="stats-bar">
        <div className="stat">表示中 <span>{visible.length}</span> / {PATTERNS.length} パターン</div>
        <input
          style={{fontFamily:"'Noto Serif JP',serif",fontSize:".78rem",padding:".35rem .75rem",border:"1.5px solid var(--border)",borderRadius:"2px",background:"var(--warm-white)",color:"var(--ink)",outline:"none",marginLeft:"auto"}}
          placeholder="パターン名・タグで検索..."
          value={search}
          onChange={e=>setSearch(e.target.value)}
        />
      </div>

      {visible.length===0
        ? <div className="empty">該当するパターンが見つかりませんでした。</div>
        : <div className="patterns-grid">
            {visible.map(p=><PatternCard key={p.id} pattern={p} onClick={setSelected}/>)}
          </div>
      }

      {selected && <DetailPanel pattern={selected} onClose={()=>setSelected(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
