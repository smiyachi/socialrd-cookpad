<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事例登録 — ソーシャルR&D Cookpad</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F8F7F4;font-family:'Helvetica Neue','Noto Sans JP',sans-serif;color:#1A1A1A;padding:32px 16px}
.wrap{max-width:640px;margin:0 auto}
.badge{font-size:10px;font-weight:700;letter-spacing:0.1em;color:#D97706;text-transform:uppercase;margin-bottom:8px}
h1{font-size:20px;font-weight:800;margin-bottom:4px}
.sub{font-size:12px;color:#6B7280;margin-bottom:32px}
.card{background:#fff;border-radius:14px;border:1px solid #E5E7EB;padding:24px;margin-bottom:16px}
.card h2{font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
input,textarea,select{width:100%;padding:10px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff;transition:border 0.15s}
input:focus,textarea:focus,select:focus{border-color:#059669;box-shadow:0 0 0 3px #D1FAE5}
textarea{min-height:90px;resize:vertical;line-height:1.6}
.field{margin-bottom:16px}
.hint{font-size:11px;color:#9CA3AF;margin-top:4px}
.btn{padding:12px 24px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s}
.btn-primary{background:#059669;color:#fff;width:100%}
.btn-primary:hover{background:#047857}
.btn-primary:disabled{background:#D1D5DB;color:#9CA3AF;cursor:not-allowed}
.btn-sm{padding:8px 14px;font-size:12px;background:#F3F4F6;color:#374151;border-radius:8px}
.btn-sm:hover{background:#E5E7EB}
.status{margin-top:12px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.6;display:none}
.status.success{background:#D1FAE5;color:#065F46;display:block}
.status.error{background:#FEE2E2;color:#991B1B;display:block}
.status.loading{background:#EDE9FE;color:#5B21B6;display:block}
.none-msg{background:#FEF3C7;border-radius:8px;padding:12px 14px;font-size:13px;color:#92400E;display:none}
.unclassified-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:14px;padding:20px}
.unclassified-item{background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;border:1px solid #FDE68A}
.back-link{font-size:12px;color:#6B7280;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:24px}
.back-link:hover{color:#1A1A1A}
hr{border:none;border-top:1px solid #E5E7EB;margin:24px 0}
</style>
</head>
<body>
<div class="wrap">

  <a class="back-link" href="./index.html">← Cookpadに戻る</a>

  <div class="badge">Admin — 事例登録</div>
  <h1>🏷 新しい事例を登録する</h1>
  <p class="sub">日本の現場事例をパターンに紐付けて登録します。登録後1〜2分でサイトに反映されます。</p>

  <!-- 事例情報 -->
  <div class="card">
    <h2>事例の情報</h2>
    <div class="field">
      <label>事例タイトル <span style="color:#EF4444">*</span></label>
      <input type="text" id="case-title" placeholder="例：○○市の参加型予算プロジェクト">
    </div>
    <div class="field">
      <label>概要・内容 <span style="color:#EF4444">*</span></label>
      <textarea id="case-desc" placeholder="どんな取り組みか、どんな成果があったかなど。"></textarea>
    </div>
    <div class="field">
      <label>参照URL（任意）</label>
      <input type="url" id="case-url" placeholder="https://...">
    </div>
    <div class="field">
      <label>投稿者名（任意）</label>
      <input type="text" id="case-author" placeholder="例：宮地俊一">
    </div>
  </div>

  <!-- パターン選択 -->
  <div class="card">
    <h2>パターンを選ぶ</h2>

    <div class="field">
      <label>① 層を選ぶ <span style="color:#EF4444">*</span></label>
      <select id="sel-layer">
        <option value="">選択してください</option>
        <option value="proc">①プロセス（178パターン）</option>
        <option value="conn">②つなぎ方（29パターン）</option>
        <option value="supp">③支え方（143パターン）</option>
        <option value="none">当てはまるパターンがない</option>
      </select>
    </div>

    <div class="field" id="field-sub" style="display:none">
      <label>② カテゴリを選ぶ</label>
      <select id="sel-sub">
      </select>
    </div>

    <div class="field" id="field-pattern" style="display:none">
      <label>③ パターンを選ぶ <span style="color:#EF4444">*</span></label>
      <select id="sel-pattern">
        <option value="">パターンを選択...</option>
      </select>
      <div class="hint">上の層・カテゴリで絞り込まれます</div>
    </div>

    <div class="none-msg" id="none-msg">
      📦 「未分類ボックス」に保存します。後でClaudeと一緒に整理できます。
    </div>
  </div>

  <button class="btn btn-primary" id="submit-btn" onclick="submitCase()">登録する</button>
  <div class="status" id="status"></div>

  <hr>

  <!-- 未分類ボックス -->
  <div id="unclassified-section" style="display:none">
    <div class="unclassified-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:13px;font-weight:700;color:#92400E">📦 未分類ボックス（<span id="uc-count">0</span>件）</div>
          <div style="font-size:11px;color:#92400E;margin-top:2px">Claudeに渡してパターン候補を整理できます</div>
        </div>
        <button class="btn-sm" onclick="exportCSV()">📥 CSVエクスポート</button>
      </div>
      <div id="uc-list"></div>
    </div>
  </div>

</div>

// 層を変えたとき
document.getElementById('sel-layer').addEventListener('change', function() {
  const layer = this.value;
  const fieldSub = document.getElementById('field-sub');
  const fieldPat = document.getElementById('field-pattern');
  const noneMsg = document.getElementById('none-msg');

  // 全部リセット
  fieldSub.style.display = 'none';
  fieldPat.style.display = 'none';
  noneMsg.style.display = 'none';
  document.getElementById('sel-pattern').innerHTML = '<option value="">パターンを選択...</option>';

  if (layer === 'none') {
    noneMsg.style.display = 'block';
    return;
  }
  if (!layer) return;

  // サブカテゴリを設定
  const subSel = document.getElementById('sel-sub');
  subSel.innerHTML = SUBS[layer].map(s => `<option value="${s.v}">${s.l}</option>`).join('');
  fieldSub.style.display = 'block';

  // パターン一覧（全件）を設定
  fillPatterns(layer, 'all');
  fieldPat.style.display = 'block';
});

// カテゴリを変えたとき
document.getElementById('sel-sub').addEventListener('change', function() {
  const layer = document.getElementById('sel-layer').value;
  fillPatterns(layer, this.value);
});

function fillPatterns(layer, subVal) {
  let list = ALL.filter(p => p.layer === layer);

  if (subVal !== 'all') {
    if (layer === 'proc') {
      list = list.filter(p => p.stage === parseInt(subVal));
    } else {
      list = list.filter(p => p.sub === subVal);
    }
  }

  const sel = document.getElementById('sel-pattern');
  sel.innerHTML = `<option value="">パターンを選択... (${list.length}件)</option>` +
    list.map(p => `<option value="${p.id}">#${p.id} ${p.name}</option>`).join('');
}

async function submitCase() {
  const title = document.getElementById('case-title').value.trim();
  const desc  = document.getElementById('case-desc').value.trim();
  const url   = document.getElementById('case-url').value.trim();
  const author= document.getElementById('case-author').value.trim();
  const layer = document.getElementById('sel-layer').value;
  const patId = parseInt(document.getElementById('sel-pattern').value);

  if (!title || !desc) { showStatus('error', 'タイトルと概要は必須です。'); return; }
  if (!layer)           { showStatus('error', '層を選択してください。'); return; }

  if (layer === 'none') {
    saveUC({title, desc, url, author, date: today()});
    showStatus('success', '📦 未分類ボックスに保存しました。');
    resetForm();
    return;
  }

  if (!patId) { showStatus('error', 'パターンを選択してください。'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showStatus('loading', 'GitHubに登録中...');

  try {
    // patterns.json を取得
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/patterns.json`, {
      headers: {'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json'}
    });
    const file = await r.json();
    const sha  = file.sha;
    const data = JSON.parse(atob(file.content.replace(/\n/g,'')));

    // 対象パターンに jp_cases を追加
    const target = data.find(p => p.id === patId);
    if (!target) throw new Error('パターンが見つかりません');
    if (!Array.isArray(target.jp_cases)) target.jp_cases = [];
    target.jp_cases.push({ title, desc, url: url||null, author: author||null, date: today() });

    // 保存
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const put = await fetch(`https://api.github.com/repos/${REPO}/contents/patterns.json`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `事例追加: #${patId} ${target.name} — ${title}`,
        content: encoded,
        sha
      })
    });

    if (put.ok) {
      showStatus('success', `✅ 登録完了！「#${patId} ${target.name}」に追加。1〜2分でサイトに反映されます。`);
      resetForm();
    } else {
      const e = await put.json();
      throw new Error(e.message);
    }
  } catch(e) {
    showStatus('error', 'エラー: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function resetForm() {
  ['case-title','case-desc','case-url','case-author'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('sel-layer').value = '';
  document.getElementById('field-sub').style.display = 'none';
  document.getElementById('field-pattern').style.display = 'none';
  document.getElementById('none-msg').style.display = 'none';
}

function today() {
  return new Date().toLocaleDateString('ja-JP');
}

// 未分類
function saveUC(item) {
  const list = JSON.parse(localStorage.getItem('uc')||'[]');
  list.push(item);
  localStorage.setItem('uc', JSON.stringify(list));
  renderUC();
}

function renderUC() {
  const list = JSON.parse(localStorage.getItem('uc')||'[]');
  const sec = document.getElementById('unclassified-section');
  if (list.length === 0) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  document.getElementById('uc-count').textContent = list.length;
  document.getElementById('uc-list').innerHTML = list.map(item => `
    <div class="unclassified-item">
      <div style="font-weight:600;margin-bottom:2px">${item.title}</div>
      <div style="color:#6B7280;font-size:11px">${item.date}${item.author?' / '+item.author:''}</div>
      <div style="margin-top:4px;font-size:11px">${item.desc.slice(0,80)}${item.desc.length>80?'...':''}</div>
    </div>
  `).join('');
}

function exportCSV() {
  const list = JSON.parse(localStorage.getItem('uc')||'[]');
  if (!list.length) return;
  const csv = '\uFEFF' + 'タイトル,概要,URL,投稿者,日付\n' +
    list.map(i=>`"${i.title}","${i.desc}","${i.url||''}","${i.author||''}","${i.date}"`).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = `未分類事例_${today().replace(/\//g,'-')}.csv`;
  a.click();
}

renderUC();
